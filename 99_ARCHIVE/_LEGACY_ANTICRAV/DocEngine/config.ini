[directories]
; ANTICRAV DocEngine — Auto-create directory structure
; Usage (PowerShell): Get-Content config.ini | Where-Object { $_ -notmatch '^\s*(;|#|\[)' -and $_.Trim() } | ForEach-Object { $dir = ($_ -split '=')[0].Trim(); if ($dir) { New-Item -ItemType Directory -Force -Path $dir } }

Archive/Pic = Image archive from scraped pages
Archive/Data = JSON and CSV exports  
Archive/Wiki = Generated markdown wiki pages
Archive/Wiki/pages = Individual page markdown files
Archive/Wiki/assets = Wiki assets (images, styles)
