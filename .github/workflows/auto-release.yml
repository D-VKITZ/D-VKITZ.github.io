name: DkZ™ Monorepo Auto-Release

on:
  push:
    branches: [ "main", "master", "feat/second-brain-v2-dashy-nexus" ]

jobs:
  deepkeep_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Environment (Node & ExifTool)
        run: |
          sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
          npm install

      - name: 📸 Run Media Brander (EXIF Injection)
        run: |
          node .agents/scripts/media-brander.js 01_PROJECTS/

      - name: 🛡️ Run DeepKeep Sanitizer (Scannt 96 Module)
        run: |
          node .agents/scripts/deepkeep.js 01_PROJECTS/

      - name: 🌐 Generate Global Sitemap Mesh
        run: |
          node .agents/scripts/sitemap-generator.js

      - name: 🚀 Deploy to Hostinger VPS (Nginx) via rsync
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USER: root
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          
          # rsync uebertraegt intelligent nur die veraenderten Dateien der 96 Projekte!
          echo "Starte rsync zu Hostinger VPS..."
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" ./01_PROJECTS/ $USER@$HOST:/var/www/01_PROJECTS/
          
          echo "Deploy abgeschlossen! Alle Subdomains sind live."

      - name: ☁️ Backup Media to Google Photos
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          node .agents/scripts/google-photos-uploader.js

      - name: 📝 Blogger Interceptor (Auto-Publish Plans & Blueprints)
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
        run: |
          node .agents/scripts/blogger-push.js

  drilling_doku:
    needs: deepkeep_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📝 Drilling: Release Dokumentation festhalten
        run: |
          mkdir -p .agents/logs/releases
          echo "## Release: $(date +'%Y-%m-%d %H:%M')" > .agents/logs/releases/latest.md
          echo "Automatisch generiert & gepusht durch DkZ Auto-Release Pipeline." >> .agents/logs/releases/latest.md
          echo "DeepKeep Zensur: OK. Sync für 01_PROJECTS: OK." >> .agents/logs/releases/latest.md

      - name: 🔄 Push Drilling back to GitHub
        run: |
          git config --global user.name 'DkZ Auto-Release Bot'
          git config --global user.email 'bot@devkitz.eu'
          git add .agents/logs/releases/latest.md
          git commit -m "docs: 🤖 Drilling / Auto-Doku aktualisiert nach Monorepo Release" || echo "No changes to commit"
          git push
