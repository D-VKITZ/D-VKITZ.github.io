# DkZ Spec-Kit Workflow — Spec-Driven Development
# Integration: GitHub Spec-Kit + DkZ R13 Flow
# @DKZ:RULES -> R13 (Analyse→Plan→Ausführung→Verifikation→Commit)
#
# Combines GitHub Spec-Kit methodology with DkZ REGELWERK:
#   Spec-Kit: Specify → Plan → Tasks → Implement
#   DkZ R13:  Analyse → Plan → Ausführung → Verifikation → Commit
#
# Usage: Copilot, Antigravity, and Claude follow this spec-driven workflow
# for ALL new features, modules, and bug fixes.

name: "📋 Spec-Kit — Spec-Driven Development"

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      spec_title:
        description: 'Feature/Module name'
        required: true
      spec_type:
        description: 'Type (feature|module|fix|refactor)'
        required: true
        default: 'feature'

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  generate-spec:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'spec-kit') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Spec Document
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.inputs?.spec_title || context.payload.issue?.title || 'Unnamed';
            const type = context.payload.inputs?.spec_type || 'feature';
            const now = new Date().toISOString();

            // Phase 1: SPECIFY — Generate spec template
            const specBody = `# 📋 Spec: ${title}\n\n` +
              `| Feld | Wert |\n|:---|:---|\n` +
              `| **Typ** | ${type} |\n` +
              `| **Erstellt** | ${now} |\n` +
              `| **Status** | 🔍 Specify |\n` +
              `| **DkZ Regel** | R13 (Analyse→Plan→Ausführung→Verifikation→Commit) |\n\n` +
              `---\n\n` +
              `## Phase 1: SPECIFY (Anforderungen)\n\n` +
              `### Ziel\n_Was soll erreicht werden?_\n\n` +
              `### User Stories\n` +
              `- [ ] Als User möchte ich...\n` +
              `- [ ] Als Admin möchte ich...\n\n` +
              `### Akzeptanzkriterien\n` +
              `- [ ] Kriterium 1\n` +
              `- [ ] Kriterium 2\n\n` +
              `### DkZ Design Requirements\n` +
              `- [ ] Dark Design (#0a0a0e, Accent #fa1e4e)\n` +
              `- [ ] Fonts: Inter + JetBrains Mono\n` +
              `- [ ] XSS: esc() Funktion\n` +
              `- [ ] EventLog: DkzEventLog.log()\n` +
              `- [ ] Debug Button: dkz-debug.js\n` +
              `- [ ] ← Hub Button\n\n` +
              `---\n\n` +
              `## Phase 2: PLAN (Technischer Plan)\n\n` +
              `### Architektur\n_Beschreibung der Architektur_\n\n` +
              `### Tech Stack\n` +
              `- Vanilla HTML/CSS/JS\n` +
              `- Node.js (wenn Backend nötig)\n` +
              `- DkZ Design System v2\n\n` +
              `### Dateien\n` +
              `| Datei | Aktion | Beschreibung |\n|:---|:---|:---|\n` +
              `| index.html | NEW | Hauptdatei |\n` +
              `| README.md | NEW | Demo-Badge + Docs |\n\n` +
              `---\n\n` +
              `## Phase 3: TASKS (Aufgaben)\n\n` +
              `- [ ] Task 1: ...\n` +
              `- [ ] Task 2: ...\n` +
              `- [ ] Task 3: Tests\n\n` +
              `---\n\n` +
              `## Phase 4: IMPLEMENT\n\n` +
              `_Von Copilot/Antigravity/Claude ausgeführt_\n\n` +
              `### Verifikation\n` +
              `- [ ] Browser-Test\n` +
              `- [ ] Console Errors = 0\n` +
              `- [ ] CodeRabbit Review\n` +
              `- [ ] R20: Dokumentation aktualisiert\n\n` +
              `---\n` +
              `> 🤖 _Generated by DkZ Spec-Kit (R13 + GitHub Spec-Kit)_`;

            if (context.payload.issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: specBody
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['spec-kit', `spec:${type}`, 'phase:specify']
              });
            }

            console.log(`Spec generated for: ${title}`);
