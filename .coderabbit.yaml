# CodeRabbit Configuration — DEVKiTZ Ökosystem
# @DKZ:RULES -> Siehe REGELWERK.md, R21 Pflegefall-System
# Version: v0.01.2_01

reviews:
  profile: "chill"
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "01_PROJECTS/01_dashboard/modules/**"
      instructions: |
        DkZ Module Review:
        - Check DkZ Design: #fa1e4e accent, dark theme (#0e0e10)
        - Verify XSS protection: esc() function must exist
        - Check for ← Hub button in header
        - Verify dkz-version meta tag
        - EventLog integration (DkzEventLog.log)
        - Debug button (dkz-debug.js) included
        - Responsive design
        - No hardcoded credentials
    - path: "BACKEND/**"
      instructions: |
        Backend Security Review:
        - Check API key validation on all endpoints
        - Verify no secrets in code
        - Check CORS headers
        - Verify data isolation (userId filtering)
        - Check error handling
    - path: "FRONTEND/**"
      instructions: |
        Frontend Review:
        - Check authentication flow
        - Verify sessionStorage usage (not localStorage for keys)
        - Check DkZ Design consistency
        - No exposed API keys
    - path: ".github/**"
      instructions: |
        CI/CD Review:
        - Check workflow permissions (minimal)
        - Verify secret usage
        - Check for hardcoded values

chat:
  auto_reply: true

language: "de-DE"

tools:
  github-checks:
    enabled: true
  ast-grep:
    enabled: true
