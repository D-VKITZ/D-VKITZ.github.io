    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --purple: #ec4899;
            --orange: #ff8800;
            --accent: #fa1e4e;
            --accent-rgb: 250, 30, 78;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 20px
        }

        .header {
            text-align: center;
            padding: 36px 24px;
            background: linear-gradient(135deg, #1a1a1c 0%, #222226 60%, #1a1214 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(250, 30, 78, .06) 0%, transparent 60%);
            animation: hGlow 6s ease-in-out infinite alternate
        }

        @keyframes hGlow {
            0% {
                transform: translate(0, 0)
            }

            100% {
                transform: translate(10%, 5%)
            }
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--red), var(--purple), var(--blue));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
            position: relative
        }

        @keyframes shimmer {
            0% {
                background-position: 0% center
            }

            100% {
                background-position: 200% center
            }
        }

        .header p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 8px;
            position: relative
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--font);
            font-weight: 600;
            transition: all .2s;
            text-decoration: none;
            z-index: 2
        }

        .back-btn:hover {
            color: var(--text);
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(var(--accent-rgb), .2)
        }

        .container {
            max-width: 1200px;
            margin: 0 auto
        }

        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: all .3s
        }

        .section:hover {
            border-color: rgba(var(--accent-rgb), .35);
            box-shadow: 0 0 24px rgba(var(--accent-rgb), .08)
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            transition: background .2s
        }

        .section-header:hover {
            background: rgba(255, 255, 255, .02)
        }

        .section-header h2 {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .section-header .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700
        }

        .section-header .toggle {
            font-size: 18px;
            color: var(--muted);
            transition: transform .3s
        }

        .section.collapsed .toggle {
            transform: rotate(-90deg)
        }

        .section.collapsed .section-body {
            display: none
        }

        .section-body {
            padding: 0 20px 20px
        }

        .section-body .search {
            width: 100%;
            padding: 8px 14px;
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-size: 12px;
            font-family: var(--font);
            margin-bottom: 14px;
            transition: border-color .3s
        }

        .section-body .search:focus {
            outline: none;
            border-color: var(--accent)
        }

        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px
        }

        .api-card {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            transition: all .3s;
            position: relative;
            overflow: hidden
        }

        .api-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity .3s
        }

        .api-card:hover {
            border-color: rgba(var(--accent-rgb), .4);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
        }

        .api-card:hover::after {
            opacity: 1
        }

        .api-card.featured {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(0, 255, 136, .1)
        }

        .api-card.featured::after {
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            opacity: 1
        }

        .api-card .name {
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px
        }

        .api-card .name .star {
            color: var(--yellow);
            font-size: 16px
        }

        .api-card .desc {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
            line-height: 1.5
        }

        .api-card .endpoint {
            font-family: var(--mono);
            font-size: 10px;
            background: rgba(0, 0, 0, .3);
            padding: 6px 10px;
            border-radius: 6px;
            color: var(--green);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            word-break: break-all
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-family: var(--font);
            transition: all .2s;
            flex-shrink: 0
        }

        .copy-btn:hover {
            color: var(--green);
            border-color: var(--green)
        }

        .copy-btn.copied {
            color: var(--green);
            border-color: var(--green)
        }

        .api-card .tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px
        }

        .tag {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600
        }

        .tag-green {
            background: rgba(0, 255, 136, .12);
            color: var(--green)
        }

        .tag-blue {
            background: rgba(85, 172, 238, .12);
            color: var(--blue)
        }

        .tag-yellow {
            background: rgba(255, 184, 0, .12);
            color: var(--yellow)
        }

        .tag-purple {
            background: rgba(236, 72, 153, .12);
            color: var(--purple)
        }

        .tag-red {
            background: rgba(250, 30, 78, .12);
            color: var(--red)
        }

        .get-key {
            display: inline-block;
            padding: 5px 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            text-decoration: none;
            transition: all .2s
        }

        .get-key:hover {
            transform: scale(1.05);
            box-shadow: 0 0 14px rgba(var(--accent-rgb), .4)
        }

        .get-key.green {
            background: var(--green);
            color: #000
        }

        .get-key.blue {
            background: var(--blue)
        }

        .get-key.purple {
            background: var(--purple)
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: var(--muted);
            font-size: 11px;
            padding: 16px
        }

        .footer a {
            color: var(--blue);
            text-decoration: none
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .api-card {
            animation: fadeIn .3s ease both
        }

        @media(max-width:768px) {
            .api-grid {
                grid-template-columns: 1fr
            }

            .header h1 {
                font-size: 22px
            }
        }
    </style>
</head>

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓ Kopiert';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 1500);
            });
        }

        function renderCard(item, idx) {
            const ep = item.endpoint && item.endpoint !== '—'
                - `<div class="endpoint"><span>${item.endpoint}</span><button class="copy-btn" onclick="copyText('${item.endpoint.replace(/'/g, "\\'")}',this)">📋 Copy</button></div>` : '';
            const tags = (item.tags || []).map(t => `<span class="tag tag-${t[1]}">${t[0]}</span>`).join('');
            const star = item.star - '<span class="star">⭐</span>' : '';
            const cls = item.featured - 'api-card featured' : 'api-card';
            const lc = item.linkClass - ` ${item.linkClass}` : '';
            return `<div class="${cls}" style="animation-delay:${idx * 50}ms">
    <div class="name">${star}${item.name}</div>
    <div class="desc">${item.desc}</div>
    ${ep}
    <div class="tags">${tags}</div>
    <a href="${item.link}" target="_blank" class="get-key${lc}">${item.linkLabel || 'Öffnen'} →</a>
  </div>`;
        }

        function renderSection(sec) {
            const pinned = sec.pinned - ' style="border-color:var(--green);box-shadow:0 0 24px rgba(0,255,136,.1)"' : '';
            const badge = sec.badge - `<span class="badge ${sec.badgeClass}">${sec.badge}</span>` : '';
            const cards = sec.items.map((it, i) => renderCard(it, i)).join('');
            return `<div class="section" id="sec-${sec.id}"${pinned}>
    <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <h2>${sec.icon} ${sec.title} ${badge}</h2>
      <span class="toggle">▼</span>
    </div>
    <div class="section-body">
      <input class="search" type="text" placeholder="🔍 Suchen in ${sec.title}..." oninput="filterCards(this,'${sec.id}')">
      <div class="api-grid" id="grid-${sec.id}">${cards}</div>
    </div>
  </div>`;
        }

        function filterCards(input, secId) {
            const q = input.value.toLowerCase();
            const cards = document.querySelectorAll(`#grid-${secId} .api-card`);
            cards.forEach(c => {
                c.style.display = c.textContent.toLowerCase().includes(q) - '' : 'none';
            });
        }

        document.getElementById('app').innerHTML = DATA.map(renderSection).join('');
    </script>
</body>
