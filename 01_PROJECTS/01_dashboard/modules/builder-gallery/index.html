<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏗️ DkZ™ Builder Gallery — Unified Asset Hub & Werkzeuge</title>
    <meta name="description" content="DEVKiTZ™ Builder Gallery — 515+ Assets in 16 Kategorien, Blog Designer, Flyer Builder, SEO Toolkit PRO. Professionelles Business & Shop Werkzeug.">
    <link rel="stylesheet" href="builder-gallery.css">
</head>
<body data-dkz-module="builder-gallery" data-dkz-appid="DKZ-BG-001" data-dkz-version="v2.0" data-dkz-title="Builder Gallery" data-dkz-icon="🏗️">

    <!-- Canvas Background -->
    <canvas id="bgCanvas"></canvas>

    <!-- App Shell -->
    <div class="app">

        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-brand">
                <a href="../../hub/index.html">← Hub</a>
                <div class="topbar-title">🏗️ <span>Builder</span> Gallery</div>
            </div>
            <div class="topbar-stats">
                <div>TOTAL <span class="stat-val" id="totalCount">0</span></div>
                <div>FILTERED <span class="stat-val" id="filteredCount">0</span></div>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar" id="tabBar"></div>

        <!-- Toolbar -->
        <div class="toolbar" id="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Suche nach Name, Tag, Modul..." oninput="BuilderGallery.search(this.value)">
            </div>
            <div class="filter-chips" id="formatChips"></div>
            <div class="view-toggle">
                <button class="view-btn active" data-view="grid" onclick="BuilderGallery.setView('grid')" title="Grid">▦</button>
                <button class="view-btn" data-view="large" onclick="BuilderGallery.setView('large')" title="Groß">▣</button>
                <button class="view-btn" data-view="list" onclick="BuilderGallery.setView('list')" title="Liste">☰</button>
            </div>
        </div>

        <!-- Gallery Section -->
        <div id="gallerySection">
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>

        <!-- Werkzeug: Blog Designer -->
        <div class="builder-panel" id="builder-blog">
            <iframe class="builder-frame" src="../gallery/tools/blog-designer.html" title="Blog Designer"></iframe>
        </div>

        <!-- Werkzeug: Flyer Builder -->
        <div class="builder-panel" id="builder-flyer">
            <iframe class="builder-frame" src="../gallery/index.html" title="Flyer Builder"></iframe>
        </div>

        <!-- Werkzeug: SEO Toolkit PRO -->
        <div class="builder-panel" id="builder-seo">
            <iframe class="builder-frame" src="../seo-toolkit/index.html" title="SEO Toolkit PRO"></iframe>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow='';">×</button>
        <button class="lb-nav lb-prev" onclick="event.stopPropagation(); BuilderGallery.navigateLB(-1)">‹</button>
        <img id="lbImg" src="" alt="Preview">
        <button class="lb-nav lb-next" onclick="event.stopPropagation(); BuilderGallery.navigateLB(1)">›</button>
        <div class="lb-info">
            <span id="lbTitle"></span>
            <button onclick="event.stopPropagation(); const img=document.getElementById('lbImg'); const a=document.createElement('a'); a.href=img.src; a.download=img.src.split('/').pop(); a.click();">⬇ Download</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Asset Data + Engine -->
    <script src="asset-data.js"></script>
    <script src="builder-gallery.js"></script>

    <!-- DkZ Shared Scripts (optional/portable) -->
    <script src="../../shared/dkz-debug.js" onerror=""></script>
    <script src="../../shared/dkz-guide.js" onerror=""></script>
    <script src="../../shared/dkz-crosslinks.js" onerror=""></script>
    <script src="../../shared/dkz-navbar.js" onerror=""></script>
    <script src="../../shared/dkz-headbar.js" onerror=""></script>
    <script src="../../shared/dkz-console.js" onerror=""></script>
</body>
<!-- © DEVKiTZ™ 2026 — Builder Gallery v2.0 — All Rights Reserved -->
</html>
