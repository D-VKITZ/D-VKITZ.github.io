<body data-dkz-module="markdown_converter" data-dkz-appid="DKZ-MOD-MAR" data-dkz-version="v0.01" data-dkz-title="Markdown Converter" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh"><div class="bg-blob"></div><div class="bg-blob"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const useIsMobile = () => {
            const [isMobile, setIsMobile] = useState(window.innerWidth < 1024);
            useEffect(() => {
                const check = () => setIsMobile(window.innerWidth < 1024);
                window.addEventListener('resize', check);
                return () => window.removeEventListener('resize', check);
            }, []);
            return isMobile;
        };

        const App = () => {
            const isMobile = useIsMobile();
            const [activeTab, setActiveTab] = useState('input');
            const [markdownText, setMarkdownText] = useState('# Hello Markdown\n\n```mermaid\ngraph TD;\n    A-->B;\n```');
            const [htmlOutput, setHtmlOutput] = useState('');

            // Sync Logic
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncStatus, setSyncStatus] = useState(null);

            const handleSyncRepo = async () => {
                setIsSyncing(true);
                setSyncStatus(null);
                try {
                    const response = await fetch('http://localhost:3040/api/sync', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                    const data = await response.json();
                    setSyncStatus(data.success - { type: 'success', message: data.message } : { type: 'error', message: data.error });
                } catch (err) {
                    setSyncStatus({ type: 'error', message: 'Sync Server offline.' });
                } finally {
                    setIsSyncing(false);
                    setTimeout(() => setSyncStatus(null), 5000);
                }
            };

            useEffect(() => {
                mermaid.initialize({ startOnLoad: false, theme: 'dark' });
            }, []);

            useEffect(() => {
                const parse = async () => {
                    const rawHtml = marked.parse(markdownText || '');
                    const cleanHtml = DOMPurify.sanitize(rawHtml, { ADD_TAGS: ['div', 'svg'] });
                    setHtmlOutput(cleanHtml);

                    setTimeout(async () => {
                        const mermaidDivs = document.querySelectorAll('.language-mermaid');
                        for (let i = 0; i < mermaidDivs.length; i++) {
                            try {
                                const { svg } = await mermaid.render(`mermaid-${Date.now()}-${i}`, mermaidDivs[i].textContent);
                                mermaidDivs[i].parentElement.innerHTML = svg;
                            } catch (e) {
                                console.error(e);
                            }
                        }
                    }, 50);
                };
                parse();
            }, [markdownText]);

            return (
                <div className="h-screen flex flex-col">
                    <header className="h-16 border-b border-darkBorder bg-darkSurface flex items-center justify-between px-4 md:px-6 shrink-0">
                        <div className="flex items-center gap-2 md:gap-3">
                            <a
                                href={isMobile - "../../dashboard/hub/index_panel.html" : "../../dashboard/hub/index.html"}
                                className="flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/20 transition-all text-gray-400 hover:text-white shrink-0"
                                title="Back to Dashboard"
                            >
                                <i className="ph-bold ph-caret-left text-lg md:text-xl"></i>
                            </a>
                            <i className="ph-duotone ph-markdown-logo text-brand text-2xl md:text-3xl"></i>
                            <h1 className="font-bold text-base md:text-lg tracking-tight">MARKDOWN <span className="text-brand">CONVERTER</span></h1>
                        </div>
                        <div className="flex items-center gap-2 md:gap-4">
                            {syncStatus && !isMobile && <span className={`text-xs font-bold ${syncStatus.type === 'success' - 'text-green-400' : 'text-red-400'} animate-pulse`}>{syncStatus.message}</span>}
                            <button onClick={handleSyncRepo} disabled={isSyncing} className={`flex items-center gap-2 px-2 md:px-3 py-1.5 rounded text-xs font-bold transition-all uppercase ${isSyncing - 'bg-white/10 text-gray-400 cursor-not-allowed' : 'bg-darkBorder text-gray-300 hover:text-white border border-white/10'}`}>
                                <i className={`ph-bold ph-git-commit ${isSyncing - "animate-spin" : ""}`}></i> {!isMobile && (isSyncing - 'Syncing...' : 'Sync Repo')}
                            </button>
                        </div>
                    </header>
                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                        {isMobile && (
                            <div className="flex bg-darkSurface border-b border-darkBorder shrink-0">
                                <button onClick={() => setActiveTab('input')} className={`flex-1 py-3 text-xs font-bold uppercase tracking-widest ${activeTab === 'input' - 'text-brand border-b-2 border-brand' : 'text-gray-500'}`}>Edit Markdown</button>
                                <button onClick={() => setActiveTab('output')} className={`flex-1 py-3 text-xs font-bold uppercase tracking-widest ${activeTab === 'output' - 'text-brand border-b-2 border-brand' : 'text-gray-500'}`}>Output Preview</button>
                            </div>
                        )}
                        <div className={`w-full md:w-1/2 border-r border-darkBorder bg-darkBg flex-col ${isMobile && activeTab !== 'input' - 'hidden' : 'flex'}`}>
                            <div className="p-2 border-b border-darkBorder bg-darkSurface text-xs font-bold text-gray-400 uppercase tracking-widest">Input (Markdown)</div>
                            <textarea
                                className="flex-1 p-4 bg-transparent text-gray-300 font-mono text-sm resize-none focus:outline-none custom-scroll"
                                value={markdownText}
                                onChange={e => setMarkdownText(e.target.value)}
                            />
                        </div>
                        <div className={`w-full md:w-1/2 bg-[#121214] flex-col ${isMobile && activeTab !== 'output' - 'hidden' : 'flex'}`}>
                            <div className="p-2 border-b border-darkBorder bg-darkSurface text-xs font-bold text-gray-400 uppercase tracking-widest">Output Preview</div>
                            <div className="flex-1 p-6 md:p-8 overflow-y-auto custom-scroll prose prose-invert prose-brand max-w-none" dangerouslySetInnerHTML={{ __html: htmlOutput }} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

<div style="position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1001;opacity:0;pointer-events:none;transition:.3s" id="onboarding"><div style="background:#1a1a1c;border:1px solid #2a2a2e;border-radius:16px;padding:2rem;max-width:420px;text-align:center"><div style="font-size:1.25rem;font-weight:800;margin-bottom:.75rem">Markdown converter</div><p style="font-size:.875rem;color:#a0a0a0;line-height:1.8;margin-bottom:1rem">Konvertiere Markdown zu HTML und umgekehrt.</p><button style="width:100%;padding:.625rem;border:none;border-radius:6px;background:linear-gradient(135deg,#fa1e4e,#ec4899);color:#fff;font-weight:700;cursor:pointer;font-family:inherit" onclick="closeOnboarding()">Los geht's!</button><div style="font-size:.7rem;color:#606060;margin-top:.5rem">Wird nur 1x gezeigt</div></div></div>
<script>function showModuleInfo(){var m=document.getElementById('info-modal');m.style.opacity='1';m.style.pointerEvents='all'}function closeOnboarding(){var m=document.getElementById('onboarding');m.style.opacity='0';m.style.pointerEvents='none';localStorage.setItem('dkz-markdown_converter-onboarded','1')}if(!localStorage.getItem('dkz-markdown_converter-onboarded')){var ob=document.getElementById('onboarding');ob.style.opacity='1';ob.style.pointerEvents='all'}setTimeout(function(){var c=document.querySelector('.header-actions')||document.querySelector('header > div:last-child')||document.querySelector('.header > div:last-child')||document.querySelector('header')||document.querySelector('.header')||document.querySelector('[class*=header]');if(c&&!document.getElementById('dkz-info-btn')){var b=document.createElement('button');b.id='dkz-info-btn';b.innerHTML='&#9432;';b.title='Modul-Info';b.style.cssText='padding:.5rem;border:1px solid #2a2a2e;border-radius:6px;background:rgba(255,255,255,.05);color:#f6f6f7;font-size:1.1rem;cursor:pointer';b.onclick=function(){showModuleInfo()};c.insertBefore(b,c.firstChild)}},500);</script>    <script src="../../shared/dkz-headbar.js"></script>
