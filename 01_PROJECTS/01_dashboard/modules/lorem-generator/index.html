    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--green);
            top: -10%;
            left: 10%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font)
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--green), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .content {
            padding: 20px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px
        }

        .card h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .options-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center
        }

        .opt-group {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .opt-group label {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .opt-group select,
        .opt-group input {
            padding: 8px 12px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            outline: none
        }

        .opt-group input[type=number] {
            width: 80px;
            font-family: var(--mono)
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .output {
            padding: 16px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.8;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap
        }

        .info {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 11px;
            color: var(--muted)
        }

        .info span {
            font-family: var(--mono);
            color: var(--green)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>

<body data-dkz-module="lorem-generator" data-dkz-appid="DKZ-MOD-LOR" data-dkz-version="v0.01" data-dkz-title="📝 Lorem Generator —" data-dkz-icon="📦" data-dkz-separable="true">

    <script>
    // DkZ XSS Protection
    function esc(s) {

        const W = {
            lorem: 'lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum'.split(' '),
            hipster: 'artisan craft beer portland sustainable organic vinyl typewriter aesthetic fixie messenger bag farm-to-table kombucha sriracha cold-pressed avocado toast gluten-free vegan kale chips meditation yoga mindfulness sourdough matcha oat milk brunch aesthetic gallery wall terrazzo plant-based heirloom vintage thrift upcycled minimalist slow-living intentional hygge cozy neutral palette earth tones'.split(' '),
            tech: 'API server database node module webpack docker kubernetes microservice endpoint REST GraphQL authentication token middleware pipeline CI/CD deployment container orchestration cloud serverless lambda function callback promise async await component render state props hooks context reducer dispatch action payload middleware saga thunk selector slice store provider consumer'.split(' '),
            deutsch: 'Entwicklung System Architektur Modul Verwaltung Schnittstelle Datenbank Konfiguration Prozess Analyse Optimierung Sicherheit Qualität Struktur Framework Plattform Integration Automatisierung Dokumentation Funktion Service Anwendung Benutzer Oberfläche Dashboard Projekt Ressource Komponente Werkzeug'.split(' ')
        };
        const NAMES = ['Max Müller', 'Anna Schmidt', 'Thomas Wagner', 'Maria Fischer', 'Stefan Weber', 'Laura Meyer', 'Michael Becker', 'Julia Koch', 'Andreas Richter', 'Sophie Braun', 'Markus Hoffmann', 'Lena Schneider'];
        const DOMAINS = ['gmail.com', 'outlook.de', 'web.de', 'gmx.de', 'icloud.com', 'protonmail.com', 'dkz.dev'];
        function gen() {
            const type = document.getElementById('type').value, unit = document.getElementById('unit').value, count = +document.getElementById('count').value;
            let text = '';
            if (type === 'names') { text = Array.from({ length: count }, () => NAMES[Math.floor(Math.random() * NAMES.length)]).join('\n'); document.getElementById('out').textContent = text; updateInfo(text); return }
            if (type === 'emails') { text = Array.from({ length: count }, () => { const n = NAMES[Math.floor(Math.random() * NAMES.length)].toLowerCase().replace(' ', '.'); return n + '@' + DOMAINS[Math.floor(Math.random() * DOMAINS.length)] }).join('\n'); document.getElementById('out').textContent = text; updateInfo(text); return }
            const words = W[type] || W.lorem;
            if (unit === 'words') { text = Array.from({ length: count }, () => words[Math.floor(Math.random() * words.length)]).join(' ') }
            else if (unit === 'sentences') { text = Array.from({ length: count }, () => makeSentence(words)).join(' ') }
            else if (unit === 'list') { text = Array.from({ length: count }, (_, i) => `${i + 1}. ${makeSentence(words)}`).join('\n') }
            else { text = Array.from({ length: count }, () => { const n = 3 + Math.floor(Math.random() * 4); return Array.from({ length: n }, () => makeSentence(words)).join(' ') }).join('\n\n') }
            document.getElementById('out').textContent = text; updateInfo(text)
        }
        function makeSentence(words) { const len = 5 + Math.floor(Math.random() * 10); const s = Array.from({ length: len }, () => words[Math.floor(Math.random() * words.length)]).join(' '); return s.charAt(0).toUpperCase() + s.slice(1) + '.' }
        function updateInfo(t) { document.getElementById('iW').textContent = t.split(/\s+/).filter(Boolean).length; document.getElementById('iC').textContent = t.length; document.getElementById('iS').textContent = (t.match(/\./g) || []).length }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }
        gen();
    </script>
