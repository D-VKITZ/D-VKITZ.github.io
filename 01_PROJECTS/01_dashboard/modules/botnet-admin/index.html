<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="dkz-module" content="botnet-admin">
    <title>DkZâ„¢ BotNetâ„¢ Admin</title>
    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bn-accent: #6366f1;
            --bn-green: #00ff88;
            --bn-red: #fa1e4e;
            --bn-yellow: #FFB800;
            --bn-blue: #55ACEE;
            --bn-purple: #a855f7;
            --bn-bg: #0a0a0c;
            --bn-card: #111114;
            --bn-border: #1e1e22;
            --bn-text: #f6f6f7;
            --bn-muted: #71717a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bn-bg);
            color: var(--bn-text);
            min-height: 100vh;
        }

        /* Login Gate */
        #login-gate {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--bn-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        #login-gate.hidden {
            display: none;
        }

        .login-box {
            background: var(--bn-card);
            border: 1px solid var(--bn-border);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            text-align: center;
        }

        .login-box h2 {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .login-box .subtitle {
            font-size: 11px;
            color: var(--bn-muted);
            margin-bottom: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0, 0, 0, .4);
            border: 1px solid var(--bn-border);
            border-radius: 8px;
            color: var(--bn-text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--bn-accent);
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: var(--bn-accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .login-box button:hover {
            filter: brightness(1.2);
        }

        .login-error {
            color: var(--bn-red);
            font-size: 11px;
            margin-top: 8px;
        }

        /* Main Layout */
        .admin-wrap {
            display: grid;
            grid-template-columns: 220px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--bn-card);
            border-right: 1px solid var(--bn-border);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-logo {
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 16px;
            text-align: center;
        }

        .sidebar-logo span {
            color: var(--bn-accent);
        }

        .sidebar-btn {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: transparent;
            color: var(--bn-muted);
            text-align: left;
            width: 100%;
        }

        .sidebar-btn:hover,
        .sidebar-btn.active {
            background: rgba(99, 102, 241, .15);
            color: var(--bn-text);
        }

        .sidebar-btn .icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
        }

        .sidebar-badge {
            margin-left: auto;
            background: var(--bn-accent);
            color: #fff;
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 800;
        }

        .sidebar-section {
            font-size: 9px;
            font-weight: 700;
            color: var(--bn-muted);
            text-transform: uppercase;
            padding: 12px 12px 4px;
            letter-spacing: 1px;
        }

        /* Content */
        .content {
            padding: 20px;
            overflow-y: auto;
        }

        .content-header {backdrop-filter:blur(20px);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .content-header h1 {
            font-size: 18px;
            font-weight: 800;
        }

        .content-header .tag {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(99, 102, 241, .2);
            color: var(--bn-accent);
            font-weight: 700;
        }

        /* Cards */
        .card {
            background: var(--bn-card);
            border: 1px solid var(--bn-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .stat-card {
            background: rgba(0, 0, 0, .3);
            border: 1px solid var(--bn-border);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
        }

        .stat-label {
            font-size: 9px;
            color: var(--bn-muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Agent List */
        .agent-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-size: 11px;
        }

        .agent-row:hover {
            background: rgba(99, 102, 241, .05);
        }

        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .agent-name {
            font-weight: 700;
            min-width: 140px;
        }

        .agent-type {
            color: var(--bn-muted);
            font-size: 10px;
            min-width: 80px;
        }

        .agent-karma {
            font-weight: 800;
            min-width: 40px;
            text-align: right;
        }

        /* Feed */
        .feed-entry {
            padding: 4px 8px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 1px solid rgba(255, 255, 255, .02);
            line-height: 1.6;
        }

        .feed-time {
            color: var(--bn-muted);
            font-size: 9px;
        }

        .feed-from {
            color: var(--bn-blue);
            font-weight: 700;
        }

        .feed-perf {
            font-weight: 800;
        }

        .feed-channel {
            color: var(--bn-purple);
        }

        /* Pack Station */
        .drop-zone {
            border: 2px dashed var(--bn-border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--bn-accent);
            background: rgba(99, 102, 241, .05);
        }

        .drop-zone .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .drop-zone .text {
            font-size: 12px;
            color: var(--bn-muted);
        }

        /* Training */
        .course-card {
            background: rgba(0, 0, 0, .3);
            border: 1px solid var(--bn-border);
            border-radius: 10px;
            padding: 14px;
        }

        .course-title {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .course-meta {
            font-size: 9px;
            color: var(--bn-muted);
            display: flex;
            gap: 8px;
        }

        .course-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: 700;
        }

        .badge-basic {
            background: rgba(0, 255, 136, .15);
            color: var(--bn-green);
        }

        .badge-intermediate {
            background: rgba(255, 184, 0, .15);
            color: var(--bn-yellow);
        }

        .badge-advanced {
            background: rgba(250, 30, 78, .15);
            color: var(--bn-red);
        }

        /* Encryption indicator */
        .encrypted-badge {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0, 255, 136, .1);
            color: var(--bn-green);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Channel tabs */
        .channel-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .channel-tab {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--bn-border);
            background: transparent;
            color: var(--bn-muted);
        }

        .channel-tab:hover,
        .channel-tab.active {
            background: rgba(99, 102, 241, .15);
            color: var(--bn-text);
            border-color: var(--bn-accent);
        }
    /* DkZ v2 BG Blobs */body::before{content:"";position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(250,30,78,.07),transparent 70%);pointer-events:none;z-index:0}body::after{content:"";position:fixed;bottom:-150px;left:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(168,85,247,.06),transparent 70%);pointer-events:none;z-index:0}
</style>
<script src="../../shared/dkz-updater.js"></script>
</head>

    <script>
        // ========================================
        // AUTH: Admin-only Login Gate
        // ========================================
        const ADMIN_HASH = '6e3f5dc3b8e2a1d4'; // Simple hash check
        const ENCRYPTION_KEY_STORE = 'dkz-botnet-admin-key';

        function hashKey(key) {
            let hash = 0;
            for (let i = 0; i < key.length; i++) {
                const ch = key.charCodeAt(i);
                hash = ((hash << 5) - hash) + ch;
                hash |= 0;
            }
            return Math.abs(hash).toString(16).substring(0, 16);
        }

        function attemptLogin() {
            const key = document.getElementById('admin-key').value;
            if (!key) return;

            // Store encryption key for message decryption
            sessionStorage.setItem(ENCRYPTION_KEY_STORE, key);

            // Any key that is 8+ chars and known to admin works
            if (key.length >= 8) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('admin-main').style.display = 'grid';
                initDashboard();
            } else {
                document.getElementById('login-error').textContent = '? Schluessel zu kurz (min. 8 Zeichen)';
            }
        }

        // Auto-login if key stored
        if (sessionStorage.getItem(ENCRYPTION_KEY_STORE)) {
            document.getElementById('login-gate').classList.add('hidden');
            document.getElementById('admin-main').style.display = 'grid';
            setTimeout(initDashboard, 100);
        }

                { id: 'loop-agent', name: 'Loop Agent', type: 'loop', role: 'debugger', karma: 92, skills: ['optimization:Performance'], capabilities: ['scan', 'lint', 'fix', 'recheck'] },

        // ========================================
        // PANELS

        const PERF_ICONS = { REQUEST: '??', INFORM: '??', QUERY: '?', PROPOSE: '??', DISCUSS: '??', REPORT: '??', TRADE: '??' };

        function showPanel(name) {
            STATE.currentPanel = name;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.sidebar-btn')?.classList.add('active');

            const panels = {

                channels: renderChannels,

                exitaudit: renderExitAudit

        }

        function renderOverview() {
            const c = document.getElementById('content-area');
            c.innerHTML = `

            <div class="stat-card"><div class="stat-value" style="color:var(--bn-green)">100</div><div class="stat-label">� Karma</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--bn-blue)">0</div><div class="stat-label">Externe Bots</div></div>
        </div>
        <div class="card" style="margin-top:12px">
            <div class="card-title">?? Letzte Nachrichten</div>
            ${STATE.feed.slice(-5).reverse().map(m => `
                <div class="feed-entry">
                    <span class="feed-time">${new Date(m.timestamp).toLocaleTimeString('de-DE')}</span>
