<!DOCTYPE html>
<html lang="de">

    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 KI-Lernplattform — DkZâ„¢ v0.01</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --purple: #ec4899;
            --accent: #fa1e4e;
            --accent-rgb: 250, 30, 78;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--blue);
            top: -10%;
            left: 20%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--purple);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            text-decoration: none;
            font-family: var(--font)
        }

        .back-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .content {
            padding: 20px 28px;
            flex: 1
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 20px
        }

        .stat {
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            transition: all .3s
        }

        .stat:hover {
            transform: translateY(-2px)
        }

        .stat .sv {
            font-size: 22px;
            font-weight: 800;
            font-family: var(--mono)
        }

        .stat .sl {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 3px
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
            margin-bottom: 20px
        }

        .course-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all .3s;
            cursor: pointer
        }

        .course-card:hover {
            border-color: rgba(var(--accent-rgb), .4);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .4)
        }

        .cc-banner {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px
        }

        .cc-body {
            padding: 16px
        }

        .cc-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .cc-desc {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 10px
        }

        .cc-meta {
            display: flex;
            gap: 8px;
            font-size: 9px;
            color: var(--muted);
            align-items: center
        }

        .cc-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 8px
        }

        .cc-progress {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden
        }

        .cc-bar {
            height: 100%;
            border-radius: 2px;
            transition: width .5s
        }

        .cc-lessons {
            font-size: 10px;
            color: var(--muted);
            font-family: var(--mono);
            margin-top: 4px
        }

        .lesson-viewer {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: none;
            animation: fi .3s ease
        }

        .lesson-viewer.open {
            display: block
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .lv-head {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .lv-head h2 {
            font-size: 16px;
            font-weight: 800;
            flex: 1
        }

        .lv-close {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .lv-close:hover {
            color: var(--red)
        }

        .lv-sidebar {
            display: flex;
            gap: 0
        }

        .lv-nav {
            width: 200px;
            border-right: 1px solid var(--border);
            padding: 8px;
            overflow-y: auto;
            max-height: 500px
        }

        .lv-nav-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-bottom: 2px;
            transition: all .15s
        }

        .lv-nav-item:hover {
            background: rgba(255, 255, 255, .04)
        }

        .lv-nav-item.active {
            background: rgba(var(--accent-rgb), .1);
            color: var(--accent)
        }

        .lv-nav-item.completed {
            opacity: .6
        }

        .lv-content {
            flex: 1;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.8
        }

        .lv-content h3 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .lv-content p {
            margin-bottom: 12px;
            color: var(--muted)
        }

        .lv-content code {
            background: var(--card2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 12px
        }

        .lv-content pre {
            background: var(--card2);
            padding: 12px;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 11px;
            overflow-x: auto;
            margin: 12px 0
        }

        .lv-foot {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            justify-content: flex-end
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="ki-lernplattform" data-dkz-appid="DKZ-MOD-KI-" data-dkz-version="v0.01" data-dkz-title="🎓 KI-Lernplattform —" data-dkz-icon="📦" data-dkz-separable="true">

        <div class="bg-blob"></div>

            <h1>🎓 KI-Lernplattform</h1>
            <div class="hdr-right"><span class="ver">v0.01</span></div>
        </div>
        <div class="content">
            <div class="stats-row">
                <div class="stat">
                    <div class="sv" style="color:var(--accent)" id="sCourses">6</div>
                    <div class="sl">Kurse</div>
                </div>
                <div class="stat">
                    <div class="sv" style="color:var(--green)" id="sCompleted">0</div>
                    <div class="sl">Abgeschlossen</div>
                </div>
                <div class="stat">
                    <div class="sv" style="color:var(--blue)" id="sLessons">0</div>
                    <div class="sl">Lektionen</div>
                </div>
                <div class="stat">
                    <div class="sv" style="color:var(--yellow)" id="sProgress">0%</div>
                    <div class="sl">Fortschritt</div>
                </div>
            </div>
            <div class="course-grid" id="courseGrid"></div>
            <div class="lesson-viewer" id="lessonViewer">
                <div class="lv-head">
                    <h2 id="lvTitle"></h2><button class="lv-close" onclick="closeLesson()">✕</button>
                </div>
                <div class="lv-sidebar">
                    <div class="lv-nav" id="lvNav"></div>
                    <div class="lv-content" id="lvContent"></div>
                </div>
                <div class="lv-foot"><button class="btn secondary" onclick="prevLesson()">← Zurück</button><button
                        class="btn" onclick="completeLesson()">✅ Abschließen</button><button class="btn"
                        onclick="nextLesson()">Weiter →</button></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    // DkZ XSS Protection
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
        const COURSES = [
            {
                id: 'prompt', icon: '🎯', title: 'Prompt Engineering Masterclass', desc: 'Von Zero-Shot bis Tree-of-Thought — lerne die wichtigsten Prompting-Techniken.', color: 'var(--accent)', tag: 'Fortgeschritten', tagColor: 'rgba(250,30,78,.15)', lessons: [
                    { title: 'Grundlagen', content: '<h3>Prompt Engineering Grundlagen</h3><p>Prompts sind die Schnittstelle zwischen Mensch und KI. Ein guter Prompt enthält:</p><pre>Rolle + Kontext + Aufgabe + Format + Constraints</pre><p>Beispiel:</p><pre>Du bist ein erfahrener Python-Entwickler.\nAnalysiere den Code auf Fehler.\nGib die Ergebnisse als nummerierte Liste aus.\nMaximal 5 Punkte.</pre>' },
                    { title: 'Zero-Shot', content: '<h3>Zero-Shot Prompting</h3><p>Direkte Anweisung ohne Beispiele. Funktioniert bei einfachen Aufgaben gut.</p><pre>Übersetze "Hello World" ins Deutsche.</pre>' },
                    { title: 'Few-Shot', content: '<h3>Few-Shot Prompting</h3><p>Gib 2-5 Beispiele vor der eigentlichen Aufgabe.</p><pre>Positiv: "Tolles Produkt!" → Sentiment: Positiv\nNegativ: "Schlechter Service." → Sentiment: Negativ\n"Gute Qualität, langsame Lieferung." → Sentiment: ?</pre>' },
                    { title: 'Chain-of-Thought', content: '<h3>Chain-of-Thought (CoT)</h3><p>"Denke Schritt für Schritt" — die magischen Worte für komplexe Aufgaben.</p><pre>Löse die Aufgabe Schritt für Schritt:\nWenn ein Zug 120km/h fährt und 300km zurücklegen muss, wie lange dauert die Fahrt?</pre>' },
                    { title: 'Tree-of-Thought', content: '<h3>Tree-of-Thought (ToT)</h3><p>Mehrere Lösungswege gleichzeitig explorieren und vergleichen.</p><pre>Betrachte 3 verschiedene Ansätze:\n1. Ansatz A: ...\n2. Ansatz B: ...\n3. Ansatz C: ...\nVergleiche und wähle den besten.</pre>' },
                ]
            },
            {
                id: 'agents', icon: '🤖', title: 'KI-Agenten verstehen', desc: 'Architektur, Patterns und Implementierung von autonomen KI-Agenten.', color: 'var(--blue)', tag: 'Expert', tagColor: 'rgba(85,172,238,.15)', lessons: [
                    { title: 'Was sind Agenten?', content: '<h3>KI-Agenten</h3><p>Ein KI-Agent ist ein System das:</p><p>1. <strong>Wahrnimmt</strong> (Input analysiert)<br>2. <strong>Denkt</strong> (Entscheidungen trifft)<br>3. <strong>Handelt</strong> (Aktionen ausführt)<br>4. <strong>Lernt</strong> (Feedback integriert)</p>' },
                    { title: 'Architektur', content: '<h3>Agent-Architektur</h3><pre>┌─ Perception Layer\n├─ Reasoning Layer\n├─ Action Layer\n├─ Memory Layer\n└─ Learning Layer</pre>' },
                    { title: 'Tools & APIs', content: '<h3>Tool Use</h3><p>Agenten nutzen externe Tools via APIs. Beispiele: Web-Suche, Code-Ausführung, Dateisystem.</p>' },
                ]
            },
            {
                id: 'llm', icon: '🧠', title: 'LLM Grundlagen', desc: 'Transformer, Attention, Tokenization — wie funktionieren Large Language Models?', color: 'var(--green)', tag: 'Einsteiger', tagColor: 'rgba(0,255,136,.15)', lessons: [
                    { title: 'Transformer', content: '<h3>Transformer-Architektur</h3><p>Die Basis aller modernen LLMs ist die Transformer-Architektur (2017, "Attention is All You Need").</p>' },
                    { title: 'Tokenization', content: '<h3>Tokenization</h3><p>Text wird in Tokens zerlegt. "Hello World" → ["Hello", " World"]. GPT-4 nutzt ~100K Tokens.</p>' },
                    { title: 'Attention', content: '<h3>Self-Attention</h3><p>Jedes Token "achtet" auf alle anderen Tokens. Das ermöglicht kontextabhängiges Verständnis.</p>' },
                ]
            },
            {
                id: 'rag', icon: '📚', title: 'RAG & Embeddings', desc: 'Retrieval-Augmented Generation — eigene Daten mit KI verbinden.', color: 'var(--yellow)', tag: 'Fortgeschritten', tagColor: 'rgba(255,184,0,.15)', lessons: [
                    { title: 'RAG Konzept', content: '<h3>RAG</h3><p>Retrieval-Augmented Generation kombiniert eine Wissensdatenbank mit einem LLM.</p><pre>Query → Embedding → Vektor-Suche → Kontext → LLM → Antwort</pre>' },
                    { title: 'Embeddings', content: '<h3>Embeddings</h3><p>Text wird in Vektoren umgewandelt. Ähnliche Texte haben ähnliche Vektoren.</p>' },
                ]
            },
            {
                id: 'ethics', icon: '⚖️', title: 'KI-Ethik & Sicherheit', desc: 'Bias, Halluzinationen, Datenschutz und verantwortungsvoller KI-Einsatz.', color: 'var(--purple)', tag: 'Alle Level', tagColor: 'rgba(236,72,153,.15)', lessons: [
                    { title: 'Bias', content: '<h3>Bias in KI</h3><p>KI-Modelle können Vorurteile aus den Trainingsdaten übernehmen. Wichtig: regelmäßige Audits.</p>' },
                    { title: 'Halluzinationen', content: '<h3>Halluzinationen</h3><p>LLMs können "halluzinieren" — plausibel klingende aber falsche Informationen generieren.</p>' },
                ]
            },
            {
                id: 'dkz', icon: '🏗️', title: 'DkZ Ökosystem', desc: 'Das DkZ-Design-System, Architektur und Modulentwicklung verstehen.', color: 'var(--accent)', tag: 'DkZ Intern', tagColor: 'rgba(250,30,78,.15)', lessons: [
                    { title: 'Design System', content: '<h3>DkZ Design System</h3><p>Kern-Variablen:</p><pre>--bg: #0e0e10\n--accent: #fa1e4e\n--green: #00ff88\n--font: Inter\n--mono: JetBrains Mono</pre>' },
                    { title: 'Modul-Struktur', content: '<h3>Module</h3><p>Jedes Tool ist eine standalone <code>index.html</code> mit eingebettetem CSS & JS.</p>' },
                ]
            },
        ];

        let progress = JSON.parse(localStorage.getItem('dkz-learn-progress') || '{}');
        let currentCourse = null, currentLesson = 0;

        function init() { renderCourses(); updateStats(); }
        function renderCourses() {
            document.getElementById('courseGrid').innerHTML = COURSES.map(c => {
                const completed = (progress[c.id] || []).length;
                const pct = Math.round(completed / c.lessons.length * 100);
                return `<div class="course-card" onclick="openCourse('${c.id}')">
            <div class="cc-banner" style="background:linear-gradient(135deg,${c.color},rgba(14,14,22,.8))">${c.icon}</div>
            <div class="cc-body"><div class="cc-title">${c.title}</div><div class="cc-desc">${c.desc}</div>
            <div class="cc-meta"><span class="cc-tag" style="background:${c.tagColor};color:${c.color}">${c.tag}</span><span>${c.lessons.length} Lektionen</span></div>
            <div class="cc-progress"><div class="cc-bar" style="width:${pct}%;background:${c.color}"></div></div>
            <div class="cc-lessons">${completed}/${c.lessons.length} abgeschlossen (${pct}%)</div></div></div>`
            }).join('')
        }

        function openCourse(id) {
            currentCourse = id; currentLesson = 0; const c = COURSES.find(x => x.id === id);
            document.getElementById('lvTitle').textContent = c.icon + ' ' + c.title;
            document.getElementById('lessonViewer').classList.add('open'); renderLessonNav(); showLesson(0);
        }
        function closeLesson() { document.getElementById('lessonViewer').classList.remove('open'); }
        function renderLessonNav() {
            const c = COURSES.find(x => x.id === currentCourse); const done = progress[currentCourse] || [];
            document.getElementById('lvNav').innerHTML = c.lessons.map((l, i) => `<div class="lv-nav-item ${i === currentLesson - 'active' : ''} ${done.includes(i) - 'completed' : ''}" onclick="showLesson(${i})">${done.includes(i) - '✅' : '📖'} ${l.title}</div>`).join('')
        }
        function showLesson(i) {
            currentLesson = i; const c = COURSES.find(x => x.id === currentCourse);
            document.getElementById('lvContent').innerHTML = c.lessons[i].content; renderLessonNav();
        }
        function completeLesson() {
            if (!progress[currentCourse]) progress[currentCourse] = [];
            if (!progress[currentCourse].includes(currentLesson)) { progress[currentCourse].push(currentLesson); localStorage.setItem('dkz-learn-progress', JSON.stringify(progress)); renderLessonNav(); renderCourses(); updateStats(); showToast('✅ Lektion abgeschlossen!') }
        }
        function nextLesson() { const c = COURSES.find(x => x.id === currentCourse); if (currentLesson < c.lessons.length - 1) showLesson(currentLesson + 1) }
        function prevLesson() { if (currentLesson > 0) showLesson(currentLesson - 1) }
        function updateStats() {
            const total = COURSES.reduce((a, c) => a + c.lessons.length, 0);
            const done = Object.values(progress).reduce((a, p) => a + p.length, 0);
            document.getElementById('sCourses').textContent = COURSES.length;
            document.getElementById('sCompleted').textContent = done;
            document.getElementById('sLessons').textContent = total;
            document.getElementById('sProgress').textContent = Math.round(done / total * 100) + '%'
        }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }
        init();
    </script>
