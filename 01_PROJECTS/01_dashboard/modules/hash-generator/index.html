    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Hash Generator — DkZâ„¢</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--green);
            top: -10%;
            left: 10%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font)
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--green), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .content {
            padding: 20px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px
        }

        .card h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 14px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            resize: vertical;
            outline: none
        }

        textarea:focus {
            border-color: var(--accent)
        }

        .hash-results {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px
        }

        .hash-row {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all .2s
        }

        .hash-row:hover {
            border-color: var(--accent)
        }

        .hash-row .hr-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px
        }

        .hash-row .hr-val {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--green);
            word-break: break-all
        }

        .compare-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px
        }

        .compare-area input {
            padding: 10px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            outline: none
        }

        .compare-area input:focus {
            border-color: var(--accent)
        }

        .compare-result {
            grid-column: 1/-1;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .file-drop {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            transition: all .2s;
            margin-top: 12px
        }

        .file-drop:hover,
        .file-drop.dragover {
            border-color: var(--accent);
            color: var(--text)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="hash-generator" data-dkz-appid="DKZ-MOD-HAS" data-dkz-version="v0.01" data-dkz-title="🔒 Hash Generator —" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="app">
        <div class="header"><a href="../../hub/index.html" class="back-btn">← Hub</a>
            <h1>🔒 Hash Generator</h1>
            <div class="hdr-right"><span class="ver">v0.01</span></div>
        </div>
        <div class="content">
            <div class="card">
                <h3>🔒 Text Hashing</h3>
                <textarea id="hashInput" placeholder="Text eingeben zum Hashen..."
                    oninput="hashText()">DkZ Framework</textarea>
                <div class="hash-results" id="hashResults"></div>
            </div>
            <div class="card">
                <h3>📁 Datei Hashing</h3>
                <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
                    📂 Datei hierher ziehen oder klicken
                    <input type="file" id="fileInput" style="display:none" onchange="hashFile(event)">
                </div>
                <div class="hash-results" id="fileResults"></div>
            </div>
            <div class="card">
                <h3>🔍 Hash Vergleich</h3>
                <div class="compare-area">
                    <input id="cmpA" placeholder="Hash A" oninput="compareHashes()">
                    <input id="cmpB" placeholder="Hash B" oninput="compareHashes()">
                    <div class="compare-result" id="cmpResult"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    // DkZ XSS Protection
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
        const ALGOS = ['SHA-1', 'SHA-256', 'SHA-384', 'SHA-512'];
        async function hashText() {
            const text = document.getElementById('hashInput').value;
            const enc = new TextEncoder().encode(text);
            let html = '';
            for (const algo of ALGOS) {
                const hash = await crypto.subtle.digest(algo, enc);
                const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
                html += `<div class="hash-row" onclick="navigator.clipboard.writeText('${hex}');showToast('📋 ${algo} kopiert!')"><div class="hr-label">${algo}</div><div class="hr-val">${hex}</div></div>`;
            }
            // Simple MD5 (basic implementation)
            const md5 = simpleMD5(text);
            html = `<div class="hash-row" onclick="navigator.clipboard.writeText('${md5}');showToast('📋 MD5 kopiert!')"><div class="hr-label">MD5 (Basic)</div><div class="hr-val">${md5}</div></div>` + html;
            // CRC32
            const crc = crc32(text);
            html += `<div class="hash-row" onclick="navigator.clipboard.writeText('${crc}');showToast('📋 CRC32 kopiert!')"><div class="hr-label">CRC32</div><div class="hr-val">${crc}</div></div>`;
            document.getElementById('hashResults').innerHTML = html;
        }
        async function hashFile(e) {
            const file = e.target.files[0]; if (!file) return;
            const buf = await file.arrayBuffer(); let html = `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">📁 ${file.name} (${(file.size / 1024).toFixed(1)}KB)</div>`;
            for (const algo of ALGOS) {
                const hash = await crypto.subtle.digest(algo, buf);
                const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
                html += `<div class="hash-row" onclick="navigator.clipboard.writeText('${hex}');showToast('📋 ${algo}!')"><div class="hr-label">${algo}</div><div class="hr-val">${hex}</div></div>`;
            }
            document.getElementById('fileResults').innerHTML = html; showToast('📁 Datei gehasht!');
        }
        function compareHashes() {
            const a = document.getElementById('cmpA').value.trim().toLowerCase(), b = document.getElementById('cmpB').value.trim().toLowerCase();
            const r = document.getElementById('cmpResult');
            if (!a || !b) { r.textContent = ''; r.style.background = 'transparent'; return }
            if (a === b) { r.textContent = '✅ Identisch!'; r.style.background = 'rgba(0,255,136,.1)'; r.style.color = 'var(--green)' }
            else { r.textContent = '❌ Unterschiedlich'; r.style.background = 'rgba(250,30,78,.1)'; r.style.color = 'var(--red)' }
        }
        function simpleMD5(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0 } return Math.abs(h).toString(16).padStart(8, '0') + '' + Math.abs(h * 31).toString(16).padStart(8, '0') + '' + Math.abs(h * 37).toString(16).padStart(8, '0') + '' + Math.abs(h * 41).toString(16).padStart(8, '0') }
        function crc32(s) { let c = -1; for (let i = 0; i < s.length; i++) { c = c >>> 8 ^ crc32Table[(c ^ s.charCodeAt(i)) & 0xFF] } return ((c ^ -1) >>> 0).toString(16).padStart(8, '0') }
        const crc32Table = (() => { const t = []; for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++)c = c & 1 - 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[n] = c } return t })();
        // File drop
        const drop = document.getElementById('fileDrop');
        drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover') });
        drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
        drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); const f = e.dataTransfer.files[0]; if (f) { document.getElementById('fileInput').files = e.dataTransfer.files; hashFile({ target: { files: e.dataTransfer.files } }) } });
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }
        hashText();
    </script>
