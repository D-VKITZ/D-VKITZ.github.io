<html lang="de">

    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 DkZâ„¢ Gallery — Templates & Previews</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--green);
            top: -10%;
            left: 10%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1
        }

        .header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font)
        }

        .back-btn:hover {
            border-color: var(--accent)
        }

        .header h1 {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--green), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            gap: 6px;
            align-items: center
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .controls {
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            background: var(--card)
        }

        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255, 255, 255, .02);
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text)
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff
        }

        .search-box {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--card2);
            color: var(--text);
            font-family: var(--font);
            font-size: 11px;
            outline: none;
            width: 200px
        }

        .search-box:focus {
            border-color: var(--accent)
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 24px
        }

        .tile {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all .3s;
            cursor: pointer;
            position: relative
        }

        .tile:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(250, 30, 78, .12)
        }

        .tile-preview {
            height: 160px;
            background: var(--card2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative
        }

        .tile-preview iframe {
            width: 200%;
            height: 200%;
            transform: scale(.5);
            transform-origin: 0 0;
            pointer-events: none;
            border: none
        }

        .tile-preview .preview-placeholder {
            font-size: 48px;
            opacity: .5
        }

        .tile-info {
            padding: 12px
        }

        .tile-name {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 2px
        }

        .tile-desc {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 6px;
            line-height: 1.4
        }

        .tile-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap
        }

        .tile-tag {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: 700;
            font-family: var(--mono)
        }

        .tile-tag.module {
            background: rgba(0, 255, 136, .1);
            color: var(--green)
        }

        .tile-tag.dashboard {
            background: rgba(85, 172, 238, .1);
            color: var(--blue)
        }

        .tile-tag.backend {
            background: rgba(255, 184, 0, .1);
            color: var(--yellow)
        }

        .tile-tag.template {
            background: rgba(250, 30, 78, .1);
            color: var(--accent)
        }

        .tile-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 2px 8px;
            background: var(--accent);
            color: #fff;
            font-size: 8px;
            font-weight: 800;
            border-radius: 6px;
            font-family: var(--mono)
        }

        .tile-actions {
            display: flex;
            gap: 4px;
            margin-top: 6px
        }

        .tile-act {
            padding: 3px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 8px;
            color: var(--muted);
            cursor: pointer;
            background: none;
            font-family: var(--font)
        }

        .tile-act:hover {
            border-color: var(--accent);
            color: var(--text)
        }

        .section-header {
            padding: 16px 24px 4px;
            font-size: 14px;
            font-weight: 900;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .section-header .sh-count {
            font-size: 10px;
            color: var(--muted);
            font-weight: 400;
            font-family: var(--mono)
        }

        .css-pool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            padding: 8px 24px 16px
        }

        .css-pool {
            padding: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all .2s
        }

        .css-pool:hover {
            border-color: var(--accent)
        }

        .css-pool-name {
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 4px
        }

        .css-pool-colors {
            display: flex;
            gap: 3px
        }

        .css-pool-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .1)
        }

        .css-pool-desc {
            font-size: 8px;
            color: var(--muted);
            margin-top: 4px
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 200;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.open {
            display: flex
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px
        }

        .modal h2 {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 12px
        }

        .modal pre {
            font-family: var(--mono);
            font-size: 10px;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--green);
            overflow-x: auto;
            cursor: pointer
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            cursor: pointer;
            color: var(--muted)
        }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s
        }

        .btn:hover {
            opacity: .85
        }

        .btn.sec {
            background: var(--card2);
            border: 1px solid var(--border)
        }

        .btn.sec:hover {
            border-color: var(--accent)
        }
    </style>

        let currentFilter = 'all';

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = GALLERY_ITEMS.filter(item => {
                if (currentFilter !== 'all' && item.t !== currentFilter) return false;
                if (q && !item.n.toLowerCase().includes(q) && !item.d.toLowerCase().includes(q) && !item.id.toLowerCase().includes(q)) return false;
                return true;
            });
            document.getElementById('galleryHeader').innerHTML = `📦 Module & Dashboards <span class="sh-count">— ${filtered.length} von ${GALLERY_ITEMS.length}</span>`;
            document.getElementById('gallery').innerHTML = filtered.map(item => `
    <div class="tile" onclick="openModule('${item.path}')">
      <div class="tile-preview">
        <span class="preview-placeholder">${item.icon}</span>
        <span class="tile-badge">${item.id}</span>
      </div>
      <div class="tile-info">
        <div class="tile-name">${item.icon} ${item.n}</div>
        <div class="tile-desc">${item.d}</div>
        <div class="tile-tags"><span class="tile-tag ${item.t}">${item.t}</span></div>
        <div class="tile-actions">
          <button class="tile-act" onclick="event.stopPropagation();openModule('${item.path}')">🔗 Öffnen</button>
          <button class="tile-act" onclick="event.stopPropagation();copyPrompt('${item.n}','${item.f}','${item.d}')">📝 Prompt</button>
          <button class="tile-act" onclick="event.stopPropagation();copyCSS()">🎨 CSS</button>
          <button class="tile-act" onclick="event.stopPropagation();showFeatures('${item.f}')">⚡ Features</button>
        </div>
      </div>
    </div>
  `).join('');
        }

        function renderCSSPools() {
            document.getElementById('cssPoolGrid').innerHTML = CSS_POOLS.map(p => `
    <div class="css-pool" onclick="showCSSModal('${p.name}','${p.css}','${p.desc}','${p.family}')">
      <div class="css-pool-name">${p.name}</div>
      <div class="css-pool-colors">${p.colors.map(c => `<div class="css-pool-dot" style="background:${c}"></div>`).join('')}</div>
      <div class="css-pool-desc">${p.desc}</div>
    </div>
  `).join('');
        }

        function openModule(path) { window.open(path, '_blank'); }

        function copyPrompt(name, folder, desc) {
            const prompt = `Erstelle/aktualisiere das DkZ Modul "${name}" (modules/${folder}/index.html):
${desc}

DkZ Design System:
- DkZ v2 CSS: bg:#000, card:#111, accent:#FF3131, green:#00ff88, blue:#55ACEE
- Alt v1 CSS: bg:#0e0e10, card:#1a1a1c, accent:#fa1e4e
- Fonts: Inter + JetBrains Mono (Google Fonts CDN)
- Glassmorphism Header sticky, blur(24px)
- Background Blobs animiert, Toast Notifications
- localStorage Key: dkz-${folder}
- Version v0.01
- ← Hub Button zu ../../hub/index.html

Lies ERST: BLAUPAUSE.md + modules/${folder}/features.json`;
            navigator.clipboard.writeText(prompt);
            showToast('📝 Prompt kopiert!');
        }

        function copyCSS() {
            const css = `:root{--bg:#0e0e10;--card:#1a1a1c;--card2:#222226;--border:#333338;--text:#f6f6f7;--muted:#a1a1aa;--green:#00ff88;--blue:#55ACEE;--yellow:#FFB800;--accent:#fa1e4e;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}`;
            navigator.clipboard.writeText(css);
            showToast('🎨 DkZ CSS kopiert!');
        }

        function showCSSModal(name, css, desc, family) {
            document.getElementById('modalContent').innerHTML = `
    <h2>🎨 ${name}</h2>
    <p style="color:var(--muted);font-size:11px;margin-bottom:12px">Familie: <b>${family}</b> — ${desc}</p>
    <pre onclick="navigator.clipboard.writeText(this.textContent);showToast('📋 CSS kopiert!')">${css}</pre>
    <div style="margin-top:12px;display:flex;gap:6px">
      <button class="btn" onclick="navigator.clipboard.writeText(document.querySelector('.modal pre').textContent);showToast('📋 CSS kopiert!')">📋 Copy</button>
      <button class="btn sec" onclick="closeModal()">✖ Schließen</button>
    </div>`;
            document.getElementById('modal').classList.add('open');
        }

        function showFeatures(folder) {
            document.getElementById('modalContent').innerHTML = `
    <h2>⚡ Features: ${folder}</h2>
    <p style="color:var(--muted);font-size:11px;margin-bottom:12px">Lade features.json von modules/${folder}/...</p>
    <pre>Öffne modules/${folder}/features.json für den kompletten Feature-Status.</pre>
    <button class="btn sec" onclick="closeModal()" style="margin-top:12px">✖ Schließen</button>`;
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }

        renderCSSPools();
        render();
    </script>
