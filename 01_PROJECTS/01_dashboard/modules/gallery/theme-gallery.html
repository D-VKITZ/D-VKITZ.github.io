<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 DkZ™ Triple Theme Gallery</title>
    <meta name="description" content="DEVKiTZ Asset Gallery — 3 Design-Systeme, 9 Kombinationen">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="stylesheet" href="theme-gallery.css">
</head>
<body data-theme="dkz" data-mode="dunkel" data-dkz-module="gallery-themes" data-dkz-appid="DKZ-GAL-002" data-dkz-version="v1.0" data-dkz-title="Theme Gallery" data-dkz-icon="🎨">

    <!-- Background Blobs -->
    <div class="bg-mesh"><div class="bg-blob"></div><div class="bg-blob"></div></div>

    <!-- Topbar -->
    <div class="topbar">
        <a href="../../hub/index.html" style="padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.03);color:var(--muted);font-size:10px;text-decoration:none;font-family:var(--font)">← Hub</a>
        <h1 id="galleryTitle">🎨 Triple Theme Gallery</h1>
        <div class="topbar-right">
            <select class="theme-select" id="themeSelect" onchange="setTheme(this.value)">
                <option value="dkz">🔴 DkZ v2+</option>
                <option value="claude">🟤 Claude</option>
                <option value="stitch">🔵 Stitch</option>
            </select>
            <select class="mode-select" id="modeSelect" onchange="setMode(this.value)">
                <option value="dunkel">🌙 Dunkel</option>
                <option value="hell">☀️ Hell</option>
                <option value="matrix">💀 Matrix</option>
            </select>
            <span class="theme-badge" id="themeBadge">DkZ v2+ · Dark</span>
        </div>
    </div>

    <!-- Stats -->
    <div class="statsbar" id="statsInfo"></div>

    <!-- Filters -->
    <div class="filterbar" id="filterBar"></div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lbImg" src="" alt="Preview">
        <div class="lightbox-info">
            <h3 id="lbName"></h3>
            <p id="lbPrompt" style="cursor:pointer" onclick="copyText(this.textContent)" title="Klick = Prompt kopieren"></p>
        </div>
    </div>

    <!-- Engine -->
    <script src="theme-gallery.js"></script>

    <!-- DkZ Shared Scripts -->
    <script src="../../shared/dkz-debug.js"></script>
    <script src="../../shared/dkz-guide.js"></script>
    <script src="../../shared/dkz-crosslinks.js"></script>
    <script src="../../shared/dkz-navbar.js"></script>
    <script src="../../shared/dkz-headbar.js"></script>
    <script src="../../shared/dkz-console.js"></script>
</body>
<!-- © DEVKiTZ™ 2026 — All Rights Reserved -->
</html>
