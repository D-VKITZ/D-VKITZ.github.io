<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEVKiTZ™ — Element Templates Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0c;--s1:#111114;--s2:#1a1a1e;--s3:#252529;--tx:#e8e8ec;--t2:#888;--ad:#fa1e4e;--ad2:#ff6b35;--gn:#4ade80;--bl:#55acee;--vl:#a855f7;--rd:8px;font-family:'Inter','Segoe UI',sans-serif}
body{background:var(--bg);color:var(--tx);min-height:100vh}
a{color:var(--ad);text-decoration:none}

/* TOPBAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--s2);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.topbar .logo{font-weight:800;font-size:18px;color:var(--ad);letter-spacing:2px}
.topbar .title{font-size:14px;color:var(--t2);text-transform:uppercase;letter-spacing:3px}
.topbar .count{margin-left:auto;color:var(--gn);font-weight:700;font-size:14px}
.back-link{font-size:13px;padding:6px 14px;background:var(--s2);border-radius:var(--rd);color:var(--tx);transition:.2s}&.back-link:hover{background:var(--s3)}

/* CONTROLS */
.controls{padding:16px 24px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;border-bottom:1px solid var(--s2);background:var(--s1)}
.ctrl-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ctrl-label{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin-right:4px;white-space:nowrap}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--s3);background:transparent;color:var(--tx);cursor:pointer;transition:.2s;white-space:nowrap}
.chip:hover{border-color:var(--ad);color:var(--ad)}
.chip.active{background:var(--ad);border-color:var(--ad);color:#fff}
.chip.device-desktop.active{background:var(--bl);border-color:var(--bl)}
.chip.device-mobile.active{background:var(--vl);border-color:var(--vl)}
.chip.device-responsive.active{background:var(--gn);border-color:var(--gn);color:#000}
.search-input{padding:6px 14px;border-radius:20px;border:1px solid var(--s3);background:var(--s2);color:var(--tx);font-size:13px;width:200px;outline:none}
.search-input:focus{border-color:var(--ad)}
.sep{width:1px;height:24px;background:var(--s3);margin:0 8px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:24px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--s2);border-radius:var(--rd);overflow:hidden;cursor:pointer;transition:.3s;position:relative}
.card:hover{border-color:var(--ad);transform:translateY(-4px);box-shadow:0 12px 40px rgba(250,30,78,.15)}
.card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block}
.card-info{padding:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.card-cat{font-size:11px;color:var(--ad);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.card-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--s2);color:var(--t2)}
.card-device{position:absolute;top:8px;right:8px;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.card-device.desktop{background:rgba(85,172,238,.2);color:var(--bl)}
.card-device.mobile{background:rgba(168,85,247,.2);color:var(--vl)}
.card-device.responsive{background:rgba(74,222,128,.2);color:var(--gn)}
.card-id{position:absolute;top:8px;left:8px;font-size:10px;background:rgba(0,0,0,.7);padding:2px 8px;border-radius:10px;color:var(--t2);font-weight:700}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.lightbox.open{opacity:1;pointer-events:all}
.lb-inner{max-width:900px;width:90%;max-height:90vh;display:flex;gap:24px;flex-direction:column;overflow:auto}
.lb-img{width:100%;border-radius:var(--rd);max-height:50vh;object-fit:contain}
.lb-meta{background:var(--s1);border-radius:var(--rd);padding:20px}
.lb-title{font-size:20px;font-weight:800;margin-bottom:4px}
.lb-cat{font-size:12px;color:var(--ad);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.lb-section{margin-bottom:12px}
.lb-section-title{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.lb-prompt{font-size:13px;color:var(--tx);background:var(--s2);padding:12px;border-radius:var(--rd);line-height:1.5;font-style:italic}
.lb-tags{display:flex;flex-wrap:wrap;gap:4px}
.lb-tag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--s2);color:var(--t2);cursor:pointer;transition:.2s}
.lb-tag:hover{background:var(--ad);color:#fff}
.lb-device{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700}
.lb-refs{margin-top:8px}
.lb-ref{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;background:var(--s2);color:var(--bl);margin:2px;cursor:pointer;transition:.2s}
.lb-ref:hover{background:var(--bl);color:#fff}
.lb-close{position:fixed;top:20px;right:20px;background:var(--s2);border:none;color:var(--tx);font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer;z-index:201}
.lb-btns{display:flex;gap:8px;margin-top:12px}
.lb-btn{padding:8px 16px;border-radius:var(--rd);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.lb-btn.primary{background:var(--ad);color:#fff}.lb-btn.primary:hover{filter:brightness(1.2)}
.lb-btn.secondary{background:var(--s2);color:var(--tx)}.lb-btn.secondary:hover{background:var(--s3)}

/* STATS */
.stats-bar{display:flex;gap:16px;padding:8px 24px;background:var(--s1);border-bottom:1px solid var(--s2);overflow-x:auto}
.stat{font-size:12px;color:var(--t2);white-space:nowrap}.stat b{color:var(--ad)}

/* EMPTY */
.empty{text-align:center;padding:80px;color:var(--t2);font-size:16px}
.empty .emoji{font-size:48px;margin-bottom:16px}

/* NO-RESULTS */
.no-results{display:none;text-align:center;padding:60px;color:var(--t2)}
.no-results .emoji{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">DkZ</span>
  <span class="title">Element Templates</span>
  <a href="shop-gallery.html" class="back-link">← Shop Gallery & Builder</a>
  <span class="count" id="count">100 Elements</span>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Kategorie:</span>
    <button class="chip active" onclick="setCat('all',this)">Alle</button>
    <button class="chip" onclick="setCat('Footer',this)">Footer</button>
    <button class="chip" onclick="setCat('Hero',this)">Hero</button>
    <button class="chip" onclick="setCat('Pricing',this)">Pricing</button>
    <button class="chip" onclick="setCat('Navigation',this)">Navigation</button>
    <button class="chip" onclick="setCat('Social Proof',this)">Social Proof</button>
    <button class="chip" onclick="setCat('Backgrounds',this)">🖼️ Hintergruende</button>
    <button class="chip" onclick="setCat('Borders',this)">🔲 Raender</button>
    <button class="chip" onclick="setCat('Buttons',this)">🔘 Buttons</button>
    <button class="chip" onclick="setCat('Mockups',this)">🖼️ Mockups</button>
    <button class="chip" onclick="setCat('Backgrounds',this)">🖼️ Hintergruende</button>
    <button class="chip" onclick="setCat('Borders',this)">🔲 Raender</button>
    <button class="chip" onclick="setCat('Buttons',this)">🔘 Buttons</button>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Geräet:</span>
    <button class="chip device-desktop" onclick="setDevice('all',this)">Alle</button>
    <button class="chip device-desktop" onclick="setDevice('desktop',this)">🖥 Desktop</button>
    <button class="chip device-mobile" onclick="setDevice('mobile',this)">📱 Mobile</button>
    <button class="chip device-responsive" onclick="setDevice('responsive',this)">↔ Responsive</button>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Style:</span>
    <div id="style-tags"></div>
  </div>
  <div class="sep"></div>
  <input type="text" class="search-input" id="search" placeholder="🔍 Suche..." oninput="applyFilters()">
</div>

<div class="grid" id="grid"></div>
<div class="no-results" id="no-results"><div class="emoji">🔍</div><p>Keine Ergebnisse. Versuche andere Filter.</p></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <div class="lb-inner">
    <img class="lb-img" id="lb-img">
    <div class="lb-meta">
      <div class="lb-cat" id="lb-cat"></div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-section"><div class="lb-section-title">📱 Geraet</div><span class="lb-device" id="lb-device"></span></div>
      <div class="lb-section"><div class="lb-section-title">💡 Prompt</div><div class="lb-prompt" id="lb-prompt"></div></div>
      <div class="lb-section"><div class="lb-section-title">🏷 Tags</div><div class="lb-tags" id="lb-tags"></div></div>
      <div class="lb-section"><div class="lb-section-title">↗ Querverweise</div><div class="lb-refs" id="lb-refs"></div></div>
      <div class="lb-btns">
        <button class="lb-btn primary" onclick="copyPromptLB()">📋 Prompt kopieren</button>
        <button class="lb-btn secondary" onclick="useInBuilder()">🔨 Im Builder nutzen</button>
      </div>
    </div>
  </div>
</div>

<div id="toasts" style="position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px"></div>

<script src="gallery-data.js"></script>
<script>
let currentCat='all', currentDevice='all', activeTags=new Set(), currentLB=null;

function init(){
  renderStyleTags();
  renderStats();
  applyFilters();
  // auto-activate first device chip
  document.querySelectorAll('.ctrl-group')[1].querySelector('.chip').classList.add('active');
}

function renderStyleTags(){
  const allTags=new Set();
  ELEMENTS.forEach(e=>e.tags.forEach(t=>allTags.add(t)));
  document.getElementById('style-tags').innerHTML=[...allTags].sort().map(t=>
    `<button class="chip" onclick="toggleTag('${t}',this)">${t}</button>`
  ).join('');
}

function renderStats(){
  const cats={};
  ELEMENTS.forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+1});
  const devs={desktop:0,mobile:0,responsive:0};
  ELEMENTS.forEach(e=>{if(devs[e.device]!==undefined)devs[e.device]++});
  document.getElementById('stats-bar').innerHTML=
    Object.entries(cats).map(([k,v])=>`<span class="stat">${k}: <b>${v}</b></span>`).join('')+
    `<span class="stat">|</span>`+
    Object.entries(devs).map(([k,v])=>`<span class="stat">${k}: <b>${v}</b></span>`).join('');
}

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.ctrl-group')[0].querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setDevice(dev,btn){
  currentDevice=dev;
  document.querySelectorAll('.ctrl-group')[1].querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function toggleTag(tag,btn){
  if(activeTags.has(tag)){activeTags.delete(tag);btn.classList.remove('active')}
  else{activeTags.add(tag);btn.classList.add('active')}
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=ELEMENTS;
  if(currentCat!=='all') list=list.filter(e=>e.cat===currentCat);
  if(currentDevice!=='all') list=list.filter(e=>e.device===currentDevice);
  if(activeTags.size>0) list=list.filter(e=>[...activeTags].every(t=>e.tags.includes(t)));
  if(q) list=list.filter(e=>e.title.toLowerCase().includes(q)||e.prompt.toLowerCase().includes(q)||e.tags.some(t=>t.toLowerCase().includes(q)));

  document.getElementById('count').textContent=`${list.length} Elements`;
  document.getElementById('no-results').style.display=list.length===0?'block':'none';

  document.getElementById('grid').innerHTML=list.map(e=>`
    <div class="card" onclick="openLB('${e.id}')">
      <div class="card-id">${e.id}</div>
      <div class="card-device ${e.device}">${e.device==='desktop'?'🖥':'📱'} ${e.device}</div>
      <img src="elements/${e.file}.png" alt="${e.title}" loading="lazy">
      <div class="card-info">
        <div class="card-cat">${e.cat}</div>
        <div class="card-title">${e.title}</div>
        <div class="card-tags">${e.tags.slice(0,4).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function openLB(id){
  currentLB=ELEMENTS.find(e=>e.id===id);
  if(!currentLB)return;
  document.getElementById('lb-img').src=`elements/${currentLB.file}.png`;
  document.getElementById('lb-cat').textContent=currentLB.cat;
  document.getElementById('lb-title').textContent=currentLB.title;
  document.getElementById('lb-prompt').textContent=currentLB.prompt;
  const dv=document.getElementById('lb-device');
  dv.textContent=(currentLB.device==='desktop'?'🖥 Desktop':currentLB.device==='mobile'?'📱 Mobile':'↔ Responsive');
  dv.className='lb-device';dv.style.background=currentLB.device==='desktop'?'rgba(85,172,238,.2)':currentLB.device==='mobile'?'rgba(168,85,247,.2)':'rgba(74,222,128,.2)';
  dv.style.color=currentLB.device==='desktop'?'var(--bl)':currentLB.device==='mobile'?'var(--vl)':'var(--gn)';

  document.getElementById('lb-tags').innerHTML=currentLB.tags.map(t=>`<span class="lb-tag" onclick="toggleTag('${t}',null);closeLB();applyFilters()">${t}</span>`).join('');

  // Cross-references: find elements with shared tags
  const refs=ELEMENTS.filter(e=>e.id!==id&&e.tags.filter(t=>currentLB.tags.includes(t)).length>=2).slice(0,6);
  document.getElementById('lb-refs').innerHTML=refs.map(r=>`<span class="lb-ref" onclick="openLB('${r.id}')">${r.id} ${r.title}</span>`).join('');

  document.getElementById('lightbox').classList.add('open');
}

function closeLB(){document.getElementById('lightbox').classList.remove('open')}

function copyPromptLB(){
  if(!currentLB)return;
  navigator.clipboard.writeText(currentLB.prompt);
  showToast('Prompt kopiert!','success','📋');
}

function useInBuilder(){
  closeLB();
  window.location.href=`shop-gallery.html?prompt=${encodeURIComponent(currentLB.prompt)}`;
}

function showToast(msg,type,icon){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.style.cssText=`background:var(--s1);border:1px solid ${type==='success'?'var(--gn)':'var(--ad)'};padding:10px 16px;border-radius:8px;font-size:13px;display:flex;gap:8px;align-items:center;animation:fadeIn .3s`;
  t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2500);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB()});
init();
</script>
</body>
</html>
