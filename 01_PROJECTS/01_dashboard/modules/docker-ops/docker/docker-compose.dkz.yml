# DkZ™ Docker Ops — Master Compose
# ═══════════════════════════════════
# Alle DkZ Services auf VPS 1298466
# EU-konform: Alles lokal, kein Cloud
# Start: docker compose -f docker-compose.dkz.yml up -d

version: '3.8'

services:
  # ─── Node.js Datenbank (:9890) ───
  dkz-db:
    build:
      context: ./db-service
      dockerfile: ../Dockerfile.dkz-db
    image: dkz-docker-db:1.0.0
    container_name: dkz-docker-db
    ports:
      - "${DKZ_DB_PORT:-9890}:9890"
    environment:
      - DKZ_DB_PORT=9890
      - DKZ_DB_PATH=/app/data/docker-ops.db
      - NODE_ENV=production
    volumes:
      - dkz-db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9890/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "dkz.service=docker-ops-db"
      - "dkz.eu-compliant=true"
      - "dkz.keep=true"
    networks:
      - dkz-network

  # ─── ONTHERUN™ MCP Server (:3040) ───
  dkz-ontherun:
    build:
      context: /opt/dkz/ONTHERUN
      dockerfile: Dockerfile
    image: dkz-ontherun:latest
    container_name: dkz-ontherun
    ports:
      - "${DKZ_API_PORT:-3040}:3040"
    environment:
      - DKZ_API_PORT=3040
      - DKZ_ROOT=/opt/dkz
      - NODE_ENV=production
      - N8N_URL=http://dkz-n8n:5678
    env_file:
      - /opt/dkz/ONTHERUN/.env
    volumes:
      - /opt/dkz:/opt/dkz:ro
      - ontherun-config:/app/config
    depends_on:
      dkz-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3040/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "dkz.service=ontherun-mcp"
      - "dkz.eu-compliant=true"
      - "dkz.keep=true"
    networks:
      - dkz-network

  # ─── n8n Workflow Engine (:5678) ───
  dkz-n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: dkz-n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=dkz-redis
      - QUEUE_BULL_REDIS_PORT=6379
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=dkz-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-dkz_n8n_2026}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_TEMPLATES_ENABLED=true
      # EU-Konformität: Keine Telemetrie
      - N8N_DIAGNOSTICS_CONFIG_FRONTEND=
      - N8N_DIAGNOSTICS_CONFIG_BACKEND=
    volumes:
      - n8n-data:/home/node/.n8n
      - /opt/dkz/docker:/opt/dkz/docker:ro
    depends_on:
      dkz-postgres:
        condition: service_healthy
      dkz-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "dkz.service=n8n-workflow"
      - "dkz.eu-compliant=true"
      - "dkz.keep=true"
    networks:
      - dkz-network

  # ─── PostgreSQL für n8n (:5432) ───
  dkz-postgres:
    image: postgres:16-alpine
    container_name: dkz-postgres
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:-dkz_n8n_2026}
      - POSTGRES_DB=n8n
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "dkz.service=postgres"
      - "dkz.eu-compliant=true"
      - "dkz.keep=true"
    networks:
      - dkz-network

  # ─── Redis für n8n Queue Mode (:6379) ───
  dkz-redis:
    image: redis:7-alpine
    container_name: dkz-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - "dkz.service=redis"
      - "dkz.eu-compliant=true"
    networks:
      - dkz-network

# ─── Volumes (persistente Daten) ───
volumes:
  dkz-db-data:
    driver: local
    labels:
      dkz.eu-compliant: "true"
  n8n-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ontherun-config:
    driver: local

# ─── Netzwerk ───
networks:
  dkz-network:
    name: dkz-docker-ops
    driver: bridge
    labels:
      dkz.eu-compliant: "true"
