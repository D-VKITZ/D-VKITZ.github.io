<!DOCTYPE html>
<html lang="de">

    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 API Tester — DkZâ„¢</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--green);
            top: -10%;
            left: 10%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font)
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--green), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .content {
            padding: 20px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px
        }

        .card h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .req-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px
        }

        .method-sel {
            padding: 10px 14px;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: var(--mono);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer
        }

        .method-sel option {
            background: var(--card);
            color: var(--text)
        }

        .url-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            outline: none
        }

        .url-input:focus {
            border-color: var(--accent)
        }

        .send-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--card2);
            border-radius: 10px;
            margin-bottom: 12px
        }

        .tab {
            padding: 6px 14px;
            border: none;
            background: none;
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            border-radius: 6px
        }

        .tab:hover {
            color: var(--text)
        }

        .tab.active {
            background: var(--accent);
            color: #fff
        }

        .tab-body {
            display: none
        }

        .tab-body.active {
            display: block
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            resize: vertical;
            outline: none
        }

        .kv-list {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .kv-row {
            display: flex;
            gap: 6px
        }

        .kv-row input {
            flex: 1;
            padding: 6px 10px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            outline: none
        }

        .kv-row button {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 10px
        }

        .response-bar {
            display: flex;
            gap: 16px;
            padding: 10px;
            background: var(--card2);
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 12px
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-family: var(--mono);
            font-size: 11px
        }

        .resp-body {
            padding: 12px;
            background: #0a0a0c;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 11px;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
            color: var(--green);
            line-height: 1.5
        }

        .history {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 200px;
            overflow-y: auto
        }

        .hist-item {
            display: flex;
            gap: 8px;
            padding: 6px 10px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 10px;
            font-family: var(--mono);
            cursor: pointer;
            align-items: center
        }

        .hist-item:hover {
            border-color: var(--accent)
        }

        .hist-item .hm {
            font-weight: 700;
            color: var(--green);
            min-width: 40px
        }

        .hist-item .hu {
            flex: 1;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="api-tester" data-dkz-appid="DKZ-MOD-API" data-dkz-version="v0.01" data-dkz-title="🚀 API Tester —" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="app">
        <div class="header"><a href="../../hub/index.html" class="back-btn">← Hub</a>
            <h1>🚀 API Tester</h1>
            <div class="hdr-right"><span class="ver">v0.01</span></div>
        </div>
        <div class="content">
            <div class="card">
                <div class="req-bar">
                    <select class="method-sel" id="method">
                        <option>GET</option>
                        <option>POST</option>
                        <option>PUT</option>
                        <option>PATCH</option>
                        <option>DELETE</option>
                    </select>
                    <input class="url-input" id="url" value="https://jsonplaceholder.typicode.com/posts/1"
                        placeholder="https://api.example.com/endpoint">
                    <button class="send-btn" onclick="sendReq()">🚀 Senden</button>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="reqTab('headers',this)">Headers</button>
                    <button class="tab" onclick="reqTab('auth',this)">&#9881; Auth</button>
                    <button class="tab" onclick="reqTab('body',this)">Body</button>
                    <button class="tab" onclick="reqTab('params',this)">Params</button>
                </div>
                <div class="tab-body active" id="rtab-headers">
                    <div class="kv-list" id="headerList">
                        <div class="kv-row"><input placeholder="Key" value="Content-Type"><input placeholder="Value"
                                value="application/json"><button onclick="this.parentElement.remove()">✕</button></div>
                    </div><button class="btn secondary" onclick="addKV('headerList')" style="margin-top:6px">＋
                        Header</button>
                </div>
                <div class="tab-body" id="rtab-body"><textarea id="reqBody" placeholder='{"key": "value"}'></textarea>
                </div>
                <div class="tab-body" id="rtab-params">
                    <div class="kv-list" id="paramList"></div><button class="btn secondary" onclick="addKV('paramList')"
                        style="margin-top:6px">＋ Param</button>
                </div>
            </div>
            <div class="card">
                <h3>📥 Response</h3>
                <div class="response-bar" id="respBar" style="display:none"><span class="status-badge"
                        id="respStatus"></span><span id="respTime" style="color:var(--muted)"></span><span id="respSize"
                        style="color:var(--muted)"></span></div>
                <div class="resp-body" id="respBody">Noch keine Anfrage gesendet...</div>
            </div>
            <div class="card">
                <h3>📜 Verlauf</h3>
                <div class="history" id="historyList"></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    // DkZ XSS Protection
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
        let history = JSON.parse(localStorage.getItem('dkz-api-hist') || '[]');
        async function sendReq() {
            const method = document.getElementById('method').value; const url = document.getElementById('url').value;
            const headers = {}; document.querySelectorAll('#headerList .kv-row').forEach(r => { const [k, v] = r.querySelectorAll('input'); if (k.value) headers[k.value] = v.value });
            const opts = { method, headers }; if (['POST', 'PUT', 'PATCH'].includes(method)) { opts.body = document.getElementById('reqBody').value }
            document.getElementById('respBody').textContent = '⏳ Sende...'; const t0 = performance.now();
            try {
                const res = await fetch(url, opts); const elapsed = performance.now() - t0; const text = await res.text(); const size = new Blob([text]).size;
                document.getElementById('respBar').style.display = 'flex'; const sb = document.getElementById('respStatus'); sb.textContent = res.status + ' ' + res.statusText; sb.style.background = res.ok - 'rgba(0,255,136,.15)' : 'rgba(250,30,78,.15)'; sb.style.color = res.ok - 'var(--green)' : 'var(--red)';
                document.getElementById('respTime').textContent = elapsed.toFixed(0) + 'ms'; document.getElementById('respSize').textContent = (size / 1024).toFixed(1) + 'KB';
                try { document.getElementById('respBody').textContent = JSON.stringify(JSON.parse(text), null, 2) } catch (e) { document.getElementById('respBody').textContent = text }
                history.unshift({ method, url, status: res.status, time: elapsed.toFixed(0), ts: new Date().toISOString() }); if (history.length > 30) history = history.slice(0, 30); localStorage.setItem('dkz-api-hist', JSON.stringify(history)); renderHist()
            } catch (e) { document.getElementById('respBody').textContent = '❌ ' + e.message; document.getElementById('respBar').style.display = 'none' }
        }
        function addKV(listId) { const list = document.getElementById(listId); list.innerHTML += '<div class="kv-row"><input placeholder="Key"><input placeholder="Value"><button onclick="this.parentElement.remove()">✕</button></div>' }
        function reqTab(id, btn) { document.querySelectorAll('.card:first-child .tab-body').forEach(t => t.classList.remove('active')); document.querySelectorAll('.card:first-child .tab').forEach(t => t.classList.remove('active')); document.getElementById('rtab-' + id).classList.add('active'); btn.classList.add('active') }
        function renderHist() { document.getElementById('historyList').innerHTML = history.map(h => `<div class="hist-item" onclick="document.getElementById('method').value='${h.method}';document.getElementById('url').value='${h.url}'"><span class="hm">${h.method}</span><span class="hu">${h.url}</span><span style="color:${h.status < 400 - 'var(--green)' : 'var(--red)'}">${h.status}</span><span style="color:var(--muted)">${h.time}ms</span></div>`).join('') }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }
        renderHist();
    </script>

    <script src="../../shared/dkz-copilot.js"></script>
    <script src="../../shared/dkz-shortcuts.js"></script>
    <script src="../../shared/dkz-export.js"></script>
    <script src="../../shared/dkz-crosslinks.js"></script>

    <script src="../../shared/dkz-test.js"></script>
    <script src="../../shared/dkz-puter.js"></script>
    <script>if("serviceWorker" in navigator)navigator.serviceWorker.register("../../shared/sw.js").catch(()=>{});</script>
<div class="tab-body" id="rtab-auth" style="display:none">
<div style="display:flex;flex-direction:column;gap:8px">
<label style="font-size:11px;color:var(--muted)">Auth Typ</label>
<select class="input" id="authType" onchange="updateAuth()" style="width:100%">
<option value="none">Keine</option>
<option value="bearer">Bearer Token</option>
<option value="basic">Basic Auth</option>
<option value="apikey">API Key</option>
</select>
<div id="authFields"></div>
</div></div>
<script>
function updateAuth(){const t=document.getElementById('authType').value,f=document.getElementById('authFields');if(t==='bearer')f.innerHTML='<input class="input" id="authToken" placeholder="Bearer Token..." style="width:100%;margin-top:6px">';else if(t==='basic')f.innerHTML='<input class="input" id="authUser" placeholder="Username" style="width:100%;margin-top:6px"><input class="input" id="authPass" type="password" placeholder="Password" style="width:100%;margin-top:6px">';else if(t==='apikey')f.innerHTML='<input class="input" id="authKeyName" placeholder="Header Name" style="width:100%;margin-top:6px"><input class="input" id="authKeyVal" placeholder="API Key" style="width:100%;margin-top:6px">';else f.innerHTML=''}
function getAuthHeaders(){const t=document.getElementById('authType')?.value;if(t==='bearer'){const v=document.getElementById('authToken')?.value;return v?{'Authorization':'Bearer '+v}:{}}if(t==='basic'){const u=document.getElementById('authUser')?.value||'',p=document.getElementById('authPass')?.value||'';return u?{'Authorization':'Basic '+btoa(u+':'+p)}:{}}if(t==='apikey'){const n=document.getElementById('authKeyName')?.value,v=document.getElementById('authKeyVal')?.value;return n&&v?{[n]:v}:{}}return{}}
</script>

<!-- DkZ INFO + ONBOARDING -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:.3s" id="info-modal"><div style="background:#1a1a1c;border:1px solid #2a2a2e;border-radius:16px;padding:2rem;max-width:500px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><div style="font-size:1.25rem;font-weight:800">Api tester</div><button onclick="document.getElementById('info-modal').style.opacity='0';document.getElementById('info-modal').style.pointerEvents='none'" style="width:32px;height:32px;border:none;background:rgba(255,255,255,.05);border-radius:6px;color:#f6f6f7;cursor:pointer;font-size:1.25rem">&times;</button></div><p style="font-size:.875rem;color:#a0a0a0;line-height:1.8">Teste REST APIs mit GET, POST, PUT, DELETE Requests.</p></div></div>
<div style="position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1001;opacity:0;pointer-events:none;transition:.3s" id="onboarding"><div style="background:#1a1a1c;border:1px solid #2a2a2e;border-radius:16px;padding:2rem;max-width:420px;text-align:center"><div style="font-size:1.25rem;font-weight:800;margin-bottom:.75rem">Api tester</div><p style="font-size:.875rem;color:#a0a0a0;line-height:1.8;margin-bottom:1rem">Teste REST APIs mit GET, POST, PUT, DELETE Requests.</p><button style="width:100%;padding:.625rem;border:none;border-radius:6px;background:linear-gradient(135deg,#fa1e4e,#ec4899);color:#fff;font-weight:700;cursor:pointer;font-family:inherit" onclick="closeOnboarding()">Los geht's!</button><div style="font-size:.7rem;color:#606060;margin-top:.5rem">Wird nur 1x gezeigt</div></div></div>
<script>function showModuleInfo(){var m=document.getElementById('info-modal');m.style.opacity='1';m.style.pointerEvents='all'}function closeOnboarding(){var m=document.getElementById('onboarding');m.style.opacity='0';m.style.pointerEvents='none';localStorage.setItem('dkz-api-tester-onboarded','1')}if(!localStorage.getItem('dkz-api-tester-onboarded')){var ob=document.getElementById('onboarding');ob.style.opacity='1';ob.style.pointerEvents='all'}setTimeout(function(){var c=document.querySelector('.header-actions')||document.querySelector('header > div:last-child')||document.querySelector('.header > div:last-child')||document.querySelector('header')||document.querySelector('.header')||document.querySelector('[class*=header]');if(c&&!document.getElementById('dkz-info-btn')){var b=document.createElement('button');b.id='dkz-info-btn';b.innerHTML='&#9432;';b.title='Modul-Info';b.style.cssText='padding:.5rem;border:1px solid #2a2a2e;border-radius:6px;background:rgba(255,255,255,.05);color:#f6f6f7;font-size:1.1rem;cursor:pointer';b.onclick=function(){showModuleInfo()};c.insertBefore(b,c.firstChild)}},500);</script>    <script src="../../shared/dkz-headbar.js"></script>
    <script src="../../shared/dkz-navbar.js"></script>
    <script src="../../shared/dkz-console.js"></script>
</body>
