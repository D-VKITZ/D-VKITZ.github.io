<!DOCTYPE html>
<html lang="de">

    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#9881; Password Generator &#8212; DkZâ„¢</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--green);
            top: -10%;
            left: 10%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font)
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .content {
            padding: 20px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px
        }

        .card h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .pw-display {
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 700;
            padding: 20px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            letter-spacing: 2px;
            word-break: break-all;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            user-select: all;
            transition: all .3s
        }

        .pw-display:hover {
            border-color: var(--accent)
        }

        .strength-bar {
            height: 6px;
            background: var(--card2);
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden
        }

        .strength-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .4s, background .4s
        }

        .strength-label {
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all .2s;
            font-size: 12px
        }

        .opt:hover {
            border-color: var(--accent)
        }

        .opt.active {
            border-color: var(--green);
            background: rgba(0, 255, 136, .05)
        }

        .opt input[type=checkbox] {
            accent-color: var(--green);
            width: 16px;
            height: 16px
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px
        }

        .slider-row label {
            font-size: 11px;
            color: var(--muted);
            min-width: 60px
        }

        .slider-row input[type=range] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--card2);
            border-radius: 3px;
            outline: none
        }

        .slider-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer
        }

        .slider-row .val {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 700;
            min-width: 30px;
            text-align: center
        }

        .btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s
        }

        .btn:hover {
            box-shadow: 0 0 16px rgba(250, 30, 78, .3)
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .btn.secondary:hover {
            border-color: var(--accent)
        }

        .history {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 16px
        }

        .h-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 11px;
            font-family: var(--mono);
            cursor: pointer;
            transition: all .2s
        }

        .h-item:hover {
            border-color: var(--accent)
        }

        .h-item .h-pw {
            flex: 1;
            color: var(--green)
        }

        .h-item .h-str {
            font-size: 9px;
            font-weight: 700
        }

        .h-item button {
            padding: 3px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 9px
        }

        .batch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 8px;
            margin-top: 12px
        }

        .batch-item {
            padding: 10px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--green);
            cursor: pointer;
            transition: all .2s;
            word-break: break-all
        }

        .batch-item:hover {
            border-color: var(--accent)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="password-gen" data-dkz-appid="DKZ-MOD-PAS" data-dkz-version="v0.01" data-dkz-title="Password Generator" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="app">
        <div class="header"><a href="../../hub/index.html" class="back-btn">? Hub</a>
            <h1>&#9881; Password Generator</h1>
            <div class="hdr-right"><span class="ver">v0.01</span></div>
        </div>
        <div class="content">
            <div class="card">
                <div class="pw-display" id="pwDisplay"
                    onclick="navigator.clipboard.writeText(this.textContent);showToast('Kopiert!')">Klick zum
                    Generieren</div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strFill" style="width:0%"></div>
                </div>
                <div class="strength-label" id="strLabel"></div>
                <div class="slider-row">
                    <label>Laenge:</label>
                    <input type="range" min="4" max="128" value="16" id="lenSlider"
                        oninput="document.getElementById('lenVal').textContent=this.value;generate()">
                    <span class="val" id="lenVal">16</span>
                </div>
                <div class="options">
                    <label class="opt active"><input type="checkbox" checked
                            onchange="this.parentElement.classList.toggle('active');generate()"> Grossbuchstaben
                        (A-Z)</label>
                    <label class="opt active"><input type="checkbox" checked
                            onchange="this.parentElement.classList.toggle('active');generate()"> Kleinbuchstaben
                        (a-z)</label>
                    <label class="opt active"><input type="checkbox" checked
                            onchange="this.parentElement.classList.toggle('active');generate()"> Zahlen (0-9)</label>
                    <label class="opt active"><input type="checkbox" checked
                            onchange="this.parentElement.classList.toggle('active');generate()"> Symbole (!@#$%)</label>
                    <label class="opt"><input type="checkbox"
                            onchange="this.parentElement.classList.toggle('active');generate()"> Keine aehnlichen (0O,
                        1l)</label>
                    <label class="opt"><input type="checkbox"
                            onchange="this.parentElement.classList.toggle('active');generate()"> Aussprechbar</label>
                </div>
                <div class="btns">
                    <button class="btn" onclick="generate()">&#9881; Neu generieren</button>
                    <button class="btn secondary"
                        onclick="navigator.clipboard.writeText(document.getElementById('pwDisplay').textContent);showToast('Kopiert!')'">&#128203;
                        Kopieren</button>
                    <button class="btn secondary" onclick="saveToHistory()">&#128190; Speichern</button>
                    <button class="btn secondary" onclick="genBatch()">&#128194; 10er Batch</button>
                </div>
                <div class="batch-grid" id="batchGrid"></div>
            </div>
            <div class="card">
                <h3>&#9881; Passwort-Staerke pruefen</h3>
                <input type="text" id="checkPw" placeholder="Passwort eingeben..." oninput="checkStrength(this.value)"
                    style="width:100%;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none">
                <div id="checkResult" style="margin-top:10px;font-size:12px;color:var(--muted)"></div>
            </div>
            <div class="card">
                <h3>&#9881; Verlauf</h3>
                <div class="btns" style="margin-bottom:8px"><button class="btn secondary" onclick="clearHist()">&#128465;
                        Loeschen</button><button class="btn secondary" onclick="exportHist()">&#11015; Export</button></div>
                <div class="history" id="histList"></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        let hist = JSON.parse(localStorage.getItem('dkz-pw-hist') || '[]');
        const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', LOWER = 'abcdefghijklmnopqrstuvwxyz', NUMS = '0123456789', SYMS = '!@#$%^&*()_+-=[]{}|;:,.<>?';
        const SIMILAR = '0Oo1lIi'; const VOWELS = 'aeiouy', CONS = 'bcdfghjklmnpqrstvwxz';
        function generate() {
            const len = +document.getElementById('lenSlider').value; const checks = document.querySelectorAll('.options input[type=checkbox]');
            const useUpper = checks[0].checked, useLower = checks[1].checked, useNums = checks[2].checked, useSyms = checks[3].checked, noSimilar = checks[4].checked, pronounceable = checks[5].checked;
            let pw = '';
            if (pronounceable) { for (let i = 0; i < len; i++) { pw += i % 2 === 0 - CONS[Math.floor(Math.random() * CONS.length)] : VOWELS[Math.floor(Math.random() * VOWELS.length)] } if (useUpper) pw = pw.charAt(0).toUpperCase() + pw.slice(1); if (useNums) pw = pw.slice(0, -2) + NUMS[Math.floor(Math.random() * 10)] + NUMS[Math.floor(Math.random() * 10)] }
            else { let chars = ''; if (useUpper) chars += UPPER; if (useLower) chars += LOWER; if (useNums) chars += NUMS; if (useSyms) chars += SYMS; if (!chars) chars = LOWER; if (noSimilar) chars = [...chars].filter(c => !SIMILAR.includes(c)).join(''); const arr = new Uint32Array(len); crypto.getRandomValues(arr); pw = Array.from(arr).map(v => chars[v % chars.length]).join('') }
            document.getElementById('pwDisplay').textContent = pw; colorPw(pw); updateStrength(pw)
        }
        function colorPw(pw) { const el = document.getElementById('pwDisplay'); let html = ''; pw.split('').forEach(c => { let col = UPPER.includes(c) - 'var(--blue)' : LOWER.includes(c) - 'var(--text)' : NUMS.includes(c) - 'var(--yellow)' : 'var(--accent)'; html += `<span style="color:${col}">${c}</span>` }); el.innerHTML = html }
        function updateStrength(pw) { let score = 0; if (pw.length >= 8) score += 20; if (pw.length >= 12) score += 10; if (pw.length >= 16) score += 10; if (pw.length >= 24) score += 10; if (/[a-z]/.test(pw)) score += 10; if (/[A-Z]/.test(pw)) score += 10; if (/[0-9]/.test(pw)) score += 10; if (/[^a-zA-Z0-9]/.test(pw)) score += 10; if (new Set(pw).size >= pw.length * .7) score += 10; score = Math.min(100, score); const fill = document.getElementById('strFill'); const label = document.getElementById('strLabel'); fill.style.width = score + '%'; if (score < 30) { fill.style.background = 'var(--red)'; label.textContent = '&#9881; Schwach'; label.style.color = 'var(--red)' } else if (score < 60) { fill.style.background = 'var(--yellow)'; label.textContent = '&#9881; Mittel'; label.style.color = 'var(--yellow)' } else if (score < 80) { fill.style.background = 'var(--blue)'; label.textContent = '&#9881; Stark'; label.style.color = 'var(--blue)' } else { fill.style.background = 'var(--green)'; label.textContent = '&#9881; Sehr Stark'; label.style.color = 'var(--green)' } return score }
        function checkStrength(pw) { if (!pw) { document.getElementById('checkResult').innerHTML = ''; return } const score = updateStrength(pw); const issues = []; if (pw.length < 8) issues.push('? Mindestens 8 Zeichen'); if (!/[A-Z]/.test(pw)) issues.push('&#9881; Grossbuchstaben fehlen'); if (!/[0-9]/.test(pw)) issues.push('&#9881; Zahlen fehlen'); if (!/[^a-zA-Z0-9]/.test(pw)) issues.push('&#9881; Symbole fehlen'); if (new Set(pw).size < pw.length * .5) issues.push('&#9881; Zu viele Wiederholungen'); document.getElementById('checkResult').innerHTML = `<div>Score: <strong>${score}/100</strong></div>${issues.map(i => '<div>' + i + '</div>').join('')}` }
        function saveToHistory() { const pw = document.getElementById('pwDisplay').textContent; if (!pw || pw === 'Klick zum Generieren') return; hist.unshift({ pw, score: updateStrength(pw), created: new Date().toISOString() }); if (hist.length > 50) hist = hist.slice(0, 50); localStorage.setItem('dkz-pw-hist', JSON.stringify(hist)); renderHist(); showToast('Gespeichert!') }
        function renderHist() { document.getElementById('histList').innerHTML = hist.length - hist.map((h, i) => { const col = h.score >= 80 - 'var(--green)' : h.score >= 60 - 'var(--blue)' : h.score >= 30 - 'var(--yellow)' : 'var(--red)'; return `<div class="h-item" onclick="navigator.clipboard.writeText('${esc(h.pw)}');showToast('&#9881;')"><span class="h-pw">${esc(h.pw)}</span><span class="h-str" style="color:${col}">${h.score}%</span><button onclick="event.stopPropagation();hist.splice(${i},1);localStorage.setItem('dkz-pw-hist',JSON.stringify(hist));renderHist()">?</button></div>` }).join('') : '<div style="text-align:center;padding:20px;color:var(--muted)">Kein Verlauf</div>' }
        function clearHist() { hist = []; localStorage.removeItem('dkz-pw-hist'); renderHist(); showToast('Gelscht!') }
        function exportHist() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([hist.map(h => h.pw).join('\n')], { type: 'text/plain' })); a.download = 'passwords.txt'; a.click(); showToast('&#11015; Export!') }
        function genBatch() { const grid = document.getElementById('batchGrid'); grid.innerHTML = ''; for (let i = 0; i < 10; i++) { generate(); const pw = document.getElementById('pwDisplay').textContent; grid.innerHTML += `<div class="batch-item" onclick="navigator.clipboard.writeText(this.textContent);showToast('&#9881;')">${esc(pw)}</div>` } showToast('10 generiert!') }
        function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }
        generate(); renderHist();
    </script>
