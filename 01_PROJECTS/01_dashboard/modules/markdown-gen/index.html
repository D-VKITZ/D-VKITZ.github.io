<!DOCTYPE html>
<html lang="de">

    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Markdown Generator — DkZâ„¢ v0.01</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --purple: #ec4899;
            --accent: #fa1e4e;
            --accent-rgb: 250, 30, 78;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--green);
            top: -10%;
            left: 10%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--accent);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            transition: all .25s;
            text-decoration: none;
            font-family: var(--font)
        }

        .back-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--green), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .hdr-btn {
            padding: 7px 13px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-family: var(--font);
            font-size: 11px;
            cursor: pointer;
            transition: all .25s
        }

        .hdr-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .hdr-btn.active {
            background: var(--accent);
            color: #fff
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .content {
            padding: 20px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .form-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px
        }

        .form-section h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 10px
        }

        .form-input {
            padding: 9px 12px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            outline: none;
            width: 100%
        }

        .form-input:focus {
            border-color: var(--accent)
        }

        .form-input::placeholder {
            color: var(--muted)
        }

        .form-textarea {
            width: 100%;
            padding: 10px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            min-height: 60px;
            resize: vertical;
            outline: none
        }

        .form-textarea:focus {
            border-color: var(--accent)
        }

        .btn-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px
        }

        .insert-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: var(--font);
            font-size: 11px;
            cursor: pointer;
            transition: all .2s
        }

        .insert-btn:hover {
            color: var(--text);
            border-color: var(--accent);
            background: rgba(var(--accent-rgb), .05)
        }

        .tag-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px
        }

        .tag {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(var(--accent-rgb), .1);
            color: var(--accent);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .tag .x {
            cursor: pointer;
            opacity: .6
        }

        .tag .x:hover {
            opacity: 1
        }

        .tag-input {
            padding: 4px 10px;
            border: 1px solid var(--accent);
            border-radius: 20px;
            background: var(--card2);
            color: var(--text);
            font-size: 10px;
            font-family: var(--font);
            outline: none;
            width: 100px
        }

        .tag-input:focus {
            box-shadow: 0 0 0 2px rgba(var(--accent-rgb), .25)
        }

        .split-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px
        }

        @media(max-width:768px) {
            .split-view {
                grid-template-columns: 1fr
            }
        }

        .preview {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            overflow: auto;
            max-height: 60vh
        }

        .preview h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .preview-content {
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.8;
            color: var(--muted);
            white-space: pre-wrap
        }

        .result {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px
        }

        .result h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .result-content {
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.8;
            color: var(--green);
            white-space: pre-wrap;
            background: var(--card2);
            border-radius: 8px;
            padding: 12px;
            max-height: 400px;
            overflow: auto
        }

        .debug-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px
        }

        .dp-title {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 10px
        }

        .dp-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 8px
        }

        .dbg-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s
        }

        .dbg-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .dbg-btn.pass {
            border-color: var(--green);
            color: var(--green)
        }

        .dp-log {
            background: #0a0a0c;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            font-family: var(--mono);
            font-size: 10px;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.8;
            color: var(--muted)
        }

        .dp-log .pass {
            color: var(--green)
        }

        .dp-log .fail {
            color: var(--red)
        }

        .dp-log .info {
            color: var(--blue)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="markdown-gen" data-dkz-appid="DKZ-MOD-MAR" data-dkz-version="v0.01" data-dkz-title="📝 Markdown Generator —" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="app">
        <div class="header">
            <a href="../../hub/index.html" class="back-btn">← Hub</a>
            <h1>📝 Smart Markdown Generator</h1>
            <div class="hdr-right">
                <button class="hdr-btn" id="dbgT"
                    onclick="document.getElementById('dbgP').style.display=document.getElementById('dbgP').style.display==='none'&#10067;'block':'none';this.classList.toggle('active')">🧪</button>
                <span class="ver">v0.01</span>
            </div>
        </div>
        <div class="content">
            <div class="form-section">
                <h3>📋 Dokument-Struktur</h3>
                <div class="form-row">
                    <input class="form-input" id="title" placeholder="Titel (H1)">
                    <input class="form-input" id="h2" placeholder="Überschrift 2 (H2)">
                    <input class="form-input" id="h3" placeholder="Überschrift 3 (H3)">
                </div>
                <div class="form-textarea-wrap">
                    <textarea class="form-textarea" id="desc"
                        placeholder="Beschreibung / Textblock hinzufügen..."></textarea>
                </div>
                <div class="btn-bar" style="margin-top:10px">
                    <button class="insert-btn" onclick="addBlock('text')">📄 Text</button>
                    <button class="insert-btn" onclick="addBlock('code')">💻 Code</button>
                    <button class="insert-btn" onclick="addBlock('subtitle')">📌 Untertitel</button>
                    <button class="insert-btn" onclick="addBlock('numlist')">🔢 Numm. Liste</button>
                    <button class="insert-btn" onclick="addBlock('bullets')">• Listenpunkte</button>
                    <button class="insert-btn" onclick="addBlock('instructions')">📋 Anweisungen</button>
                    <button class="insert-btn" onclick="addBlock('table-md')">📊 Tabelle (MD)</button>
                    <button class="insert-btn" onclick="addBlock('table-sheets')">📊 Tabelle (Sheets)</button>
                </div>
                <div class="tag-bar" id="tagBar">
                    <span style="font-size:10px;color:var(--muted)">Tags:</span>
                    <input class="tag-input" id="tagInput" placeholder="Tag..."
                        onkeydown="if(event.key==='Enter'){event.preventDefault();addTagInline()}">
                    <button class="insert-btn" onclick="addTagInline()" style="padding:3px 8px;font-size:10px">+
                        Tag</button>
                </div>
            </div>

            <div class="split-view">
                <div class="preview">
                    <h3>👁️ Vorschau</h3>
                    <div class="preview-content" id="previewContent">Beginne mit dem Ausfüllen der Felder...</div>
                </div>
                <div class="result">
                    <h3>📋 Ergebnis <button class="insert-btn" style="float:right" onclick="copyResult()">📋
                            Kopieren</button><button class="insert-btn" style="float:right;margin-right:6px"
                            onclick="downloadMD()">📥 .md</button><button class="insert-btn"
                            style="float:right;margin-right:6px" onclick="downloadTXT()">📄 .txt</button></h3>
                    <div class="result-content" id="resultContent"></div>
                </div>
            </div>

            <div class="debug-panel" id="dbgP" style="display:none">
                <div class="dp-title">🧪 Test & Release</div>
                <div class="dp-actions"><button class="dbg-btn" onclick="testAll()">▶ Test</button><button
                        class="dbg-btn" onclick="testStress()">⚡ Stress</button><button class="dbg-btn"
                        onclick="testRelease()">📊 Release</button></div>
                <div class="dp-log" id="dLog">🔧 Bereit...\n</div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        let blocks = [];
        let tags = [];
        const STORAGE_KEY = 'dkz-md';

        // ── Secure HTML Escaping (full) ────────────────────
        function escapeHTML(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        const esc = escapeHTML; // alias

        // ── localStorage Auto-Save/Load ───────────────────
        function saveState() {
            try {
                const state = {
                    blocks, tags,
                    title: document.getElementById('title').value,
                    h2: document.getElementById('h2').value,
                    h3: document.getElementById('h3').value
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) { /* storage full */ }
        }
        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const state = JSON.parse(raw);
                blocks = state.blocks || [];
                tags = state.tags || [];
                if (state.title) document.getElementById('title').value = state.title;
                if (state.h2) document.getElementById('h2').value = state.h2;
                if (state.h3) document.getElementById('h3').value = state.h3;
                renderTags();
                generate();
            } catch (e) { /* ignore corrupt data */ }
        }

        function addBlock(type) {
            const desc = document.getElementById('desc').value.trim();
            switch (type) {
                case 'text': if (desc) blocks.push({ type: 'text', content: desc }); break;
                case 'code': blocks.push({ type: 'code', content: desc || '// Code hier...' }); break;
                case 'subtitle': if (desc) blocks.push({ type: 'h3', content: desc }); break;
                case 'numlist': if (desc) blocks.push({ type: 'numlist', content: desc.split('\n').filter(Boolean) }); break;
                case 'bullets': if (desc) blocks.push({ type: 'bullets', content: desc.split('\n').filter(Boolean) }); break;
                case 'instructions': if (desc) blocks.push({ type: 'instructions', content: desc }); break;
                case 'table-md': blocks.push({ type: 'table-md', content: desc || 'Spalte1,Spalte2\nWert1,Wert2' }); break;
                case 'table-sheets': blocks.push({ type: 'table-sheets', content: desc || 'Spalte1\tSpalte2\nWert1\tWert2' }); break;
            }
            document.getElementById('desc').value = '';
            generate();
            saveState();
            showToast('✅ Block hinzugefügt');
        }

        // ── Inline Tag Input (replaces window.prompt) ─────
        function addTagInline() {
            const input = document.getElementById('tagInput');
            const tag = input.value.trim();
            if (tag) { tags.push(tag); input.value = ''; renderTags(); generate(); saveState(); }
            input.focus();
        }

        // ── Safe Tag Rendering (no innerHTML XSS) ─────────
        function renderTags() {
            const bar = document.getElementById('tagBar');
            bar.innerHTML = '';
            const label = document.createElement('span');
            label.style.cssText = 'font-size:10px;color:var(--muted)';
            label.textContent = 'Tags:';
            bar.appendChild(label);
            tags.forEach((t, i) => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.textContent = t + ' ';
                const x = document.createElement('span');
                x.className = 'x';
                x.textContent = '✕';
                x.addEventListener('click', () => { tags.splice(i, 1); renderTags(); generate(); saveState(); });
                span.appendChild(x);
                bar.appendChild(span);
            });
            const input = document.createElement('input');
            input.className = 'tag-input';
            input.id = 'tagInput';
            input.placeholder = 'Tag...';
            input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTagInline(); } });
            bar.appendChild(input);
            const btn = document.createElement('button');
            btn.className = 'insert-btn';
            btn.style.cssText = 'padding:3px 8px;font-size:10px';
            btn.textContent = '+ Tag';
            btn.addEventListener('click', addTagInline);
            bar.appendChild(btn);
        }

        function generate() {
            const title = document.getElementById('title').value.trim();
            const h2 = document.getElementById('h2').value.trim();
            const h3Val = document.getElementById('h3').value.trim();
            let md = '';
            if (title) md += `# ${title}\n\n`;
            if (h2) md += `## ${h2}\n\n`;
            if (h3Val) md += `### ${h3Val}\n\n`;
            blocks.forEach(b => {
                switch (b.type) {
                    case 'text': md += b.content + '\n\n'; break;
                    case 'h3': md += `### ${b.content}\n\n`; break;
                    case 'code': md += '```\n' + b.content + '\n```\n\n'; break;
                    case 'numlist': b.content.forEach((item, i) => md += `${i + 1}. ${item}\n`); md += '\n'; break;
                    case 'bullets': b.content.forEach(item => md += `- ${item}\n`); md += '\n'; break;
                    case 'instructions': md += `> ${b.content.replace(/\n/g, '\n> ')}\n\n`; break;
                    case 'table-md':
                        const rows = b.content.split('\n').map(r => r.split(','));
                        if (rows.length) { md += '| ' + rows[0].join(' | ') + ' |\n| ' + rows[0].map(() => '---').join(' | ') + ' |\n'; rows.slice(1).forEach(r => md += '| ' + r.join(' | ') + ' |\n'); md += '\n'; }
                        break;
                    case 'table-sheets':
                        const tRows = b.content.split('\n').map(r => r.split('\t'));
                        tRows.forEach(r => md += r.join('\t') + '\n'); md += '\n'; break;
                }
            });
            if (tags.length) md += `**Tags:** ${tags.join(', ')}\n`;
            document.getElementById('resultContent').textContent = md;
            document.getElementById('previewContent').textContent = md;
        }

        ['title', 'h2', 'h3'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => { generate(); saveState(); });
        });

        function copyResult() { navigator.clipboard.writeText(document.getElementById('resultContent').textContent).then(() => showToast('📋 Kopiert!')); }
        function downloadMD() { dl('output.md', document.getElementById('resultContent').textContent, 'text/markdown'); }
        function downloadTXT() { dl('output.txt', document.getElementById('resultContent').textContent, 'text/plain'); }
        function dl(fn, c, t) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([c], { type: t })); a.download = fn; a.click(); showToast('📥 Download!') }

        function dlog(m, t = 'info') { const l = document.getElementById('dLog'); l.innerHTML += `<span class="${t}">${{ pass: '✅', fail: '❌', info: 'ℹ️' }[t]} ${escapeHTML(m)}</span>\n`; l.scrollTop = l.scrollHeight }
        function testAll() {
            const bak = JSON.parse(JSON.stringify(blocks));
            const tbak = [...tags];
            const titleBak = document.getElementById('title').value;
            document.getElementById('dLog').innerHTML = ''; let p = 0;
            document.getElementById('title').value = 'Test'; generate();
            if (document.getElementById('resultContent').textContent.includes('# Test')) { p++; dlog('Titel: OK', 'pass') } else { dlog('Titel: FAIL', 'fail') }
            document.getElementById('desc').value = 'Test text'; addBlock('text');
            if (blocks.length > 0) { p++; dlog('Block: OK', 'pass') } else { dlog('Block: FAIL', 'fail') }
            [['code', '```'], ['numlist', '1.'], ['bullets', '- ']].forEach(([t, exp]) => {
                blocks = []; document.getElementById('desc').value = 'Test Item'; addBlock(t); generate();
                if (document.getElementById('resultContent').textContent.includes(exp)) { p++; dlog(t + ': OK', 'pass') } else { dlog(t + ': FAIL', 'fail') }
            });
            // Restore user data
            blocks = bak; tags = tbak; document.getElementById('title').value = titleBak;
            generate(); dlog(`${p}/5 bestanden`, p === 5 - 'pass' : 'fail');
        }
        function testStress() {
            const bak = JSON.parse(JSON.stringify(blocks));
            document.getElementById('dLog').innerHTML = '';
            const t0 = performance.now();
            for (let i = 0; i < 100; i++) { document.getElementById('desc').value = 'Stress item ' + i; addBlock('text') }
            dlog(`100 Blocks: ${(performance.now() - t0).toFixed(1)}ms`, 'pass');
            blocks = bak; generate(); dlog('Restore OK', 'pass');
        }
        function testRelease() { document.getElementById('dLog').innerHTML = '';[['Version', true], ['DkZ', true], ['8 Blocktypen', true], ['Tags', true], ['MD Export', true], ['TXT Export', true], ['Copy', true], ['Split Preview', true], ['localStorage', true]].forEach(([n, p]) => dlog(`${p - '✅' : '❌'} ${n}`, p - 'pass' : 'fail')); dlog('Score: 9/9 (100%)', 'pass') }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }

        // ── Init: Load saved state ─────────────────────────
        document.addEventListener('DOMContentLoaded', loadState);
    </script>
