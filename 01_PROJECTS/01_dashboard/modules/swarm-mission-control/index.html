<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 Swarm Mission Control — DkZ v1.0 (Next.js)</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #loader {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fa1e4e;
      font-family: monospace;
      font-size: 1.2rem;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loader">Warte auf Next.js Engine (localhost:3000)...</div>
  <iframe src="http://localhost:3000" id="next-frame" onload="document.getElementById('loader').style.display='none'"></iframe>
  
  <script src="../../shared/dkz-debug.js"></script>
  <script>
    if (window.DkzEventLog) {
      DkzEventLog.logAccess('module_open', 'swarm-mission-control-next');
    }
  </script>
</body>
</html>
