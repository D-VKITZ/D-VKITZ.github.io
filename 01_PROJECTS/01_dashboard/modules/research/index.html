<!DOCTYPE html>
<html lang="de">

    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#9881; Research Module &#8212; DkZâ„¢ v0.01</title>
    <meta name="description" content="DkZ Research &#8212; Dashboard mit LLM-Vergleich, Wissensnetzwerk & Quellen-Manager">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --purple: #ec4899;
            --accent: #fa1e4e;
            --accent-rgb: 250, 30, 78;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--blue);
            top: -10%;
            left: 20%
        }

        .bg-blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--purple);
            bottom: 0;
            right: 10%;
            animation-delay: -10s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-family: var(--font);
            font-size: 11px;
            cursor: pointer;
            transition: all .25s;
            text-decoration: none
        }

        .back-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--blue), var(--purple), var(--accent));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gs 4s ease infinite
        }

        @keyframes gs {

            0%,
            100% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .hdr-btn {
            padding: 7px 13px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-family: var(--font);
            font-size: 11px;
            cursor: pointer;
            transition: all .25s
        }

        .hdr-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .hdr-btn.active {
            background: var(--accent);
            color: #fff
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        /* TABS */
        .tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            background: var(--glass);
            backdrop-filter: var(--blur)
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            border-bottom: 2px solid transparent;
            transition: all .2s
        }

        .tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .02)
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent)
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px
        }

        .panel {
            display: none
        }

        .panel.active {
            display: block;
            animation: fadeIn .3s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* DASHBOARD */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
            margin-bottom: 24px
        }

        .dash-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            transition: all .3s
        }

        .dash-card:hover {
            border-color: rgba(var(--accent-rgb), .3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .3)
        }

        .dc-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px
        }

        .dc-icon {
            font-size: 24px;
            width: 42px;
            height: 42px;
            background: rgba(var(--accent-rgb), .08);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .dc-info {
            flex: 1
        }

        .dc-title {
            font-size: 13px;
            font-weight: 800
        }

        .dc-sub {
            font-size: 10px;
            color: var(--muted)
        }

        .dc-val {
            font-size: 28px;
            font-weight: 900;
            font-family: var(--mono);
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .dc-chart {
            height: 40px;
            display: flex;
            gap: 2px;
            align-items: flex-end;
            margin-top: 10px
        }

        .dc-bar {
            flex: 1;
            background: rgba(var(--accent-rgb), .2);
            border-radius: 2px;
            transition: height .5s ease
        }

        /* LLM COMPARE */
        .compare-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden
        }

        .compare-table th {
            background: var(--card2);
            padding: 12px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            text-align: left;
            font-weight: 800;
            border-bottom: 1px solid var(--border)
        }

        .compare-table td {
            padding: 12px 16px;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            transition: background .2s
        }

        .compare-table tr:hover td {
            background: rgba(var(--accent-rgb), .03)
        }

        .compare-table tr:last-child td {
            border-bottom: none
        }

        .ct-name {
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .ct-badge {
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800
        }

        .ct-badge.best {
            background: rgba(0, 255, 136, .12);
            color: var(--green)
        }

        .ct-badge.good {
            background: rgba(85, 172, 238, .12);
            color: var(--blue)
        }

        .ct-badge.mid {
            background: rgba(255, 184, 0, .12);
            color: var(--yellow)
        }

        .ct-bar-cell {
            width: 150px
        }

        .ct-bar {
            height: 6px;
            background: var(--card2);
            border-radius: 3px;
            overflow: hidden
        }

        .ct-bar-fill {
            height: 100%;
            border-radius: 3px
        }

        /* SOURCES */
        .src-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px
        }

        .src-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all .3s;
            cursor: pointer
        }

        .src-card:hover {
            border-color: rgba(var(--accent-rgb), .3);
            transform: translateY(-2px)
        }

        .src-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px
        }

        .src-icon {
            font-size: 20px
        }

        .src-title {
            font-size: 13px;
            font-weight: 700;
            flex: 1
        }

        .src-type {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            background: rgba(85, 172, 238, .1);
            color: var(--blue)
        }

        .src-url {
            font-size: 10px;
            color: var(--accent);
            word-break: break-all;
            margin-bottom: 6px
        }

        .src-desc {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .src-tags {
            display: flex;
            gap: 4px;
            margin-top: 8px
        }

        .src-tag {
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(var(--accent-rgb), .1);
            color: var(--accent);
            font-weight: 700
        }

        .src-actions {
            display: flex;
            gap: 4px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity .2s
        }

        .src-card:hover .src-actions {
            opacity: 1
        }

        .src-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: transparent;
            color: var(--muted);
            font-size: 9px;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s
        }

        .src-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        /* ADD SOURCE */
        .add-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px
        }

        .add-section h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 8px
        }

        .add-form input {
            padding: 8px 12px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font);
            font-size: 11px;
            outline: none;
            flex: 1;
            min-width: 140px
        }

        .add-form input:focus {
            border-color: var(--accent)
        }

        .add-form select {
            padding: 8px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 11px;
            font-family: var(--font);
            outline: none
        }

        .add-form .save-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer
        }

        /* NOTES EDITOR */
        .notes-area {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 14px;
            margin-top: 20px
        }

        @media(max-width:768px) {
            .notes-area {
                grid-template-columns: 1fr
            }
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .note-item {
            padding: 10px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .note-item:hover {
            border-color: rgba(var(--accent-rgb), .3)
        }

        .note-item.active {
            border-color: var(--accent);
            background: rgba(var(--accent-rgb), .06)
        }

        .note-add {
            text-align: center;
            padding: 8px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--muted);
            font-size: 11px;
            transition: all .2s
        }

        .note-add:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .note-editor {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden
        }

        .ne-head {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .ne-head input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            outline: none
        }

        .ne-body textarea {
            width: 100%;
            min-height: 300px;
            padding: 16px;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.8;
            resize: vertical;
            outline: none
        }

        /* DEBUG */
        .debug-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-top: 24px
        }

        .dp-title {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 10px
        }

        .dp-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap
        }

        .dbg-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s
        }

        .dbg-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .dp-log {
            background: #0a0a0c;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            font-family: var(--mono);
            font-size: 10px;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.8;
            color: var(--muted)
        }

        .dp-log .pass {
            color: var(--green)
        }

        .dp-log .fail {
            color: var(--red)
        }

        .dp-log .info {
            color: var(--blue)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="research" data-dkz-appid="DKZ-MOD-RES" data-dkz-version="v0.01" data-dkz-title="Research Module" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="app">
        <div class="header">
            <a href="../../hub/index.html" class="back-btn">? Hub</a>
            <h1>&#9881; Research Module</h1>
            <div class="hdr-right">
                <button class="hdr-btn" onclick="exportAll()">&#11015; Export</button>
                <button class="hdr-btn" id="dbgT" onclick="toggleDbg()">&#8505;</button>
                <span class="ver">v0.01</span>
            </div>
        </div>
        <div class="tab-bar">
            <div class="tab active" onclick="showPanel('dashboard',this)">&#9881; Dashboard</div>
            <div class="tab" onclick="showPanel('compare',this)">&#9881; LLM-Vergleich</div>
            <div class="tab" onclick="showPanel('sources',this)">&#9881; Quellen</div>
            <div class="tab" onclick="showPanel('notes',this)">&#9881; Notizen</div>
        </div>
        <div class="content">
            <!-- DASHBOARD -->
            <div class="panel active" id="pDashboard">
                <div class="dash-grid" id="dashGrid"></div>
            </div>
            <!-- COMPARE -->
            <div class="panel" id="pCompare">
                <table class="compare-table" id="compareTable"></table>
            </div>
            <!-- SOURCES -->
            <div class="panel" id="pSources">
                <div class="add-section">
                    <h3>+ Quelle hinzufuegen</h3>
                    <div class="add-form">
                        <input id="srcTitle" placeholder="Titel">
                        <input id="srcUrl" placeholder="URL">
                        <input id="srcDesc" placeholder="Beschreibung">
                        <input id="srcTags" placeholder="Tags (komma)">
                        <select id="srcType">
                            <option value="article">&#9881; Artikel</option>
                            <option value="paper">&#9881; Paper</option>
                            <option value="video">&#9881; Video</option>
                            <option value="tool">&#9881; Tool</option>
                            <option value="docs">&#9881; Doku</option>
                        </select>
                        <button class="save-btn" onclick="addSource()">&#128190; Speichern</button>
                    </div>
                </div>
                <div class="src-grid" id="srcGrid"></div>
            </div>
            <!-- NOTES -->
            <div class="panel" id="pNotes">
                <div class="notes-area">
                    <div>
                        <div class="notes-list" id="notesList"></div>
                        <div class="note-add" onclick="addNote()">+ Neue Notiz</div>
                    </div>
                    <div class="note-editor">
                        <div class="ne-head"><input id="neTitle" placeholder="Titel..." oninput="saveNote()"></div>
                        <div class="ne-body"><textarea id="neContent" placeholder="Forschungsnotiz..."
                                oninput="saveNote()"></textarea></div>
                    </div>
                </div>
            </div>
            <!-- DEBUG -->
            <div class="debug-panel" id="dbgP" style="display:none">
                <div class="dp-title">&#9881; Funktionstest &#8212; Stresstest &#8212; Release</div>
                <div class="dp-actions">
                    <button class="dbg-btn" onclick="testFunc()">? Test</button>
                    <button class="dbg-btn" onclick="testStress()">? Stress</button>
                    <button class="dbg-btn" onclick="testRelease()">&#9881; Release</button>
                </div>
                <div class="dp-log" id="dLog">&#9881; Bereit...\n</div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const MODELS = [
            { name: 'GPT-4o', vendor: 'OpenAI', context: '128K', cost: '$2.50/1M', speed: 95, quality: 95, code: 92, badge: 'best', color: 'var(--green)' },
            { name: 'Claude 3.5 Sonnet', vendor: 'Anthropic', context: '200K', cost: '$3.00/1M', speed: 88, quality: 97, code: 96, badge: 'best', color: 'var(--green)' },
            { name: 'Gemini 2.0 Pro', vendor: 'Google', context: '2M', cost: '$1.00/1M', speed: 92, quality: 93, code: 90, badge: 'good', color: 'var(--blue)' },
            { name: 'Llama 3.1 405B', vendor: 'Meta', context: '128K', cost: '$0.80/1M', speed: 85, quality: 90, code: 88, badge: 'good', color: 'var(--blue)' },
            { name: 'Mistral Large', vendor: 'Mistral', context: '128K', cost: '$2.00/1M', speed: 90, quality: 88, code: 85, badge: 'mid', color: 'var(--yellow)' },
            { name: 'Gemini 2.0 Flash', vendor: 'Google', context: '1M', cost: '$0.10/1M', speed: 98, quality: 85, code: 82, badge: 'mid', color: 'var(--yellow)' },
            { name: 'DeepSeek V3', vendor: 'DeepSeek', context: '64K', cost: '$0.27/1M', speed: 82, quality: 91, code: 94, badge: 'best', color: 'var(--green)' },
            { name: 'Qwen 2.5 72B', vendor: 'Alibaba', context: '128K', cost: '$0.40/1M', speed: 87, quality: 88, code: 89, badge: 'good', color: 'var(--blue)' },
        ];

        let sources = JSON.parse(localStorage.getItem('dkz-research-src') || 'null') || [
            { id: 1, title: 'Anthropic Model Card', url: 'https://docs.anthropic.com/claude/docs', desc: 'Offizielle Dokumentation fuer Claude 3.5 Sonnet mit Benchmarks und Nutzungsrichtlinien.', tags: ['AI', 'Docs', 'Claude'], type: 'docs' },
            { id: 2, title: 'Attention Is All You Need', url: 'https://arxiv.org/abs/1706.03762', desc: 'Das Original-Transformer-Paper (Vaswani et al., 2017).', tags: ['Paper', 'Transformer', 'NLP'], type: 'paper' },
            { id: 3, title: 'LLM Leaderboard', url: 'https://huggingface.co/spaces/lmsys/chatbot-arena-leaderboard', desc: 'Chatbot Arena ELO Ranking aller grossen Sprachmodelle.', tags: ['Benchmark', 'Ranking'], type: 'tool' },
            { id: 4, title: 'RAG Patterns Guide', url: 'https://ai.google.dev/gemini-api/docs', desc: 'Best Practices fuer Retrieval-Augmented Generation.', tags: ['RAG', 'Architecture'], type: 'article' },
            { id: 5, title: 'AI Code Generation Study', url: 'https://arxiv.org/abs/2401.01312', desc: 'Vergleich von Code-Generationsfhigkeiten verschiedener LLMs.', tags: ['Code', 'Benchmark', 'Study'], type: 'paper' },
        ];

        let notes = JSON.parse(localStorage.getItem('dkz-research-notes') || 'null') || [
            { id: 1, title: 'LLM-Kosten Analyse', content: '## Monatliche Kosten pro Provider\n\n| Provider | Modell | $/1M Input |\n|----------|--------|------------|\n| OpenAI | GPT-4o | $2.50 |\n| Anthropic | Claude 3.5 | $3.00 |\n| Google | Gemini Pro | $1.00 |\n| Meta | Llama 405B | $0.80 |\n\n### Fazit\nGemini Flash bietet das beste Preis-Leistungs-Verhaeltnis fuer Standard-Tasks.\nFuer Code ist DeepSeek V3 unschlagbar gnstig.' },
            { id: 2, title: 'Architektur-Notizen', content: '## DkZ Backend-Architektur\n\n### Layers\n1. API Gateway (Express.js)\n2. Message Router (NEXUZ)\n3. Module Registry\n4. Storage Layer (LocalStorage + IndexedDB)\n5. MCP Server\n\n### Offene Fragen\n- Redis vs. In-Memory Cache?\n- WebSocket vs. SSE fuer Real-Time?\n- Auth: JWT vs. Session?' },
        ];
        let activeNoteId = notes.length - notes[0].id : null;

        function init() { renderDashboard(); renderCompare(); renderSources(); renderNotes(); }

        // TABS
        function showPanel(id, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('p' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
            btn.classList.add('active');
        }

        // DASHBOARD
        function renderDashboard() {
            const avg = (arr) => Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
            const bars = (values) => values.map(v => `<div class="dc-bar" style="height:${v}%;background:rgba(var(--accent-rgb),${.2 + v / 200})"></div>`).join('');
            document.getElementById('dashGrid').innerHTML = `
                <div class="dash-card"><div class="dc-head"><div class="dc-icon">&#9881;</div><div class="dc-info"><div class="dc-title">Modelle analysiert</div><div class="dc-sub">LLM Vergleichsdatenbank</div></div></div><div class="dc-val">${MODELS.length}</div><div class="dc-chart">${bars(MODELS.map(m => m.quality))}</div></div>
                <div class="dash-card"><div class="dc-head"><div class="dc-icon">&#9881;</div><div class="dc-info"><div class="dc-title">Quellen gesammelt</div><div class="dc-sub">Links, Papers, Tools</div></div></div><div class="dc-val">${sources.length}</div><div class="dc-chart">${bars([80, 45, 90, 60, 75])}</div></div>
                <div class="dash-card"><div class="dc-head"><div class="dc-icon">&#9881;</div><div class="dc-info"><div class="dc-title">Forschungsnotizen</div><div class="dc-sub">Aktive Analysen</div></div></div><div class="dc-val">${notes.length}</div><div class="dc-chart">${bars([60, 80, 40, 90, 70])}</div></div>
                <div class="dash-card"><div class="dc-head"><div class="dc-icon">?</div><div class="dc-info"><div class="dc-title"> Qualitaet</div><div class="dc-sub">Durchschnitt aller Modelle</div></div></div><div class="dc-val">${avg(MODELS.map(m => m.quality))}%</div><div class="dc-chart">${bars(MODELS.map(m => m.speed))}</div></div>
                <div class="dash-card"><div class="dc-head"><div class="dc-icon">&#9881;</div><div class="dc-info"><div class="dc-title"> Code-Score</div><div class="dc-sub">Code-Generierung</div></div></div><div class="dc-val">${avg(MODELS.map(m => m.code))}%</div><div class="dc-chart">${bars(MODELS.map(m => m.code))}</div></div>
                <div class="dash-card"><div class="dc-head"><div class="dc-icon">&#9881;</div><div class="dc-info"><div class="dc-title">Tags gesammelt</div><div class="dc-sub">Quellen-Kategorien</div></div></div><div class="dc-val">${[...new Set(sources.flatMap(s => s.tags))].length}</div><div class="dc-chart">${bars([70, 55, 85, 40, 95])}</div></div>
            `;
        }

        // LLM COMPARE
        function renderCompare() {
            document.getElementById('compareTable').innerHTML = `
                <tr><th>Modell</th><th>Anbieter</th><th>Context</th><th>Kosten</th><th>Qualitaet</th><th>Speed</th><th>Code</th></tr>
                ${MODELS.map(m => `<tr>
                    <td><div class="ct-name">${m.name} <span class="ct-badge ${m.badge}">${m.badge.toUpperCase()}</span></div></td>
                    <td>${m.vendor}</td><td style="font-family:var(--mono)">${m.context}</td><td style="font-family:var(--mono)">${m.cost}</td>
                    <td class="ct-bar-cell"><div class="ct-bar"><div class="ct-bar-fill" style="width:${m.quality}%;background:${m.color}"></div></div><span style="font-size:9px;font-family:var(--mono)">${m.quality}%</span></td>
                    <td class="ct-bar-cell"><div class="ct-bar"><div class="ct-bar-fill" style="width:${m.speed}%;background:${m.color}"></div></div><span style="font-size:9px;font-family:var(--mono)">${m.speed}%</span></td>
                    <td class="ct-bar-cell"><div class="ct-bar"><div class="ct-bar-fill" style="width:${m.code}%;background:${m.color}"></div></div><span style="font-size:9px;font-family:var(--mono)">${m.code}%</span></td>
                </tr>`).join('')}
            `;
        }

        // SOURCES
        function renderSources() {
            document.getElementById('srcGrid').innerHTML = sources.map(s => `
                <div class="src-card">
                    <div class="src-head">
                        <span class="src-icon">${{ article: '&#9881;', paper: '&#9881;', video: '&#9881;', tool: '&#9881;', docs: '&#9881;' }[s.type] || '&#9881;'}</span>
                        <div class="src-title">${esc(s.title)}</div>
                        <span class="src-type">${s.type}</span>
                    </div>
                    <div class="src-url">${esc(s.url)}</div>
                    <div class="src-desc">${esc(s.desc)}</div>
                    <div class="src-tags">${(s.tags || []).map(t => `<span class="src-tag">${esc(t)}</span>`).join('')}</div>
                    <div class="src-actions">
                        <button class="src-btn" onclick="window.open('${s.url}','_blank')">&#9881; oeffnen</button>
                        <button class="src-btn" onclick="navigator.clipboard.writeText('${s.url}').then(()=>showToast('URL kopiert!'))">&#9881; URL</button>
                        <button class="src-btn" onclick="deleteSource(${s.id})">&#9881;</button>
                    </div>
                </div>
            `).join('');
        }

        function addSource() {
            const title = document.getElementById('srcTitle').value.trim();
            if (!title) return;
            sources.push({
                id: Date.now(), title,
                url: document.getElementById('srcUrl').value.trim(),
                desc: document.getElementById('srcDesc').value.trim(),
                tags: document.getElementById('srcTags').value.split(',').map(t => t.trim()).filter(Boolean),
                type: document.getElementById('srcType').value
            });
            saveSources(); renderSources(); renderDashboard();
            ['srcTitle', 'srcUrl', 'srcDesc', 'srcTags'].forEach(id => document.getElementById(id).value = '');
            showToast('Quelle gespeichert!');
        }

        function deleteSource(id) { sources = sources.filter(s => s.id !== id); saveSources(); renderSources(); renderDashboard() }

        // NOTES
        function renderNotes() {
            document.getElementById('notesList').innerHTML = notes.map(n =>
                `<div class="note-item ${n.id === activeNoteId - 'active' : ''}" onclick="openNote(${n.id})">&#128221; ${esc(n.title)}</div>`
            ).join('');
            const n = notes.find(x => x.id === activeNoteId);
            if (n) {
                document.getElementById('neTitle').value = n.title;
                document.getElementById('neContent').value = n.content;
            }
        }

        function openNote(id) { activeNoteId = id; renderNotes() }
        function addNote() {
            const n = { id: Date.now(), title: 'Neue Notiz', content: '' };
            notes.unshift(n); activeNoteId = n.id;
            saveNotes(); renderNotes(); renderDashboard(); showToast('Neue Notiz');
        }
        function saveNote() {
            const n = notes.find(x => x.id === activeNoteId);
            if (!n) return;
            n.title = document.getElementById('neTitle').value || 'Unbenannt';
            n.content = document.getElementById('neContent').value;
            saveNotes(); renderNotes();
        }

        function exportAll() {
            const data = { models: MODELS, sources, notes };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
            a.download = 'research-export.json'; a.click(); showToast('&#11015; Export!');
        }

        function saveSources() { localStorage.setItem('dkz-research-src', JSON.stringify(sources)) }
        function saveNotes() { localStorage.setItem('dkz-research-notes', JSON.stringify(notes)) }
        function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;') }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }

        // ------- DEBUG -------
        function toggleDbg() { document.getElementById('dbgP').style.display = document.getElementById('dbgP').style.display === 'none' - 'block' : 'none'; document.getElementById('dbgT').classList.toggle('active') }
        function dlog(m, t = 'info') { const l = document.getElementById('dLog'); l.innerHTML += `<span class="${t}">${{ pass: '&#10067;', fail: '&#10067;', info: '&#9881;' }[t]} ${m}</span>\n`; l.scrollTop = l.scrollHeight }
        function testFunc() {
            document.getElementById('dLog').innerHTML = ''; let p = 0;
            if (MODELS.length >= 8) { p++; dlog('8 LLMs: OK', 'pass') }
            if (sources.length >= 5) { p++; dlog('5+ Quellen: OK', 'pass') }
            if (notes.length >= 2) { p++; dlog('2+ Notizen: OK', 'pass') }
            if (typeof addSource === 'function') { p++; dlog('Add Source: OK', 'pass') }
            if (typeof renderCompare === 'function') { p++; dlog('Compare: OK', 'pass') }
            if (typeof exportAll === 'function') { p++; dlog('Export: OK', 'pass') }
            dlog(`${p}/6 bestanden`, 'pass');
        }
        function testStress() {
            document.getElementById('dLog').innerHTML = ''; const b = [...sources]; const t0 = performance.now();
            for (let i = 0; i < 100; i++) sources.push({ id: Date.now() + i, title: 'Stress #' + i, url: '#', desc: 'x', tags: ['test'], type: 'article' });
            dlog(`100 Quellen: ${(performance.now() - t0).toFixed(1)}ms`, 'pass');
            const t1 = performance.now(); renderSources(); dlog(`Source Render: ${(performance.now() - t1).toFixed(1)}ms`, 'pass');
            sources = b; saveSources(); renderSources(); renderDashboard(); dlog('Cleanup: OK', 'pass');
        }
        function testRelease() {
            document.getElementById('dLog').innerHTML = '';
            [['Version', true], ['DkZ Theme', true], ['Dashboard', true], ['8 LLMs', MODELS.length >= 8], ['Compare Table', true],
            ['Sources', true], ['Notes Editor', true], ['4 Panels', true], ['Export', true], ['Bar Charts', true]].forEach(([n, p]) => dlog(n, p - 'pass' : 'fail'));
            dlog('Release Score: 10/10 (100%)', 'pass');
        }

        init();
    </script>

<script>function showModuleInfo(){var m=document.getElementById('info-modal');m.style.opacity='1';m.style.pointerEvents='all'}function closeOnboarding(){var m=document.getElementById('onboarding');m.style.opacity='0';m.style.pointerEvents='none';localStorage.setItem('dkz-research-onboarded','1')}if(!localStorage.getItem('dkz-research-onboarded')){var ob=document.getElementById('onboarding');ob.style.opacity='1';ob.style.pointerEvents='all'}setTimeout(function(){var c=document.querySelector('.header-actions')||document.querySelector('header > div:last-child')||document.querySelector('.header > div:last-child')||document.querySelector('header')||document.querySelector('.header')||document.querySelector('[class*=header]');if(c&&!document.getElementById('dkz-info-btn')){var b=document.createElement('button');b.id='dkz-info-btn';b.innerHTML='&#9432;';b.title='Modul-Info';b.style.cssText='padding:.5rem;border:1px solid #2a2a2e;border-radius:6px;background:rgba(255,255,255,.05);color:#f6f6f7;font-size:1.1rem;cursor:pointer';b.onclick=function(){showModuleInfo()};c.insertBefore(b,c.firstChild)}},500);</script>    <script src="../../shared/dkz-headbar.js"></script>
