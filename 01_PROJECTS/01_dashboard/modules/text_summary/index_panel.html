    function esc(s) {

      d.appendChild(document.createTextNode(s));

        .panel-header { background: rgba(0,0,0,0.4); padding: 8px 12px; font-size: 11px; font-weight: bold; color: #10b981; text-transform: uppercase; letter-spacing: 2px; text-align: center; border-bottom: 1px solid rgba(16,185,129, 0.2); }
