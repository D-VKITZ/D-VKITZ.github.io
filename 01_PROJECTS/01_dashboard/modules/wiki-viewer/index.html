<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 DEVKiTZâ„¢™ Wiki — Markdown Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <script src="../../shared/dkz-debug.js" defer></script>
    <script src="../../shared/dkz-guide.js" defer></script>
    <script src="../../shared/dkz-copilot.js" defer></script>
    <style>
        :root{--bg:#060608;--card:#0d0d11;--card2:#111116;--brd:#1c1c22;--t:#f0f0f2;--m:#71717a;--accent:#fa1e4e;--g:#00ff88;--y:#FFB800;--b:#55ACEE;--p:#a855f7;--mono:'JetBrains Mono',monospace;--ui:'Inter',sans-serif;--r:12px;}
        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;font-family:var(--ui);background:var(--bg);color:var(--t);}

        /* BG */
        .bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
        .grid{position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(250,30,78,0.05) 1px,transparent 0);background-size:28px 28px;}
        .blob{position:absolute;border-radius:50%;filter:blur(160px);opacity:0.07;}
        .b1{width:600px;height:600px;background:var(--accent);top:-200px;right:-200px;}
        .b2{width:500px;height:500px;background:var(--p);bottom:-150px;left:-150px;}
        .b3{width:400px;height:400px;background:var(--b);top:40%;left:40%;transform:translate(-50%,-50%);}

        /* LAYOUT */
        .layout{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

        /* HEADER */
        .hdr{display:flex;align-items:center;gap:14px;padding:12px 20px;background:rgba(6,6,8,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap;}
        .logo{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;white-space:nowrap;}
        .logo span{color:var(--accent);}
        .badge{font-size:9px;background:rgba(250,30,78,0.15);border:1px solid rgba(250,30,78,0.3);color:var(--accent);padding:2px 8px;border-radius:20px;font-weight:800;font-family:var(--mono);}

        /* CONTROLS */
        .controls{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
        .search-wrap{position:relative;flex:1;min-width:180px;}
        .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--m);}
        #searchInput{width:100%;padding:8px 12px 8px 34px;background:rgba(255,255,255,0.04);border:1px solid var(--brd);border-radius:8px;color:var(--t);font-family:var(--ui);font-size:12px;outline:none;transition:0.2s;}
        #searchInput:focus{border-color:var(--accent);background:rgba(250,30,78,0.04);}
        select{padding:7px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--brd);border-radius:8px;color:var(--t);font-family:var(--ui);font-size:11px;outline:none;cursor:pointer;}
        .btn{padding:7px 14px;border-radius:8px;border:1px solid var(--brd);background:rgba(255,255,255,0.03);color:var(--m);font-family:var(--ui);font-size:11px;font-weight:700;cursor:pointer;transition:0.2s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
        .btn:hover{background:rgba(250,30,78,0.08);border-color:rgba(250,30,78,0.3);color:var(--accent);}
        .btn.active{background:rgba(250,30,78,0.12);border-color:rgba(250,30,78,0.4);color:var(--accent);}
        .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
        .btn.primary:hover{background:#e0163d;}
        .btn.green{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.3);color:var(--g);}
        .btn.green:hover{background:rgba(0,255,136,0.2);}
        .sep{width:1px;height:24px;background:var(--brd);flex-shrink:0;}

        /* BODY */
        .body{display:flex;flex:1;overflow:hidden;}

        /* SIDEBAR */
        .sidebar{width:240px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--brd);background:rgba(13,13,17,0.6);backdrop-filter:blur(8px);overflow-y:auto;}
        .sb-head{padding:12px 14px;font-size:9px;font-weight:900;color:var(--m);text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--brd);}
        .sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 10px 0;}
        .stat-c{background:rgba(255,255,255,0.02);border:1px solid var(--brd);border-radius:8px;padding:8px;text-align:center;}
        .stat-n{font-size:18px;font-weight:900;font-family:var(--mono);}
        .stat-l{font-size:7px;color:var(--m);text-transform:uppercase;letter-spacing:1px;}
        .file-list{padding:8px;}
        .file-card{padding:10px 12px;border-radius:8px;cursor:pointer;transition:0.15s;border:1px solid transparent;margin-bottom:3px;position:relative;}
        .file-card:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.06);}
        .file-card.active{background:rgba(250,30,78,0.08);border-color:rgba(250,30,78,0.25);}
        .file-card.selected{background:rgba(0,255,136,0.06);border-color:rgba(0,255,136,0.2);}
        .file-icon{font-size:14px;margin-bottom:2px;}
        .file-name{font-size:11px;font-weight:700;margin-bottom:2px;}
        .file-size{font-size:9px;color:var(--m);font-family:var(--mono);}
        .file-check{position:absolute;top:8px;right:8px;width:14px;height:14px;border:1px solid var(--brd);border-radius:3px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;}
        .file-check.checked{background:var(--g);border-color:var(--g);color:#000;}

        /* CONTENT */
        .content-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        .content-head{padding:12px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(6,6,8,0.5);backdrop-filter:blur(8px);}
        .content-title{font-weight:800;font-size:14px;flex:1;}
        #tts-indicator{font-size:10px;color:var(--p);font-weight:700;display:none;align-items:center;gap:4px;}
        .tts-pulse{width:8px;height:8px;border-radius:50%;background:var(--p);animation:pulse 1s infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        .content-body{flex:1;overflow-y:auto;padding:24px 32px;}

        /* MARKDOWN */
        .md-body{max-width:860px;margin:0 auto;line-height:1.8;font-size:14px;}
        .md-body h1{font-size:28px;font-weight:900;margin-bottom:12px;color:var(--t);border-bottom:2px solid rgba(250,30,78,0.3);padding-bottom:10px;}
        .md-body h2{font-size:20px;font-weight:800;margin:28px 0 12px;color:var(--t);}
        .md-body h3{font-size:16px;font-weight:700;margin:20px 0 8px;color:var(--b);}
        .md-body p{margin-bottom:14px;color:rgba(240,240,242,0.9);}
        .md-body blockquote{border-left:3px solid var(--accent);padding:10px 16px;background:rgba(250,30,78,0.06);border-radius:0 8px 8px 0;margin:16px 0;font-style:italic;color:var(--m);}
        .md-body blockquote strong{color:var(--t);}
        .md-body code{background:rgba(255,255,255,0.06);border:1px solid var(--brd);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--g);}
        .md-body pre{background:rgba(0,0,0,0.4);border:1px solid var(--brd);border-radius:10px;padding:16px;overflow-x:auto;margin:16px 0;}
        .md-body pre code{background:none;border:none;padding:0;color:#a8d8a8;font-size:12px;line-height:1.6;}
        .md-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12px;}
        .md-body th{background:rgba(250,30,78,0.1);border:1px solid var(--brd);padding:8px 12px;text-align:left;font-weight:800;color:var(--accent);}
        .md-body td{border:1px solid var(--brd);padding:7px 12px;color:rgba(240,240,242,0.85);}
        .md-body tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
        .md-body ul,.md-body ol{padding-left:20px;margin-bottom:14px;}
        .md-body li{margin-bottom:5px;color:rgba(240,240,242,0.9);}
        .md-body li input[type=checkbox]{accent-color:var(--accent);}
        .md-body a{color:var(--b);text-decoration:none;}
        .md-body a:hover{color:var(--accent);}
        .md-body hr{border:none;border-top:1px solid var(--brd);margin:24px 0;}
        .md-body strong{font-weight:800;}
        .md-body em{color:var(--p);}
        .md-highlight{background:rgba(255,184,0,0.2);border-radius:2px;padding:0 2px;}

        /* EMPTY STATE */
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;opacity:0.25;}
        .empty-icon{font-size:60px;}

        /* SELECTION BAR */
        .sel-bar{display:none;align-items:center;gap:10px;padding:8px 16px;background:rgba(0,255,136,0.08);border-top:1px solid rgba(0,255,136,0.2);flex-shrink:0;}
        .sel-bar.show{display:flex;}
        .sel-count{font-size:11px;font-weight:800;color:var(--g);}

        /* TOAST */
        .toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 20px;border-radius:8px;font-weight:800;font-size:12px;transform:translateY(80px);transition:0.3s;pointer-events:none;}
        .toast.show{transform:translateY(0);}
        .toast.ok{background:var(--g);color:#000;}
        .toast.err{background:var(--accent);color:#fff;}
        .toast.info{background:var(--b);color:#000;}

        /* SCROLLBAR */
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
        ::-webkit-scrollbar-thumb:hover{background:rgba(250,30,78,0.4);}

        @media(max-width:700px){.sidebar{display:none;} .hdr{gap:6px;}}
    </style>

    <!-- DkZ Shared Scripts (Auto-Injected) -->
    <script src="../../shared/dkz-auth.js"></script>
    <script src="../../shared/dkz-james.js"></script>
    <script src="../../shared/dkz-memory.js"></script>
    <script src="../../shared/dkz-compaction.js"></script>
    <script src="../../shared/dkz-iceberg.js"></script>
    <script src="../../shared/dkz-prompt-score.js"></script>
    <script src="../../shared/dkz-builder-bridge.js"></script>
    <script src="../../shared/dkz-updater.js"></script>
</head>
<body data-dkz-module="wiki-viewer" data-dkz-appid="DKZ-MOD-WIK" data-dkz-version="v0.01" data-dkz-title="📚 DEVKiTZ™ Wiki — Markdown Viewer" data-dkz-icon="📦" data-dkz-separable="true">
<div class="bg"><div class="grid"></div><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="layout">

    <!-- HEADER -->
    <header class="hdr">
        <div class="logo">📚 <span>DEVKiTZ™</span> Wiki <span class="badge">v2.0</span></div>
        <div class="sep"></div>
        <div class="controls">
            <div class="search-wrap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="searchInput" type="text" placeholder="Suchen in allen Seiten..." oninput="onSearch(this.value)">
            </div>
            <select id="sortSelect" onchange="onSort(this.value)" title="Sortieren">
                <option value="name">↑ Name</option>
                <option value="name-desc">↓ Name</option>
                <option value="size">Größe</option>
                <option value="size-desc">Größe ↓</option>
            </select>
            <div class="sep"></div>
            <button class="btn" onclick="toggleAll()" title="Alle auswählen">☑ Alle</button>
            <button class="btn green" id="zipBtn" onclick="downloadZip()" style="display:none">📦 ZIP</button>
            <button class="btn" id="ttsBtn" onclick="toggleTTS()" title="Vorlesen">🔊 Vorlesen</button>
            <button class="btn" onclick="copyCurrentMd()" title="Markdown kopieren">📋 Kopieren</button>
        </div>
    </header>

    <!-- BODY -->
    <div class="body">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sb-head">📄 Seiten</div>
            <div class="sb-stats">
                <div class="stat-c"><div class="stat-n" id="statPages" style="color:var(--accent)">0</div><div class="stat-l">Seiten</div></div>
                <div class="stat-c"><div class="stat-n" id="statWords" style="color:var(--g)">0</div><div class="stat-l">Wörter</div></div>
                <div class="stat-c"><div class="stat-n" id="statSelected" style="color:var(--y)">0</div><div class="stat-l">Gewählt</div></div>
                <div class="stat-c"><div class="stat-n" id="statChars" style="color:var(--b)">0</div><div class="stat-l">KB Gesamt</div></div>
            </div>
            <div class="file-list" id="fileList"></div>
        </aside>

        <!-- CONTENT -->
        <div class="content-wrap">
            <div class="content-head">
                <div class="content-title" id="contentTitle">← Seite auswählen</div>
                <div id="tts-indicator"><div class="tts-pulse"></div>Vorlesen…</div>
                <button class="btn" id="prevBtn" onclick="navPage(-1)" style="display:none">◀</button>
                <button class="btn" id="nextBtn" onclick="navPage(1)" style="display:none">▶</button>
            </div>
            <div class="content-body">
                <div id="mdContent"><div class="empty-state"><div class="empty-icon">📖</div><div>Wähle eine Seite aus der Seitenleiste</div></div></div>
            </div>
            <div class="sel-bar" id="selBar">
                <span class="sel-count" id="selCount">0 Seiten gewählt</span>
                <button class="btn green" onclick="downloadZip()">📦 Als ZIP herunterladen</button>
                <button class="btn" onclick="copySelectedMd()">📋 Alle kopieren</button>
                <button class="btn" onclick="readSelected()">🔊 Alle vorlesen</button>
                <button class="btn" onclick="clearSelection()" style="margin-left:auto">✕ Abwählen</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- JSZip für ZIP-Downloads -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ═══════════════════════════════════════════
// DEVKiTZ™ Wiki Viewer — v2.0
// ═══════════════════════════════════════════

const FILES = [
    { id: '00', name: '00_README', icon: '🏠', file: 'wiki/00_README.md', desc: 'Inhaltsverzeichnis & Schnellübersicht' },
    { id: '01', name: '01_Philosophie', icon: '🧠', file: 'wiki/01_Philosophie.md', desc: 'Mission, Vision, 5 Prinzipien' },
    { id: '02', name: '02_Architektur', icon: '🏗️', file: 'wiki/02_Architektur.md', desc: '5-Layer System, Tech-Stack' },
    { id: '03', name: '03_Module', icon: '📦', file: 'wiki/03_Module.md', desc: '72 Module, Kategorien, Standard' },
    { id: '04', name: '04_Regelwerk', icon: '📜', file: 'wiki/04_Regelwerk.md', desc: 'R0–R24, Git Format, Alarme' },
    { id: '05', name: '05_Naming', icon: '🏷️', file: 'wiki/05_Naming.md', desc: 'Naming™, 20 Produkte, Konventionen' },
    { id: '06', name: '06_Workflows', icon: '🔀', file: 'wiki/06_Workflows.md', desc: '6 Builder, Automation Level' },
    { id: '07', name: '07_Roadmap', icon: '🗺️', file: 'wiki/07_Roadmap.md', desc: 'Releases, Q2 2026, KPIs' },
];

let state = {
    files: [], // {id, name, icon, file, desc, content, size, words}
    activeId: null,
    selected: new Set(),
    searchQ: '',
    sortBy: 'name',
    ttsUtterance: null,
    ttsActive: false,
};

// ═══ INIT ═══
async function init() {
    const loaded = await Promise.all(FILES.map(async f => {
        try {
            const r = await fetch(f.file);
            const txt = await r.text();
            return { ...f, content: txt, size: txt.length, words: txt.split(/\s+/).length };
        } catch {
            return { ...f, content: `# ${f.name}\n\n> Datei nicht gefunden: \`${f.file}\`\n\nStelle sicher, dass die Wiki-Seiten im \`wiki/\` Ordner liegen.`, size: 0, words: 0 };
        }
    }));
    state.files = loaded;
    renderSidebar();
    updateStats();
    if (loaded.length > 0) openFile(loaded[0].id);
}

// ═══ RENDER SIDEBAR ═══
function renderSidebar() {
    let files = [...state.files];
    if (state.searchQ) {
        files = files.filter(f =>
            f.name.toLowerCase().includes(state.searchQ) ||
            f.content.toLowerCase().includes(state.searchQ)
        );
    }
    files = sortFiles(files);

    const el = document.getElementById('fileList');
    el.innerHTML = files.map(f => {
        const isActive = state.activeId === f.id;
        const isSel = state.selected.has(f.id);
        const kb = (f.size / 1024).toFixed(1);
        return `<div class="file-card ${isActive - 'active' : ''} ${isSel - 'selected' : ''}" onclick="openFile('${f.id}')">
            <div class="file-check ${isSel - 'checked' : ''}" onclick="toggleSelect('${f.id}', event)">${isSel - '✓' : ''}</div>
            <div class="file-icon">${f.icon}</div>
            <div class="file-name">${esc(f.name)}</div>
            <div class="file-size">${kb} KB · ${f.words.toLocaleString()} Wörter</div>
        </div>`;
    }).join('') || '<div style="padding:20px;text-align:center;color:var(--m);font-size:11px">Keine Ergebnisse</div>';
}

function sortFiles(files) {
    return files.sort((a, b) => {
        switch(state.sortBy) {
            case 'name': return a.name.localeCompare(b.name);
            case 'name-desc': return b.name.localeCompare(a.name);
            case 'size': return a.size - b.size;
            case 'size-desc': return b.size - a.size;
            default: return 0;
        }
    });
}

// ═══ OPEN FILE ═══
function openFile(id) {
    const f = state.files.find(x => x.id === id);
    if (!f) return;
    state.activeId = id;
    renderSidebar();
    document.getElementById('contentTitle').textContent = `${f.icon} ${f.name}`;
    document.getElementById('mdContent').innerHTML = `<div class="md-body">${parseMarkdown(f.content, state.searchQ)}</div>`;
    document.getElementById('prevBtn').style.display = '';
    document.getElementById('nextBtn').style.display = '';
}

// ═══ MARKDOWN PARSER ═══
function parseMarkdown(md, highlight) {
    let html = md;

    // Tables
    html = html.replace(/^\|(.+)\|\r?\n\|[-|: ]+\|\r?\n((?:\|.+\|\r?\n?)*)/gm, (_, header, body) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${esc(c.trim())}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
            const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${renderInline(c.trim())}</td>`).join('');
            return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
    });

    // Code blocks
    html = html.replace(/```[\w]*\r?\n([\s\S]*?)```/gm, (_, code) => `<pre><code>${escHtml(code.trimEnd())}</code></pre>`);

    // Headings
    html = html.replace(/^######\s(.+)/gm, '<h6>$1</h6>');
    html = html.replace(/^#####\s(.+)/gm, '<h5>$1</h5>');
    html = html.replace(/^####\s(.+)/gm, '<h4>$1</h4>');
    html = html.replace(/^###\s(.+)/gm, (_, t) => `<h3>${renderInline(t)}</h3>`);
    html = html.replace(/^##\s(.+)/gm, (_, t) => `<h2>${renderInline(t)}</h2>`);
    html = html.replace(/^#\s(.+)/gm, (_, t) => `<h1>${renderInline(t)}</h1>`);

    // Blockquotes
    html = html.replace(/^>\s(.+)/gm, (_, t) => `<blockquote>${renderInline(t)}</blockquote>`);

    // Horizontal rules
    html = html.replace(/^---+$/gm, '<hr>');

    // Task lists
    html = html.replace(/^[-*]\s\[x\]\s(.+)/gm, '<li><input type="checkbox" checked disabled> $1</li>');
    html = html.replace(/^[-*]\s\[\s?\]\s(.+)/gm, '<li><input type="checkbox" disabled> $1</li>');

    // Unordered lists
    html = html.replace(/((?:^[-*]\s.+\r?\n?)+)/gm, m => `<ul>${m.replace(/^[-*]\s(.+)/gm, '<li>$1</li>')}</ul>`);

    // Ordered lists
    html = html.replace(/((?:^\d+\.\s.+\r?\n?)+)/gm, m => `<ol>${m.replace(/^\d+\.\s(.+)/gm, '<li>$1</li>')}</ol>`);

    // Inline
    html = html.split('\n').map(line => {
        if (line.match(/^<(h[1-6]|ul|ol|li|pre|blockquote|table|hr|thead|tbody)/)) return line;
        const rendered = renderInline(line);
        return rendered.trim() - `<p>${rendered}</p>` : '';
    }).join('\n');

    // Highlight search
    if (highlight) {
        const re = new RegExp(`(${escRegex(highlight)})`, 'gi');
        html = html.replace(re, '<mark class="md-highlight">$1</mark>');
    }

    return html;
}

function renderInline(t) {
    t = escHtml(t);
    t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
    t = t.replace(/_(.+?)_/g, '<em>$1</em>');
    t = t.replace(/~~(.+?)~~/g, '<del>$1</del>');
    t = t.replace(/`(.+?)`/g, '<code>$1</code>');
    t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    t = t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;">');
    return t;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ═══ SEARCH ═══
function onSearch(q) {
    state.searchQ = q.toLowerCase().trim();
    renderSidebar();
    if (state.activeId) openFile(state.activeId);
}

// ═══ SORT ═══
function onSort(v) {
    state.sortBy = v;
    renderSidebar();
}

// ═══ SELECT ═══
function toggleSelect(id, e) {
    e.stopPropagation();
    state.selected.has(id) - state.selected.delete(id) : state.selected.add(id);
    updateSelection();
}

function toggleAll() {
    if (state.selected.size === state.files.length) {
        state.selected.clear();
    } else {
        state.files.forEach(f => state.selected.add(f.id));
    }
    updateSelection();
}

function clearSelection() {
    state.selected.clear();
    updateSelection();
}

function updateSelection() {
    renderSidebar();
    const n = state.selected.size;
    document.getElementById('statSelected').textContent = n;
    document.getElementById('selCount').textContent = `${n} Seite${n !== 1 - 'n' : ''} gewählt`;
    document.getElementById('selBar').classList.toggle('show', n > 0);
    document.getElementById('zipBtn').style.display = n > 0 - 'flex' : 'none';
}

// ═══ ZIP DOWNLOAD ═══
async function downloadZip() {
    const ids = state.selected.size > 0 - [...state.selected] : state.files.map(f => f.id);
    if (ids.length === 0) { toast('Keine Seiten gewählt', 'err'); return; }

    if (typeof JSZip === 'undefined') { toast('JSZip wird geladen…', 'info'); return; }

    const zip = new JSZip();
    const folder = zip.folder('DEVKiTZ-Wiki');

    ids.forEach(id => {
        const f = state.files.find(x => x.id === id);
        if (f) folder.file(`${f.name}.md`, f.content);
    });

    // Add index
    const idx = state.files.map(f => `- [${f.icon} ${f.name}](${f.name}.md) — ${f.desc}`).join('\n');
    folder.file('00_INDEX.md', `# DEVKiTZ™ Wiki Export\n\n> Stand: ${new Date().toLocaleString('de-DE')}\n\n${idx}\n`);

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `DEVKiTZ-Wiki-${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`📦 ${ids.length} Seiten als ZIP heruntergeladen`, 'ok');
}

// ═══ TTS ═══
function toggleTTS() {
    if (state.ttsActive) { stopTTS(); return; }
    const f = state.files.find(x => x.id === state.activeId);
    if (!f) { toast('Keine Seite geöffnet', 'err'); return; }
    readText(f.content.replace(/[#*`|─┌┐└┘├┤┬┴┼═╔╗╚╝╠╣╦╩╬>]/g, '').trim());
}

function readText(text) {
    stopTTS();
    if (!window.speechSynthesis) { toast('TTS nicht verfügbar', 'err'); return; }
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'de-DE';
    utt.rate = 0.95;
    utt.pitch = 1.0;
    const voices = speechSynthesis.getVoices();
    const de = voices.find(v => v.lang.startsWith('de'));
    if (de) utt.voice = de;
    utt.onend = () => { state.ttsActive = false; updateTTSUI(); };
    utt.onerror = () => { state.ttsActive = false; updateTTSUI(); };
    window.speechSynthesis.speak(utt);
    state.ttsUtterance = utt;
    state.ttsActive = true;
    updateTTSUI();
    toast('🔊 Vorlesen gestartet', 'info');
}

function stopTTS() {
    window.speechSynthesis?.cancel();
    state.ttsActive = false;
    updateTTSUI();
}

function updateTTSUI() {
    const btn = document.getElementById('ttsBtn');
    const ind = document.getElementById('tts-indicator');
    btn.textContent = state.ttsActive - '⏹ Stop' : '🔊 Vorlesen';
    btn.classList.toggle('active', state.ttsActive);
    ind.style.display = state.ttsActive - 'flex' : 'none';
}

function readSelected() {
    const texts = [...state.selected].map(id => {
        const f = state.files.find(x => x.id === id);
        return f - f.name + '. ' + f.content.replace(/[#*`|>/─┌┐└┘├┤┬┴┼═╔╗╚╝╠╣╦╩╬]/g, '') : '';
    }).join('\n\n---\n\n');
    readText(texts.trim());
}

// ═══ NAV ═══
function navPage(dir) {
    const sorted = sortFiles([...state.files]);
    const idx = sorted.findIndex(f => f.id === state.activeId);
    const next = sorted[idx + dir];
    if (next) openFile(next.id);
}

// ═══ COPY ═══
function copyCurrentMd() {
    const f = state.files.find(x => x.id === state.activeId);
    if (!f) { toast('Keine Seite geöffnet', 'err'); return; }
    navigator.clipboard.writeText(f.content).then(() => toast(`📋 ${f.name}.md kopiert`, 'ok'));
}

function copySelectedMd() {
    const texts = [...state.selected].map(id => {
        const f = state.files.find(x => x.id === id);
        return f - `# ${f.name}\n\n${f.content}` : '';
    }).join('\n\n---\n\n');
    navigator.clipboard.writeText(texts).then(() => toast(`📋 ${state.selected.size} Seiten kopiert`, 'ok'));
}

// ═══ STATS ═══
function updateStats() {
    document.getElementById('statPages').textContent = state.files.length;
    const totalWords = state.files.reduce((s, f) => s + f.words, 0);
    document.getElementById('statWords').textContent = totalWords.toLocaleString();
    const totalKb = (state.files.reduce((s, f) => s + f.size, 0) / 1024).toFixed(0);
    document.getElementById('statChars').textContent = totalKb;
}

// ═══ TOAST ═══
function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ═══ KEYBOARD ═══
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') navPage(1);
    if (e.key === 'ArrowLeft') navPage(-1);
    if (e.key === 'Escape') stopTTS();
    if (e.key === '/' || e.key === 's') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

// ═══ START ═══
window.addEventListener('load', () => {
    window.speechSynthesis?.getVoices();
    init();
});
</script>
