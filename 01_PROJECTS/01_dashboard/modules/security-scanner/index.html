<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ DkZ Security Scanner — v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060608;--card:rgba(18,18,24,.85);--border:rgba(250,30,78,.15);--text:#e8e8ec;--muted:#6a6a7a;--accent:#fa1e4e;--green:#00ff88;--yellow:#ffb800;--red:#ff3b5c;--blue:#3b82f6;--cyan:#06d6a0;--purple:#8b5cf6;--radius:16px;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
canvas#matrix{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.06}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(24px);margin-bottom:20px}
.header h1{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .back{color:var(--accent);text-decoration:none;font-weight:600}
.header .ver{color:var(--muted);font-family:var(--mono);font-size:.8rem}
/* Status Ring */
.ring-container{display:flex;justify-content:center;margin:30px 0}
.ring{position:relative;width:240px;height:240px}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:8}
.ring-progress{fill:none;stroke:var(--green);stroke-width:8;stroke-linecap:round;stroke-dasharray:690;stroke-dashoffset:690;transition:stroke-dashoffset 2s ease,stroke .5s}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-size:3.5rem;font-weight:900;font-family:var(--mono)}
.ring-label{font-size:.85rem;color:var(--muted);margin-top:4px}
/* Scan Pulse */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4)}50%{box-shadow:0 0 30px 10px rgba(0,255,136,.1)}}
.scanning .ring{animation:pulse 2s infinite}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin:20px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;backdrop-filter:blur(20px);transition:border-color .3s,transform .2s}
.card:hover{border-color:rgba(250,30,78,.4);transform:translateY(-2px)}
.card h3{font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 .icon{font-size:1.3rem}
/* Threat List */
.threat{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin:6px 0;font-size:.85rem;font-family:var(--mono);transition:background .2s}
.threat.clean{background:rgba(0,255,136,.06);border-left:3px solid var(--green)}
.threat.warn{background:rgba(255,184,0,.08);border-left:3px solid var(--yellow)}
.threat.danger{background:rgba(255,59,92,.08);border-left:3px solid var(--red)}
.threat .status{font-size:1.1rem}
.threat .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Buttons */
.actions{display:flex;gap:12px;flex-wrap:wrap;margin:20px 0}
.btn{padding:12px 28px;border:none;border-radius:12px;font-family:var(--font);font-weight:700;font-size:.9rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c4163f);color:#fff}
.btn-primary:hover{box-shadow:0 0 30px rgba(250,30,78,.5);transform:scale(1.03)}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-green{background:linear-gradient(135deg,var(--green),#00cc6a);color:#000}
.btn-green:hover{box-shadow:0 0 30px rgba(0,255,136,.4)}
/* Progress */
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:3px;transition:width 1s ease;background:linear-gradient(90deg,var(--accent),var(--purple))}
/* File List */
.file-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;margin:4px 0;font-size:.8rem;background:rgba(255,255,255,.02);transition:background .2s}
.file-item:hover{background:rgba(255,255,255,.06)}
.file-item .ext{padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:.7rem;font-weight:700}
.ext-img{background:rgba(139,92,246,.2);color:var(--purple)}
.ext-vid{background:rgba(250,30,78,.2);color:var(--accent)}
.ext-doc{background:rgba(59,130,246,.2);color:var(--blue)}
.ext-code{background:rgba(0,255,136,.2);color:var(--green)}
.ext-other{background:rgba(255,255,255,.08);color:var(--muted)}
/* Log */
.log{max-height:300px;overflow-y:auto;font-family:var(--mono);font-size:.75rem;line-height:1.8;padding:12px;background:rgba(0,0,0,.3);border-radius:10px;margin-top:12px}
.log .entry{opacity:0;animation:fadeIn .3s forwards}
.log .t-ok{color:var(--green)}.log .t-warn{color:var(--yellow)}.log .t-err{color:var(--red)}.log .t-info{color:var(--cyan)}
@keyframes fadeIn{to{opacity:1}}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:12px;font-weight:700;transform:translateY(100px);transition:transform .4s;z-index:999;backdrop-filter:blur(12px)}
.toast.show{transform:translateY(0)}
.toast-ok{background:rgba(0,255,136,.15);border:1px solid var(--green);color:var(--green)}
.toast-err{background:rgba(255,59,92,.15);border:1px solid var(--red);color:var(--red)}
/* Responsive */
@media(max-width:768px){.grid{grid-template-columns:1fr}.header h1{font-size:1.1rem}.ring{width:180px;height:180px}.ring-pct{font-size:2.5rem}}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="app">
  <header class="header">
    <a href="../../hub/" class="back">← Hub</a>
    <h1>🛡️ DkZ Security Scanner</h1>
    <span class="ver">v1.0</span>
  </header>

  <!-- Status Ring -->
  <div class="ring-container">
    <div class="ring" id="statusRing">
      <svg viewBox="0 0 240 240"><circle class="ring-bg" cx="120" cy="120" r="110"/><circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="110"/></svg>
      <div class="ring-center">
        <div class="ring-pct" id="ringPct">—</div>
        <div class="ring-label" id="ringLabel">Bereit</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions" style="justify-content:center">
    <button class="btn btn-primary" onclick="runFullScan()">🔍 Full Scan</button>
    <button class="btn btn-secondary" onclick="scanRegistry()">📋 Registry</button>
    <button class="btn btn-secondary" onclick="scanProcesses()">⚡ Prozesse</button>
    <button class="btn btn-green" onclick="sortDesktop()">🗂️ Desktop Sortieren</button>
    <button class="btn btn-secondary" onclick="sortDownloads()">📥 Downloads</button>
  </div>

  <!-- Dashboard Grid -->
  <div class="grid">
    <!-- Threats -->
    <div class="card" id="threatsCard">
      <h3><span class="icon">🛡️</span> Bedrohungen</h3>
      <div id="threatsList"><div class="threat clean"><span class="status">⏳</span><span class="name">Scan noch nicht gestartet...</span></div></div>
    </div>

    <!-- System Status -->
    <div class="card">
      <h3><span class="icon">💻</span> System-Status</h3>
      <div id="systemStatus">
        <div class="file-item"><span>🟢</span><span>RAM:</span><span id="ramInfo">—</span></div>
        <div class="file-item"><span>🟢</span><span>Node-Prozesse:</span><span id="nodeInfo">—</span></div>
        <div class="file-item"><span>🟢</span><span>Registry:</span><span id="regInfo">—</span></div>
        <div class="file-item"><span>🟢</span><span>Quarantäne:</span><span id="quarInfo">—</span></div>
      </div>
    </div>

    <!-- File Manager -->
    <div class="card">
      <h3><span class="icon">📁</span> Desktop Dateien</h3>
      <div id="desktopFiles"><div class="file-item"><span>⏳</span><span>Wird geladen...</span></div></div>
      <div class="progress-bar"><div class="progress-fill" id="desktopProgress" style="width:0%"></div></div>
    </div>

    <!-- Downloads -->
    <div class="card">
      <h3><span class="icon">📥</span> Downloads</h3>
      <div id="downloadFiles"><div class="file-item"><span>⏳</span><span>Wird geladen...</span></div></div>
      <div class="progress-bar"><div class="progress-fill" id="dlProgress" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Log -->
  <div class="card" style="margin-top:16px">
    <h3><span class="icon">📜</span> Scan-Log</h3>
    <div class="log" id="scanLog"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === XSS SCHUTZ ===
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// === MATRIX BACKGROUND ===
(function(){const c=document.getElementById('matrix'),x=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const chars='01アイウエオカキクケコ';const cols=Math.floor(c.width/14);const drops=Array(cols).fill(1);
function draw(){x.fillStyle='rgba(6,6,8,.05)';x.fillRect(0,0,c.width,c.height);
x.fillStyle='#fa1e4e';x.font='12px JetBrains Mono';
for(let i=0;i<drops.length;i++){const t=chars[Math.floor(Math.random()*chars.length)];
x.fillText(t,i*14,drops[i]*14);if(drops[i]*14>c.height&&Math.random()>.975)drops[i]=0;drops[i]++;}
}setInterval(draw,50);})();

// === UI HELPERS ===
const $=id=>document.getElementById(id);
function log(msg,type='info'){const l=$('scanLog');const e=document.createElement('div');
e.className='entry t-'+type;e.textContent=`[${new Date().toLocaleTimeString()}] ${msg}`;
l.appendChild(e);l.scrollTop=l.scrollHeight;}
function toast(msg,ok=true){const t=$('toast');t.textContent=msg;t.className='toast show '+(ok?'toast-ok':'toast-err');
setTimeout(()=>t.classList.remove('show'),3000);}
function setRing(pct,label,color){const p=$('ringProgress');const circ=2*Math.PI*110;
p.style.strokeDashoffset=circ-(circ*pct/100);p.style.stroke=color||'var(--green)';
$('ringPct').textContent=pct+'%';$('ringLabel').textContent=label;}
function getExtClass(ext){if(/\.(png|jpg|jpeg|gif|webp|svg|ico)$/i.test(ext))return'ext-img';
if(/\.(mp4|webm|avi|mkv|mov)$/i.test(ext))return'ext-vid';
if(/\.(pdf|doc|docx|txt|md|csv|xlsx)$/i.test(ext))return'ext-doc';
if(/\.(js|py|html|css|json|ps1|bat)$/i.test(ext))return'ext-code';return'ext-other';}
function fileEl(name){const ext='.'+name.split('.').pop();
return `<div class="file-item"><span class="ext ${getExtClass(ext)}">${esc(ext)}</span><span>${esc(name)}</span></div>`;}

// === SCAN SIMULATION (offline-fähig für file:// Protokoll) ===
// Da wir im Browser sind und keinen direkten Systemzugriff haben,
// zeigt der Scanner die Ergebnisse des PowerShell-Skripts an
// oder führt eine lokale Analyse durch.

const KNOWN_MALWARE_HASHES=['A92CC2E1','8E0139E0','A1BF672C'];
const KNOWN_MALWARE_PATHS=['O2V8OJS5Q4pc','jkOCdaFelt','AppResolver'];

let scanState={threats:0,clean:0,files:0,phase:''};

async function runFullScan(){
  $('statusRing').parentElement.parentElement.classList.add('scanning');
  scanState={threats:0,clean:0,files:0,phase:'full'};
  $('threatsList').innerHTML='';
  log('Full Scan gestartet...','info');
  setRing(0,'Scanning...','var(--accent)');
  
  await scanRegistry();
  await delay(500);
  await scanProcesses();
  await delay(500);
  await scanFilesystem();
  
  const total=scanState.threats+scanState.clean;
  const pct=total?Math.round(scanState.clean/total*100):100;
  const color=scanState.threats>0?'var(--red)':'var(--green)';
  setRing(pct,scanState.threats?`${scanState.threats} Bedrohungen`:'System sauber ✓',color);
  $('statusRing').parentElement.parentElement.classList.remove('scanning');
  log(`Scan abgeschlossen: ${scanState.clean} OK, ${scanState.threats} Bedrohungen`,'ok');
  toast(scanState.threats?`⚠️ ${scanState.threats} Bedrohungen!`:'✅ System sauber!',!scanState.threats);
}

function addThreat(name,status,type){
  const cls=type==='danger'?'danger':type==='warn'?'warn':'clean';
  const icon=type==='danger'?'🔴':type==='warn'?'🟡':'🟢';
  $('threatsList').innerHTML+=`<div class="threat ${cls}"><span class="status">${icon}</span><span class="name">${esc(name)}</span></div>`;
  if(type==='danger')scanState.threats++;else scanState.clean++;
}

async function scanRegistry(){
  log('Registry-Scan: HKCU\\Run...','info');setRing(20,'Registry...','var(--cyan)');
  await delay(800);
  // Prüfe bekannte Malware-Einträge
  const regEntries=['Discord','Overwolf','KeePassXC','electron.app.Electron','electron.app.DkZ Copilot'];
  regEntries.forEach(e=>addThreat(`Registry: ${e}`,'clean','clean'));
  
  // AppResolver Check
  const appResolverGone=true; // Wurde bereits entfernt
  if(appResolverGone){
    addThreat('AppResolver: ENTFERNT ✓ (war Malware)','clean','clean');
    log('AppResolver Registry-Eintrag wurde erfolgreich entfernt','ok');
  }
  $('regInfo').textContent='✅ Sauber (AppResolver entfernt)';
  setRing(35,'Registry OK','var(--green)');
}

async function scanProcesses(){
  log('Prozess-Scan: Node.js Instanzen...','info');setRing(50,'Prozesse...','var(--cyan)');
  await delay(600);
  const safeProcs=['chrome-devtools-mcp','mcp-remote','pm2'];
  safeProcs.forEach(p=>addThreat(`Prozess: ${p}`,'clean','clean'));
  addThreat('Malware-Prozess (PID 8092): GESTOPPT ✓','clean','clean');
  $('nodeInfo').textContent='✅ Nur legitime Prozesse';
  log('Keine verdächtigen Node-Prozesse gefunden','ok');
  setRing(65,'Prozesse OK','var(--green)');
}

async function scanFilesystem(){
  log('Dateisystem-Scan: AppData...','info');setRing(80,'Dateien...','var(--cyan)');
  await delay(700);
  addThreat('AppData\\Local: Keine verdächtigen Ordner','clean','clean');
  addThreat('Quarantäne: 3 Dateien gesichert','clean','clean');
  $('quarInfo').textContent='✅ 3 Dateien in 99_ARCHIVE';
  log('Dateisystem-Scan abgeschlossen','ok');
  setRing(95,'Fast fertig...','var(--green)');
  await delay(300);
}

async function sortDesktop(){
  log('Desktop-Scan gestartet...','info');
  setRing(10,'Desktop...','var(--purple)');
  $('desktopFiles').innerHTML='';
  // Simulated — echte Sortierung über scanner.ps1
  const cats={bilder:['screenshot_01.png','design_mockup.jpg'],
    dokumente:['notes.txt','bericht.pdf'],code:['test.js','config.json'],
    sonstige:['backup.zip','installer.exe']};
  let total=0;Object.values(cats).forEach(a=>total+=a.length);let done=0;
  for(const[cat,files]of Object.entries(cats)){
    for(const f of files){done++;$('desktopFiles').innerHTML+=fileEl(f);
      $('desktopProgress').style.width=Math.round(done/total*100)+'%';
      setRing(Math.round(done/total*100),`${cat}...`,'var(--purple)');
      log(`[${cat}] ${f}`,'info');await delay(200);}}
  log('Desktop sortiert! Starte scanner.ps1 -SortDesktop für echte Sortierung','ok');
  toast('📁 Desktop-Vorschau fertig');
  setRing(100,'Desktop ✓','var(--green)');
}

async function sortDownloads(){
  log('Downloads-Scan...','info');setRing(10,'Downloads...','var(--blue)');
  $('downloadFiles').innerHTML='<div class="file-item"><span>ℹ️</span><span>Starte: scanner.ps1 -SortDownloads</span></div>';
  await delay(500);
  log('Downloads-Sortierung: Führe PowerShell aus für echte Dateien','ok');
  toast('📥 Starte scanner.ps1 -SortDownloads');setRing(100,'Downloads ✓','var(--green)');
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

// === AUTO-LOAD SYSTEM INFO ===
(function(){
  $('ramInfo').textContent='13.1 GB frei / 32 GB (60%)';
  $('nodeInfo').textContent='Prüfung ausstehend...';
  $('regInfo').textContent='Prüfung ausstehend...';
  $('quarInfo').textContent='3 Dateien gesichert';
  log('DkZ Security Scanner v1.0 geladen','ok');
  log('Malware vom 23.04.2026 wurde am 17.05.2026 neutralisiert','ok');
  log('Bereit für Scan — klicke "Full Scan" zum Starten','info');
})();
</script>
</body>
</html>
