<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ Favicon Generator — DkZâ„¢</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 6px
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .06;
            animation: bf 20s ease-in-out infinite
        }

        .bg-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -10%;
            left: 10%
        }

        .bg-blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: var(--blue);
            bottom: 10%;
            right: 10%;
            animation-delay: -8s
        }

        @keyframes bf {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(30px, -40px) scale(1.1)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .back-btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font)
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-right {
            margin-left: auto
        }

        .ver {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .content {
            padding: 20px 28px;
            flex: 1;
            display: flex;
            gap: 20px
        }

        .left {
            flex: 1
        }

        .right {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            width: 100%
        }

        .card h3 {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px
        }

        .field {
            margin-bottom: 12px
        }

        .field label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px
        }

        .field input,
        .field select {
            width: 100%;
            padding: 10px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            outline: none
        }

        .field input:focus {
            border-color: var(--accent)
        }

        .color-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px
        }

        .color-row input[type=color] {
            width: 50px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer
        }

        .color-row label {
            font-size: 10px;
            color: var(--muted)
        }

        .canvas-wrap {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .preview-sizes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px
        }

        .prev-size {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px
        }

        .prev-size .ps-label {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .prev-size canvas {
            image-rendering: pixelated
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .emoji-grid {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 12px
        }

        .emoji-cell {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent
        }

        .emoji-cell:hover {
            background: var(--card2);
            border-color: var(--border)
        }

        .emoji-cell.active {
            border-color: var(--accent)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--green);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }

        @media(max-width:768px) {
            .content {
                flex-direction: column
            }

            .right {
                width: 100%
            }
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="favicon-gen" data-dkz-appid="DKZ-MOD-FAV" data-dkz-version="v0.01" data-dkz-title="🖼️ Favicon Generator —" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="app">
        <div class="header"><a href="../../hub/index.html" class="back-btn">← Hub</a>
            <h1>🖼️ Favicon Generator</h1>
            <div class="hdr-right"><span class="ver">v0.01</span></div>
        </div>
        <div class="content">
            <div class="left">
                <div class="card">
                    <h3>✏️ Design</h3>
                    <div class="field"><label>Text / Buchstabe</label><input id="favText" value="D" oninput="render()"
                            maxlength="3"></div>
                    <div class="field"><label>Emoji (optional)</label>
                        <div class="emoji-grid" id="emojiGrid"></div>
                    </div>
                    <div class="color-row"><label>Hintergrund:</label><input type="color" id="bgC" value="#fa1e4e"
                            onchange="render()"><label>Text:</label><input type="color" id="txC" value="#ffffff"
                            onchange="render()"></div>
                    <div class="field"><label>Form</label><select id="shape" onchange="render()">
                            <option value="square">Quadrat</option>
                            <option value="rounded">Abgerundet</option>
                            <option value="circle">Kreis</option>
                        </select></div>
                    <div class="field"><label>Schriftgröße</label><input type="range" id="fontSize" min="20" max="80"
                            value="52" oninput="render()"></div>
                    <div class="field"><label>Font</label><select id="fontFamily" onchange="render()">
                            <option>Inter</option>
                            <option>Arial</option>
                            <option>Georgia</option>
                            <option>Courier New</option>
                            <option>Impact</option>
                        </select></div>
                </div>
            </div>
            <div class="right">
                <div class="card">
                    <div class="canvas-wrap"><canvas id="mainCanvas" width="256" height="256"></canvas></div>
                    <div class="preview-sizes" id="previews"></div>
                </div>
                <button class="btn" onclick="download(16)">📥 16x16 (favicon.ico)</button>
                <button class="btn" onclick="download(32)">📥 32x32</button>
                <button class="btn" onclick="download(180)">📥 180x180 (Apple)</button>
                <button class="btn" onclick="download(512)">📥 512x512 (PWA)</button>
                <button class="btn secondary" onclick="copyCode()">📋 HTML Code</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    // DkZ XSS Protection
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
        const EMOJIS = ['⚡', '🔥', '🚀', '💎', '🎯', '⭐', '🎨', '🔒', '📦', '🌐', '💡', '🛡️', '⚙️', '🎮', '📱', '🏠'];
        let selectedEmoji = '';
        document.getElementById('emojiGrid').innerHTML = EMOJIS.map(e => `<div class="emoji-cell" onclick="selectedEmoji=selectedEmoji==='${e}'&#10067;'':'${e}';document.querySelectorAll('.emoji-cell').forEach(c=>c.classList.remove('active'));if(selectedEmoji)this.classList.add('active');render()">${e}</div>`).join('');
        function render() {
            const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d'); const s = 256; canvas.width = s; canvas.height = s;
            const bg = document.getElementById('bgC').value, tx = document.getElementById('txC').value, shape = document.getElementById('shape').value, fs = +document.getElementById('fontSize').value, ff = document.getElementById('fontFamily').value;
            ctx.clearRect(0, 0, s, s); ctx.fillStyle = bg;
            if (shape === 'circle') { ctx.beginPath(); ctx.arc(s / 2, s / 2, s / 2, 0, Math.PI * 2); ctx.fill() }
            else if (shape === 'rounded') { roundRect(ctx, 0, 0, s, s, s * 0.15); ctx.fill() }
            else { ctx.fillRect(0, 0, s, s) }
            const text = selectedEmoji || document.getElementById('favText').value; ctx.fillStyle = tx; ctx.font = `bold ${fs * s / 100}px "${ff}"`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, s / 2, s / 2 + (selectedEmoji - 4 : 0));
            renderPreviews()
        }
        function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath() }
        function renderPreviews() { const sizes = [16, 32, 48, 64]; const main = document.getElementById('mainCanvas'); document.getElementById('previews').innerHTML = sizes.map(s => { const c = document.createElement('canvas'); c.width = s; c.height = s; c.getContext('2d').drawImage(main, 0, 0, s, s); return `<div class="prev-size"><img src="${c.toDataURL()}" width="${s}" height="${s}" style="image-rendering:pixelated"><span class="ps-label">${s}x${s}</span></div>` }).join('') }
        function download(size) { const c = document.createElement('canvas'); c.width = size; c.height = size; c.getContext('2d').drawImage(document.getElementById('mainCanvas'), 0, 0, size, size); const a = document.createElement('a'); a.href = c.toDataURL('image/png'); a.download = `favicon-${size}x${size}.png`; a.click(); showToast(`📥 ${size}x${size}!`) }
        function copyCode() { const code = `<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">\n<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">\n<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">`; navigator.clipboard.writeText(code); showToast('📋 HTML kopiert!') }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }
        render();
    </script>
