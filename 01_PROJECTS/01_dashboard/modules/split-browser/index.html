<!DOCTYPE html>
<html lang="de">

    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 Split Browser — DkZâ„¢ v0.01</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --green: #00ff88;
            --blue: #55ACEE;
            --yellow: #FFB800;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --accent-rgb: 250, 30, 78;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px)
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow: hidden
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        .header {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: var(--blur);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            z-index: 10
        }

        .back-btn {
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-size: 10px;
            cursor: pointer;
            transition: all .25s;
            text-decoration: none;
            font-family: var(--font)
        }

        .back-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .header h1 {
            font-size: 16px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .presets {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-left: 12px
        }

        .preset {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            font-size: 10px;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s
        }

        .preset:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .preset.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            gap: 6px;
            align-items: center
        }

        .hdr-btn {
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, .03);
            color: var(--muted);
            font-family: var(--font);
            font-size: 10px;
            cursor: pointer;
            transition: all .25s
        }

        .hdr-btn:hover {
            color: var(--text);
            border-color: var(--accent)
        }

        .hdr-btn.active {
            background: var(--accent);
            color: #fff
        }

        .ver {
            font-size: 8px;
            color: var(--muted);
            font-family: var(--mono)
        }

        .url-bar {
            padding: 6px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--card2);
            display: flex;
            gap: 8px;
            flex-shrink: 0
        }

        .url-input {
            flex: 1;
            padding: 6px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            outline: none
        }

        .url-input:focus {
            border-color: var(--accent)
        }

        .url-go {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer
        }

        .split-container {
            flex: 1;
            display: flex;
            overflow: hidden
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .pane-bar {
            padding: 4px 10px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--muted);
            flex-shrink: 0
        }

        .pane-bar select {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: var(--font);
            outline: none
        }

        .pane iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff
        }

        .divider {
            width: 4px;
            background: var(--border);
            cursor: col-resize;
            flex-shrink: 0;
            transition: background .2s
        }

        .divider:hover {
            background: var(--accent)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 16px;
            background: var(--green);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            border-radius: 8px;
            z-index: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: all .3s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }
    </style>
<script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="split-browser" data-dkz-appid="DKZ-MOD-SPL" data-dkz-version="v0.01" data-dkz-title="🌐 Split Browser —" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh"><div class="bg-blob"></div><div class="bg-blob"></div></div>
    <div class="app">
        <div class="header">
            <a href="../../hub/index.html" class="back-btn">← Hub</a>
            <h1>🌐 Split Browser</h1>
            <div class="presets">
                <button class="preset active" onclick="setPreset('duck','wiki',this)">🔍+📚</button>
                <button class="preset" onclick="setPreset('chat','github',this)">💬+💻</button>
                <button class="preset" onclick="setPreset('reddit','hn',this)">📱+📰</button>
                <button class="preset" onclick="setPreset('youtube','duck',this)">▶️+🔍</button>
            </div>
            <div class="hdr-right">
                <button class="hdr-btn" onclick="swapPanes()">⇄ Tauschen</button>
                <span class="ver">v0.01</span>
            </div>
        </div>
        <div class="url-bar">
            <span style="font-size:10px;color:var(--muted)">L:</span>
            <input class="url-input" id="url1" value="https://duckduckgo.com"
                onkeydown="if(event.key==='Enter')loadPane(1)">
            <span style="font-size:10px;color:var(--muted)">R:</span>
            <input class="url-input" id="url2" value="https://de.wikipedia.org"
                onkeydown="if(event.key==='Enter')loadPane(2)">
            <button class="url-go" onclick="loadPane(1);loadPane(2)">▶ Laden</button>
        </div>
        <div class="split-container">
            <div class="pane" id="pane1">
                <div class="pane-bar">
                    📄 Links
                    <select onchange="setPane(1,this.value)">
                        <option value="https://duckduckgo.com">DuckDuckGo</option>
                        <option value="https://de.wikipedia.org">Wikipedia</option>
                        <option value="https://chat.openai.com">ChatGPT</option>
                        <option value="https://news.ycombinator.com">Hacker News</option>
                        <option value="https://github.com">GitHub</option>
                        <option value="https://reddit.com">Reddit</option>
                        <option value="https://example.com">Example</option>
                    </select>
                </div>
                <iframe id="frame1" src="https://duckduckgo.com"
                    sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
            </div>
            <div class="divider" onmousedown="startResize(event)"></div>
            <div class="pane" id="pane2">
                <div class="pane-bar">
                    📄 Rechts
                    <select onchange="setPane(2,this.value)">
                        <option value="https://de.wikipedia.org">Wikipedia</option>
                        <option value="https://duckduckgo.com">DuckDuckGo</option>
                        <option value="https://chat.openai.com">ChatGPT</option>
                        <option value="https://news.ycombinator.com">Hacker News</option>
                        <option value="https://github.com">GitHub</option>
                        <option value="https://reddit.com">Reddit</option>
                        <option value="https://example.com">Example</option>
                    </select>
                </div>
                <iframe id="frame2" src="https://de.wikipedia.org"
                    sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    // DkZ XSS Protection
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
        const SITES = { duck: 'https://duckduckgo.com', wiki: 'https://de.wikipedia.org', chat: 'https://chat.openai.com', hn: 'https://news.ycombinator.com', github: 'https://github.com', reddit: 'https://reddit.com', youtube: 'https://youtube.com', example: 'https://example.com' };
        function setPane(n, url) { document.getElementById('frame' + n).src = url; document.getElementById('url' + n).value = url }
        function loadPane(n) { document.getElementById('frame' + n).src = document.getElementById('url' + n).value }
        function setPreset(l, r, btn) { document.querySelectorAll('.preset').forEach(p => p.classList.remove('active')); btn.classList.add('active'); setPane(1, SITES[l]); setPane(2, SITES[r]) }
        function swapPanes() { const u1 = document.getElementById('url1').value, u2 = document.getElementById('url2').value; setPane(1, u2); setPane(2, u1); document.getElementById('url1').value = u2; document.getElementById('url2').value = u1 }
        function startResize(e) { const cont = document.querySelector('.split-container'); const p1 = document.getElementById('pane1'); const startX = e.clientX; const startW = p1.offsetWidth; function resize(e) { const w = Math.min(Math.max(startW + (e.clientX - startX), 200), cont.offsetWidth - 200); p1.style.flex = 'none'; p1.style.width = w + 'px' } function stop() { document.removeEventListener('mousemove', resize); document.removeEventListener('mouseup', stop) } document.addEventListener('mousemove', resize); document.addEventListener('mouseup', stop) }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500) }
    </script>

<div style="position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1001;opacity:0;pointer-events:none;transition:.3s" id="onboarding"><div style="background:#1a1a1c;border:1px solid #2a2a2e;border-radius:16px;padding:2rem;max-width:420px;text-align:center"><div style="font-size:1.25rem;font-weight:800;margin-bottom:.75rem">Split browser</div><p style="font-size:.875rem;color:#a0a0a0;line-height:1.8;margin-bottom:1rem">Split-Screen Browser fuer Vergleiche.</p><button style="width:100%;padding:.625rem;border:none;border-radius:6px;background:linear-gradient(135deg,#fa1e4e,#ec4899);color:#fff;font-weight:700;cursor:pointer;font-family:inherit" onclick="closeOnboarding()">Los geht's!</button><div style="font-size:.7rem;color:#606060;margin-top:.5rem">Wird nur 1x gezeigt</div></div></div>
<script>function showModuleInfo(){var m=document.getElementById('info-modal');m.style.opacity='1';m.style.pointerEvents='all'}function closeOnboarding(){var m=document.getElementById('onboarding');m.style.opacity='0';m.style.pointerEvents='none';localStorage.setItem('dkz-split-browser-onboarded','1')}if(!localStorage.getItem('dkz-split-browser-onboarded')){var ob=document.getElementById('onboarding');ob.style.opacity='1';ob.style.pointerEvents='all'}setTimeout(function(){var c=document.querySelector('.header-actions')||document.querySelector('header > div:last-child')||document.querySelector('.header > div:last-child')||document.querySelector('header')||document.querySelector('.header')||document.querySelector('[class*=header]');if(c&&!document.getElementById('dkz-info-btn')){var b=document.createElement('button');b.id='dkz-info-btn';b.innerHTML='&#9432;';b.title='Modul-Info';b.style.cssText='padding:.5rem;border:1px solid #2a2a2e;border-radius:6px;background:rgba(255,255,255,.05);color:#f6f6f7;font-size:1.1rem;cursor:pointer';b.onclick=function(){showModuleInfo()};c.insertBefore(b,c.firstChild)}},500);</script>    <script src="../../shared/dkz-headbar.js"></script>
