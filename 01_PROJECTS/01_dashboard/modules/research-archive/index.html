<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Research Archive — DkZâ„¢™</title>
    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --card: rgba(18, 18, 24, 0.85);
            --card2: #16161c;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(250,30,78,0.3);
            --text: #e8e8ec;
            --muted: #8a8a9a;
            --dim: #555;
            --green: #00ff88;
            --blue: #3b82f6;
            --yellow: #FFB800;
            --red: #ff3b5c;
            --accent: #fa1e4e;
            --purple: #a855f7;
            --cyan: #06b6d4;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --radius: 14px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-thumb { background:rgba(250,30,78,0.2); border-radius:6px; }

        /* ═══ MESH BG ═══ */
        .bg-mesh { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
        .bg-blob { position:absolute; border-radius:50%; filter:blur(160px); opacity:.04; animation:bf 30s ease-in-out infinite; }
        .bg-blob:nth-child(1) { width:700px; height:700px; background:var(--accent); top:-10%; left:5%; }
        .bg-blob:nth-child(2) { width:500px; height:500px; background:var(--blue); bottom:5%; right:10%; animation-delay:-12s; }
        .bg-blob:nth-child(3) { width:400px; height:400px; background:var(--purple); top:30%; right:25%; animation-delay:-20s; }
        @keyframes bf { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-40px) scale(1.1)} }

        .scanline { position:fixed; inset:0; z-index:0; pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.006) 2px,rgba(255,255,255,0.006) 4px); }

        .app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

        /* ═══ HEADER ═══ */
        .header {
            padding:14px 28px; border-bottom:1px solid var(--border);
            background:rgba(6,6,8,0.88); backdrop-filter:blur(24px);
            display:flex; align-items:center; gap:14px;
            position:sticky; top:0; z-index:100;
        }
        .back-btn {
            padding:7px 14px; border:1px solid var(--border); border-radius:10px;
            background:rgba(255,255,255,.03); color:var(--muted); font-size:11px;
            cursor:pointer; text-decoration:none; font-family:var(--font); transition:all .2s;
        }
        .back-btn:hover { border-color:var(--accent); color:var(--text); }
        .header h1 { font-size:20px; font-weight:900; letter-spacing:-0.5px; display:flex; align-items:center; gap:8px; }
        .header h1 .icon { font-size:22px; }
        .header h1 .txt {
            background:linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .header h1 .badge {
            font-size:9px; font-weight:700; background:var(--accent); color:#fff;
            padding:2px 8px; border-radius:20px; -webkit-text-fill-color:#fff;
        }
        .hdr-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
        .hdr-stat { text-align:center; }
        .hdr-stat .val { font-size:16px; font-weight:800; color:var(--accent); font-family:var(--mono); }
        .hdr-stat .lbl { font-size:7px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
        .ver { font-size:9px; color:var(--muted); font-family:var(--mono); }

        /* ═══ STATS ROW ═══ */
        .stats-row {
            display:flex; gap:10px; padding:16px 28px;
            border-bottom:1px solid var(--border);
            background:rgba(6,6,8,0.5);
        }
        .stat-card {
            flex:1; background:var(--card); border:1px solid var(--border);
            border-radius:12px; padding:14px 16px; text-align:center;
            transition:all .25s; cursor:pointer; position:relative; overflow:hidden;
        }
        .stat-card::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(135deg, transparent, rgba(250,30,78,0.03));
            opacity:0; transition:opacity .3s;
        }
        .stat-card:hover::before { opacity:1; }
        .stat-card:hover { border-color:var(--border-hover); transform:translateY(-2px); }
        .stat-card.active { border-color:var(--accent); background:rgba(250,30,78,0.06); }
        .stat-card .num { font-size:28px; font-weight:900; font-family:var(--mono); line-height:1; }
        .stat-card .lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }
        .c-accent { color:var(--accent); }
        .c-green { color:var(--green); }
        .c-blue { color:var(--blue); }
        .c-yellow { color:var(--yellow); }
        .c-purple { color:var(--purple); }
        .c-cyan { color:var(--cyan); }

        /* ═══ TOOLBAR ═══ */
        .toolbar {
            display:flex; gap:10px; padding:14px 28px; align-items:center;
            border-bottom:1px solid var(--border); flex-wrap:wrap;
        }
        .search-box {
            flex:1; min-width:200px; position:relative;
        }
        .search-box input {
            width:100%; padding:10px 14px 10px 36px;
            background:var(--card2); border:1px solid var(--border);
            border-radius:10px; color:var(--text); font-family:var(--font);
            font-size:13px; outline:none; transition:border-color .2s;
        }
        .search-box input:focus { border-color:var(--accent); }
        .search-box::before {
            content:'🔍'; position:absolute; left:12px; top:50%; transform:translateY(-50%);
            font-size:12px; opacity:.5;
        }
        .filter-pills { display:flex; gap:4px; flex-wrap:wrap; }
        .pill {
            padding:7px 14px; border:1px solid var(--border); border-radius:20px;
            background:transparent; color:var(--muted); font-size:10px; font-weight:600;
            cursor:pointer; font-family:var(--font); transition:all .2s; white-space:nowrap;
        }
        .pill:hover { border-color:var(--accent); color:var(--text); }
        .pill.active { background:linear-gradient(135deg,var(--accent),#ff6b9d); color:#fff; border-color:transparent; }
        .date-select {
            padding:8px 12px; background:var(--card2); border:1px solid var(--border);
            border-radius:10px; color:var(--text); font-family:var(--font); font-size:11px;
            outline:none; cursor:pointer;
        }

        /* ═══ CONTENT ═══ */
        .content { flex:1; padding:16px 28px; }
        .result-count { font-size:11px; color:var(--muted); margin-bottom:12px; font-family:var(--mono); }

        /* ═══ ARTIFACT GRID ═══ */
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:12px; }

        .artifact {
            background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
            padding:16px 18px; transition:all .25s ease; cursor:pointer; position:relative;
            overflow:hidden;
        }
        .artifact::before {
            content:''; position:absolute; top:0; left:0; width:3px; height:100%;
            border-radius:0 3px 3px 0;
        }
        .artifact[data-type="implementation_plan"]::before { background:var(--blue); }
        .artifact[data-type="task"]::before { background:var(--green); }
        .artifact[data-type="walkthrough"]::before { background:var(--purple); }
        .artifact[data-type="other"]::before { background:var(--yellow); }

        .artifact:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }

        .art-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
        .art-type {
            font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px;
            padding:3px 8px; border-radius:12px; white-space:nowrap;
        }
        .type-implementation_plan { background:rgba(59,130,246,0.12); color:var(--blue); }
        .type-task { background:rgba(0,255,136,0.1); color:var(--green); }
        .type-walkthrough { background:rgba(168,85,247,0.12); color:var(--purple); }
        .type-other { background:rgba(255,184,0,0.12); color:var(--yellow); }

        .art-date { font-size:9px; color:var(--dim); font-family:var(--mono); }
        .art-file { font-size:12px; font-weight:700; color:var(--text); margin-bottom:6px; word-break:break-all; }
        .art-summary { font-size:11px; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
        .art-session { font-size:8px; color:var(--dim); font-family:var(--mono); margin-top:8px; opacity:.5; }
        .art-session:hover { opacity:1; }

        /* ═══ DETAIL MODAL ═══ */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:500;
            display:none; align-items:center; justify-content:center;
            backdrop-filter:blur(4px);
        }
        .modal-overlay.show { display:flex; }
        .modal {
            background:#12121a; border:1px solid var(--border); border-radius:16px;
            width:90%; max-width:700px; max-height:80vh; overflow:auto; padding:24px;
            box-shadow:0 32px 64px rgba(0,0,0,0.5);
        }
        .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .modal-head h2 { font-size:16px; font-weight:800; }
        .modal-close {
            width:32px; height:32px; border:1px solid var(--border); border-radius:8px;
            background:transparent; color:var(--text); cursor:pointer; font-size:16px;
        }
        .modal-meta { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .modal-meta .tag { font-size:10px; padding:4px 10px; border-radius:8px; background:var(--card2); color:var(--muted); font-family:var(--mono); }
        .modal-body { font-size:13px; color:var(--text); line-height:1.7; white-space:pre-wrap; word-wrap:break-word; }
        .modal-body code { background:var(--card2); padding:2px 6px; border-radius:4px; font-family:var(--mono); font-size:11px; }

        /* ═══ EMPTY STATE ═══ */
        .empty { text-align:center; padding:60px 20px; }
        .empty .icon { font-size:48px; opacity:.2; }
        .empty .txt { font-size:13px; color:var(--muted); margin-top:12px; }

        /* ═══ TOAST ═══ */
        .toast {
            position:fixed; bottom:24px; right:24px; padding:12px 20px;
            background:linear-gradient(135deg,var(--green),#00cc6a);
            color:#000; font-size:12px; font-weight:700; border-radius:12px;
            z-index:600; opacity:0; transform:translateY(20px);
            transition:all .3s; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateY(0); }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width:768px) {
            .stats-row { flex-wrap:wrap; }
            .stat-card { min-width:calc(50% - 8px); }
            .grid { grid-template-columns:1fr; }
            .toolbar { flex-direction:column; }
        }
    </style>
    <script src="../../shared/dkz-updater.js"></script>
    <script src="./master-data.js"></script>
</head>
<body data-dkz-module="research-archive" data-dkz-appid="DKZ-MOD-RES" data-dkz-version="v0.01" data-dkz-title="🔬 Research Archive — ™" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
    <div class="scanline"></div>

    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <a href="../../hub/index.html" class="back-btn">← Hub</a>
            <h1>
                <span class="icon">🔬</span>
                <span class="txt">Research Archive</span>
                <span class="badge" id="totalBadge">0</span>
            </h1>
            <div class="hdr-right">
                <div class="hdr-stat"><div class="val" id="hdrSessions">0</div><div class="lbl">Sessions</div></div>
                <div class="hdr-stat"><div class="val" id="hdrArtifacts">0</div><div class="lbl">Artefakte</div></div>
                <span class="ver">v2.00</span>
            </div>
        </div>

        <!-- STATS ROW -->
        <div class="stats-row">
            <div class="stat-card active" onclick="filterType('all')" id="stat-all">
                <div class="num c-accent" id="countAll">0</div>
                <div class="lbl">Gesamt</div>
            </div>
            <div class="stat-card" onclick="filterType('documentation')" id="stat-documentation">
                <div class="num c-blue" id="countDoc">0</div>
                <div class="lbl">📄 Doku</div>
            </div>
            <div class="stat-card" onclick="filterType('readme')" id="stat-readme">
                <div class="num c-green" id="countReadme">0</div>
                <div class="lbl">📘 README</div>
            </div>
            <div class="stat-card" onclick="filterType('archive')" id="stat-archive">
                <div class="num c-yellow" id="countArchive">0</div>
                <div class="lbl">📦 Archive</div>
            </div>
            <div class="stat-card" onclick="filterType('research')" id="stat-research">
                <div class="num c-purple" id="countResearch">0</div>
                <div class="lbl">🔬 Research</div>
            </div>
            <div class="stat-card" onclick="filterType('blueprint')" id="stat-blueprint">
                <div class="num c-cyan" id="countBlueprint">0</div>
                <div class="lbl">🏗️ Blueprint</div>
            </div>
            <div class="stat-card" onclick="filterType('implementation_plan')" id="stat-implementation_plan">
                <div class="num" style="color:#f97316" id="countPlan">0</div>
                <div class="lbl">📐 Pläne</div>
            </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Suche in 4.100+ Einträgen..." oninput="debounceFilter()">
            </div>
            <select class="date-select" id="dateFilter" onchange="applyFilters()">
                <option value="all">📅 Alle Zeiträume</option>
                <option value="today">Heute</option>
                <option value="week">Diese Woche</option>
                <option value="month">Dieser Monat</option>
                <option value="older">Älter als 1 Monat</option>
            </select>
            <select class="date-select" id="sortOrder" onchange="applyFilters()">
                <option value="newest">🔽 Neueste zuerst</option>
                <option value="oldest">🔼 Älteste zuerst</option>
            </select>
            <select class="date-select" id="sourceFilter" onchange="applyFilters()">
                <option value="all">💾 Alle Quellen</option>
                <option value="workspace">📁 Workspace</option>
                <option value="brain">🧠 Brain</option>
                <option value="wissenhub">🧊 WissenHub</option>
            </select>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <div class="result-count" id="resultCount">Lade...</div>
            <div class="grid" id="grid"></div>
            <div id="loadMore" style="text-align:center;padding:20px;display:none">
                <button onclick="loadNextPage()" style="padding:10px 28px;background:linear-gradient(135deg,var(--accent),#ff6b9d);border:none;color:#fff;border-radius:10px;font-weight:700;cursor:pointer;font-family:var(--font)">⬇ Mehr laden (<span id="remainCount">0</span> verbleibend)</button>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-head">
                <h2 id="modalTitle">—</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ═══ DkZ™ XSS Protection ═══
    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }

    // ═══ STATE ═══
    let allArtifacts = [];
    let filteredItems = [];
    let currentTypeFilter = 'all';
    let currentPage = 0;
    const PAGE_SIZE = 200;
    let debounceTimer = null;

    function debounceFilter() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFilters, 250);
    }

    // ═══ DATA LOADING ═══
    function loadData() {
        const results = [];
        const data = typeof MASTER_INDEX !== 'undefined' ? MASTER_INDEX : null;

        if (data) {
            // Brain-Artefakte
            (data.brain_artifacts || data.artifacts || []).forEach(a => {
                results.push({
                    source: 'brain',
                    session: a.session || '',
                    file: a.file || '',
                    type: (a.type || '').toLowerCase().replace('artifact_type_',''),
                    summary: a.summary || '',
                    date: a.date || '',
                    path: a.path || ''
                });
            });
            // Workspace-Dateien (.md + .zip/.rar)
            (data.workspace_files || []).forEach(w => {
                results.push({
                    source: 'workspace',
                    session: '',
                    file: w.file || '',
                    type: w.type || 'documentation',
                    summary: w.summary || '',
                    date: w.date || '',
                    path: w.path || '',
                    size: w.size || 0
                });
            });
            document.getElementById('hdrSessions').textContent = data.total_sessions || 0;
        } else {
            console.warn('MASTER_INDEX nicht verfügbar — master-data.js fehlt?');
        }

        // WissenHub Catalog (aus master-data.js WISSENHUB_CATALOG Variable)
        if (typeof WISSENHUB_CATALOG !== 'undefined' && WISSENHUB_CATALOG.entries) {
            WISSENHUB_CATALOG.entries.forEach(e => {
                results.push({
                    source: 'wissenhub',
                    session: '',
                    file: e.title || e.id,
                    type: 'wissenhub',
                    summary: `[${(e.rubrik||'').toUpperCase()}] ${e.title} — Tags: ${(e.tags||[]).join(', ')}`,
                    date: e.created || '',
                    path: e.filepath || '',
                    tags: e.tags || []
                });
            });
        }

        allArtifacts = results;
        updateStats();
        applyFilters();
        showToast(`✅ ${results.length.toLocaleString('de-DE')} Einträge geladen`);
    }

    // ═══ STATS ═══
    function updateStats() {
        const counts = {};
        allArtifacts.forEach(a => { counts[a.type] = (counts[a.type] || 0) + 1; });
        document.getElementById('countAll').textContent = allArtifacts.length.toLocaleString('de-DE');
        document.getElementById('countDoc').textContent = (counts.documentation || 0).toLocaleString('de-DE');
        document.getElementById('countReadme').textContent = (counts.readme || 0).toLocaleString('de-DE');
        document.getElementById('countArchive').textContent = (counts.archive || 0).toLocaleString('de-DE');
        document.getElementById('countResearch').textContent = (counts.research || 0).toLocaleString('de-DE');
        document.getElementById('countBlueprint').textContent = (counts.blueprint || 0).toLocaleString('de-DE');
        document.getElementById('countPlan').textContent = ((counts.implementation_plan || 0) + (counts.task || 0) + (counts.walkthrough || 0) + (counts.changelog || 0)).toLocaleString('de-DE');
        document.getElementById('hdrArtifacts').textContent = allArtifacts.length.toLocaleString('de-DE');
        document.getElementById('totalBadge').textContent = allArtifacts.length.toLocaleString('de-DE');
        document.getElementById('searchInput').placeholder = `Suche in ${allArtifacts.length.toLocaleString('de-DE')} Einträgen...`;
    }

    // ═══ FILTER ═══
    function filterType(type) {
        currentTypeFilter = type;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        const el = document.getElementById('stat-' + type);
        if (el) el.classList.add('active');
        else document.getElementById('stat-all').classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const dateFilter = document.getElementById('dateFilter').value;
        const sortOrder = document.getElementById('sortOrder').value;
        const sourceFilter = document.getElementById('sourceFilter').value;
        const now = new Date();

        // Type groups for "Pläne" stat card
        const planTypes = ['implementation_plan','task','walkthrough','changelog'];

        filteredItems = allArtifacts.filter(a => {
            // Source filter
            if (sourceFilter !== 'all' && a.source !== sourceFilter) return false;

            // Type filter
            if (currentTypeFilter !== 'all') {
                if (currentTypeFilter === 'implementation_plan') {
                    if (!planTypes.includes(a.type)) return false;
                } else if (a.type !== currentTypeFilter) return false;
            }

            // Search filter
            if (search) {
                const haystack = `${a.file} ${a.summary} ${a.path} ${a.session} ${(a.tags||[]).join(' ')}`.toLowerCase();
                if (!haystack.includes(search)) return false;
            }

            // Date filter
            if (dateFilter !== 'all' && a.date) {
                const d = new Date(a.date);
                const diff = (now - d) / (1000*60*60*24);
                if (dateFilter === 'today' && diff > 1) return false;
                if (dateFilter === 'week' && diff > 7) return false;
                if (dateFilter === 'month' && diff > 30) return false;
                if (dateFilter === 'older' && diff <= 30) return false;
            }

            return true;
        });

        // Sort
        filteredItems.sort((a, b) => {
            const da = new Date(a.date || 0);
            const db = new Date(b.date || 0);
            return sortOrder === 'newest' ? db - da : da - db;
        });

        currentPage = 0;
        renderGrid();
    }

    // ═══ RENDER (paginated) ═══
    function renderGrid() {
        const grid = document.getElementById('grid');
        const end = Math.min((currentPage + 1) * PAGE_SIZE, filteredItems.length);
        const items = filteredItems.slice(0, end);

        document.getElementById('resultCount').textContent =
            `${items.length.toLocaleString('de-DE')} von ${filteredItems.length.toLocaleString('de-DE')} Ergebnissen`;

        if (!items.length) {
            grid.innerHTML = '<div class="empty"><div class="icon">🔍</div><div class="txt">Keine Einträge gefunden</div></div>';
            document.getElementById('loadMore').style.display = 'none';
            return;
        }

        const typeLabels = {
            implementation_plan: '📐 Plan', task: '📋 Task', walkthrough: '📖 Walk',
            wissenhub: '🧊 WissenHub', documentation: '📄 Doku', readme: '📘 README',
            archive: '📦 Archiv', research: '🔬 Research', blueprint: '🏗️ Blueprint',
            changelog: '📝 Changelog', other: '🔧 Andere'
        };
        const typeClasses = ['implementation_plan','task','walkthrough','wissenhub','documentation','readme','archive','research','blueprint','changelog'];

        grid.innerHTML = items.map((a, i) => {
            const tc = typeClasses.includes(a.type) ? a.type : 'other';
            const label = typeLabels[tc] || '🔧 ' + esc(a.type);
            const dateStr = a.date ? formatDate(a.date) : '—';
            const src = a.source === 'brain' ? '🧠' : a.source === 'wissenhub' ? '🧊' : '📁';
            const pathShort = a.path ? a.path.split('\\').pop().split('/').pop() : a.source;

            return `<div class="artifact" data-type="${esc(tc)}" onclick="showDetail(${i})">
                <div class="art-head">
                    <span class="art-type type-${esc(tc)}">${label}</span>
                    <span class="art-date">${dateStr}</span>
                </div>
                <div class="art-file">${esc(a.file)}</div>
                <div class="art-summary">${esc(a.summary)}</div>
                <div class="art-session">${src} ${esc(a.path ? a.path.substring(0, 60) : a.source)}</div>
            </div>`;
        }).join('');

        grid._items = items;

        // Show/hide load more
        const remaining = filteredItems.length - end;
        const lb = document.getElementById('loadMore');
        if (remaining > 0) {
            lb.style.display = 'block';
            document.getElementById('remainCount').textContent = remaining.toLocaleString('de-DE');
        } else { lb.style.display = 'none'; }
    }

    function loadNextPage() {
        currentPage++;
        renderGrid();
        showToast(`⬇ Seite ${currentPage + 1} geladen`);
    }

    // ═══ DETAIL ═══
    function showDetail(idx) {
        const items = document.getElementById('grid')._items;
        const a = items[idx];
        if (!a) return;

        const typeLabels = {
            implementation_plan: '📐 Implementierungsplan', task: '📋 Task',
            walkthrough: '📖 Walkthrough', wissenhub: '🧊 WissenHub',
            documentation: '📄 Dokumentation', readme: '📘 README',
            archive: '📦 Archiv', research: '🔬 Research',
            blueprint: '🏗️ Blueprint', changelog: '📝 Changelog',
            other: '🔧 Sonstiges'
        };

        document.getElementById('modalTitle').textContent = a.file;
        document.getElementById('modalMeta').innerHTML = `
            <span class="tag">${typeLabels[a.type] || a.type}</span>
            <span class="tag">📅 ${a.date ? formatDate(a.date) : '—'}</span>
            ${a.session ? `<span class="tag">🔗 ${esc(a.session.substring(0,12))}...</span>` : ''}
            <span class="tag">💾 ${esc(a.source)}</span>
            ${a.path ? `<span class="tag">📂 ${esc(a.path)}</span>` : ''}
            ${a.size ? `<span class="tag">📊 ${(a.size/1024).toFixed(0)}KB</span>` : ''}
            ${(a.tags||[]).map(t => `<span class="tag">#${esc(t)}</span>`).join('')}
        `;
        document.getElementById('modalBody').textContent = a.summary || 'Keine Details verfügbar.';
        document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('show');
    }

    // ═══ UTILS ═══
    function formatDate(dateStr) {
        try {
            const d = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - d) / (1000*60*60*24));
            if (diff === 0) return 'Heute';
            if (diff === 1) return 'Gestern';
            if (diff < 7) return `Vor ${diff} Tagen`;
            return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
        } catch { return dateStr; }
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === '/' && !e.ctrlKey) { e.preventDefault(); document.getElementById('searchInput').focus(); }
    });

    // ═══ INIT ═══
    loadData();
    </script>
