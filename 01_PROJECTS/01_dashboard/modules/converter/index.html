<body data-dkz-module="converter" data-dkz-appid="DKZ-MOD-CON" data-dkz-version="v0.01" data-dkz-title="AI CONVERTER - Ecosystem" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh"><div class="bg-blob"></div><div class="bg-blob"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = '', weight = 'regular' }) => {
            return <i className={`ph-${weight} ph-${name} text-[${size}px] ${className}`}></i>;
        };

        const useIsMobile = () => {
            const [isMobile, setIsMobile] = useState(window.innerWidth < 1024);
            useEffect(() => {
                const check = () => setIsMobile(window.innerWidth < 1024);
                window.addEventListener('resize', check);
                return () => window.removeEventListener('resize', check);
            }, []);
            return isMobile;
        };

        const App = () => {
            const isMobile = useIsMobile();
            const [activeTab, setActiveTab] = useState('input');
            const [inputContent, setInputContent] = useState('');
            const [contextContent, setContextContent] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [syncStatus, setSyncStatus] = useState(null);

            const displayResultRef = useRef(null);

            const handleScan = async () => {
                if (!inputContent.trim()) {
                    setError("Bitte Quellcode eingeben.");
                    return;
                }

                setIsScanning(true);
                setError(null);
                setResult(null);

                try {
                    const prompt = `Act as an expert Senior Software Engineer. I need to convert, explain, or refactor the following code.` +
                        (contextContent - ` Instructions/Target Language:\n${contextContent}\n\n` : `\n\n`) +
                        `Source Code:\n${inputContent}\n\n` +
                        `Provide the converted code block formatted in Markdown. If explaining, be concise.`;

                    // Call Puter.js AI
                    const response = await puter.ai.chat(prompt);

                    if (response && response.message && response.message.content) {
                        setResult(response.message.content);
                    } else if (typeof response === 'string') {
                        setResult(response);
                    } else {
                        setError("Fehler bei der AI Antwort. Unbekanntes Format.");
                    }
                } catch (err) {
                    console.error(err);
                    setError(err.message || "Fehler bei der AI Verarbeitung mit Puter.js");
                } finally {
                    setIsScanning(false);
                }
            };

            const handleSyncRepo = async () => {
                setIsSyncing(true);
                setSyncStatus(null);
                try {
                    const response = await fetch('http://localhost:3040/api/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const data = await response.json();

                    if (data.success) {
                        setSyncStatus({ type: 'success', message: data.message });
                    } else {
                        setSyncStatus({ type: 'error', message: data.error || 'Sync failed.' });
                    }
                } catch (err) {
                    console.error('Sync request failed:', err);
                    setSyncStatus({
                        type: 'error',
                        message: 'Konnte keine Verbindung zum lokalen Sync-Server (Port 3040) herstellen. Bitte starte ihn mit "node sync-server.js"'
                    });
                } finally {
                    setIsSyncing(false);
                    // Hide sync status after 5s
                    setTimeout(() => setSyncStatus(null), 5000);
                }
            };

            // Parse markdown to HTML
            const renderMarkdown = () => {
                if (!result) return { __html: '' };
                return { __html: marked.parse(result) };
            };

            return (
                <div className="min-h-screen flex flex-col p-2 md:p-8">
                    {/* Header */}
                    <header className="flex items-center justify-between mb-4 md:mb-8 z-10 glass rounded-2xl p-3 md:p-4 px-4 md:px-6 relative overflow-hidden shrink-0">
                        <div className="absolute inset-0 bg-gradient-to-r from-brand/10 to-transparent pointer-events-none"></div>
                        <div className="flex items-center gap-3 md:gap-4 relative z-10">
                            <a
                                href={isMobile - "../../dashboard/hub/index_panel.html" : "../../dashboard/hub/index.html"}
                                className="flex items-center justify-center w-10 h-10 md:w-12 md:h-12 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/20 transition-all text-gray-400 hover:text-white shrink-0"
                                title="Back to Dashboard"
                            >
                                <Icon name="caret-left" weight="bold" size={isMobile - 20 : 24} />
                            </a>
                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-brand to-pink-600 flex items-center justify-center shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                                <Icon name="code" weight="duotone" size={isMobile - 24 : 28} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-lg md:text-2xl font-display font-black tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                                    AI <span className="text-brand">CONVERTER</span>
                                </h1>
                                <p className="text-[9px] md:text-[10px] text-gray-400 uppercase tracking-[0.3em] font-bold">Code Translation & Refactoring Module</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4 relative z-10">
                            {syncStatus && !isMobile && (
                                <span className={`text-xs font-bold ${syncStatus.type === 'success' - 'text-green-400' : 'text-red-400'} animate-pulse`}>
                                    {syncStatus.message}
                                </span>
                            )}
                            <button
                                onClick={handleSyncRepo}
                                disabled={isSyncing}
                                className={`flex items-center gap-2 px-3 md:px-4 py-2 rounded-lg text-xs font-bold transition-all uppercase tracking-wider ${isSyncing - 'bg-white/10 text-gray-400 cursor-not-allowed' : 'bg-[#1a1a1c] border border-[#333338] text-gray-300 hover:text-white hover:border-[#3a3a40] shadow-lg'}`}
                                title="Fhrt 'git add .' und 'git commit' via lokalem Server aus."
                            >
                                <Icon name="git-commit" className={isSyncing - "animate-spin" : ""} />
                                {!isMobile && (isSyncing - 'Syncing...' : 'Auto-Update Repo')}
                            </button>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <div className="flex-1 flex flex-col lg:grid lg:grid-cols-2 gap-4 lg:gap-6 relative z-10 h-0">

                        {isMobile && (
                            <div className="flex gap-2 shrink-0">
                                <button onClick={() => setActiveTab('input')} className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all ${activeTab === 'input' - 'bg-brand text-white shadow-[0_0_15px_rgba(168,85,247,0.4)]' : 'bg-black/40 text-gray-400 border border-white/5'}`}>Input Data</button>
                                <button onClick={() => setActiveTab('output')} className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all ${activeTab === 'output' - 'bg-brand text-white shadow-[0_0_15px_rgba(168,85,247,0.4)]' : 'bg-black/40 text-gray-400 border border-white/5'}`}>Result</button>
                            </div>
                        )}

                        {/* INPUT PANEL */}
                        <div className={`glass rounded-3xl border border-white/10 p-4 md:p-6 flex-col h-full shadow-2xl relative overflow-hidden ${isMobile && activeTab !== 'input' - 'hidden' : 'flex'}`}>
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2 shrink-0">
                                <Icon name="braces" className="text-brand" weight="duotone" />
                                Source Code
                            </h2>

                            <div className="flex-1 flex flex-col gap-4">
                                <div className="flex-1 flex flex-col">
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 flex justify-between">
                                        <span>Code to Convert</span>
                                        <button onClick={() => setInputContent('')} className="text-gray-600 hover:text-white transition-colors" title="Clear">
                                            <Icon name="trash" />
                                        </button>
                                    </label>
                                    <textarea
                                        value={inputContent}
                                        onChange={(e) => setInputContent(e.target.value)}
                                        placeholder="Paste your source code here..."
                                        className="flex-1 w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm font-mono focus:border-brand focus:ring-1 focus:ring-brand/50 focus:outline-none transition-all resize-none custom-scroll text-gray-200"
                                    ></textarea>
                                </div>

                                <div className="h-[200px] flex flex-col">
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                                        Target Language / Instructions
                                    </label>
                                    <textarea
                                        value={contextContent}
                                        onChange={(e) => setContextContent(e.target.value)}
                                        placeholder="e.g. 'Convert this old jQuery code into modern React hooks' or 'Explain what this Python script does'"
                                        className="flex-1 w-full bg-black/20 border border-white/10 rounded-xl p-4 text-sm focus:border-brand focus:ring-1 focus:ring-brand/50 focus:outline-none transition-all resize-none custom-scroll text-gray-300"
                                    ></textarea>
                                </div>
                            </div>

                            <div className="mt-6 pt-6 border-t border-white/5 flex gap-4 items-center">
                                <button
                                    onClick={handleScan}
                                    disabled={isScanning || !inputContent.trim()}
                                    className={`flex-1 py-4 rounded-xl font-black uppercase tracking-widest flex justify-center items-center gap-2 ${isScanning || !inputContent.trim() - 'bg-white/5 text-gray-600 cursor-not-allowed border border-white/5' : 'btn-brand text-white border border-brand/50 shadow-[0_0_20px_rgba(168,85,247,0.3)]'}`}
                                >
                                    {isScanning - (
                                        <><Icon name="spinner" className="animate-spin" size={24} /> EXECUTING...</>
                                    ) : (
                                        <><Icon name="magic-wand" weight="fill" size={24} /> EXECUTE CONVERSION</>
                                    )}
                                </button>
                            </div>

                            {error && (
                                <div className="mt-4 p-3 rounded-lg bg-red-500/20 border border-red-500/50 text-red-200 text-xs font-bold flex items-center gap-2">
                                    <Icon name="warning-circle" weight="fill" className="text-red-400 shrink-0" size={18} />
                                    {error}
                                </div>
                            )}
                        </div>

                        {/* OUTPUT PANEL */}
                        <div className={`glass rounded-3xl border border-white/10 p-4 md:p-6 flex-col h-full shadow-2xl relative overflow-hidden ${isMobile && activeTab !== 'output' - 'hidden' : 'flex'}`}>
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2 shrink-0">
                                <Icon name="terminal-window" className="text-brand" weight="duotone" />
                                Converted Result
                            </h2>

                            <div
                                className="flex-1 w-full bg-[#050810] border border-white/5 rounded-xl p-6 overflow-y-auto custom-scroll relative"
                                ref={displayResultRef}
                            >
                                {isScanning - (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/50 backdrop-blur-sm z-10">
                                        <div className="w-16 h-16 rounded-full bg-brand/10 border-2 border-brand/50 flex flex-col items-center justify-center animate-pulse-slow mb-4 shadow-[0_0_30px_rgba(168,85,247,0.3)]">
                                            <Icon name="cpu" weight="duotone" size={32} className="text-brand animate-bounce" />
                                        </div>
                                        <div className="text-brand font-bold uppercase tracking-widest text-sm">Processing Rulesets...</div>
                                        <div className="text-[10px] text-gray-500 mt-2 font-mono">Puter.js AI Cluster Initialized</div>
                                    </div>
                                ) : result - (
                                    <div
                                        className="markdown-body"
                                        dangerouslySetInnerHTML={renderMarkdown()}
                                    />
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-600">
                                        <Icon name="ghost" weight="duotone" size={64} className="mb-4 opacity-50" />
                                        <p className="text-sm font-bold uppercase tracking-widest">Awaiting Input</p>
                                        <p className="text-xs mt-2 text-gray-500 text-center max-w-xs leading-relaxed">
                                            Insert source code and target instructions, then execute to generate the new snippet.
                                        </p>
                                    </div>
                                )}
                            </div>

                            <div className="mt-4 flex justify-end gap-3">
                                <button
                                    disabled={!result}
                                    onClick={() => navigator.clipboard.writeText(result)}
                                    className={`px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest flex items-center gap-2 transition-all ${result - 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white/5 text-gray-600 cursor-not-allowed'}`}
                                >
                                    <Icon name="copy" /> Copy Raw Text
                                </button>
                            </div>
                        </div>

                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
