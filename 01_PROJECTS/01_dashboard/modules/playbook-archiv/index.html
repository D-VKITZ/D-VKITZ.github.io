<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 DkZâ„¢ Playbook Archiv v2 — Strategien & Methoden</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
    <style>
        :root{--bg:#060608;--bg2:#0a0a0e;--card:rgba(18,18,24,.85);--card2:rgba(28,28,36,.7);--border:rgba(255,255,255,.04);--border-h:rgba(255,255,255,.10);--text:#e8e8ec;--muted:#8a8a9a;--accent:#fa1e4e;--accent-soft:rgba(250,30,78,.10);--green:#00ff88;--yellow:#ffb800;--red:#ff3b5c;--blue:#3b82f6;--purple:#a855f7;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--radius:12px;--glass:rgba(14,14,22,.78);--blur:blur(24px);--shadow:0 8px 32px rgba(0,0,0,.4)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:6px}
        .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
        .bg-blob{position:absolute;border-radius:50%;filter:blur(140px);opacity:.05;animation:bf 25s ease-in-out infinite}
        .bg-blob:nth-child(1){width:600px;height:600px;background:var(--blue);top:-15%;left:5%}
        .bg-blob:nth-child(2){width:400px;height:400px;background:var(--accent);bottom:5%;right:8%;animation-delay:-10s}
        .bg-blob:nth-child(3){width:300px;height:300px;background:var(--purple);top:40%;left:50%;animation-delay:-5s}
        @keyframes bf{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-50px) scale(1.15)}}
        .app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
        /* HEADER */
        .header{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--glass);backdrop-filter:var(--blur);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
        .back-btn{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.03);color:var(--muted);font-size:11px;cursor:pointer;text-decoration:none;font-family:var(--font);transition:all .2s}
        .back-btn:hover{border-color:var(--accent);color:var(--accent)}
        .header h1{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .hdr-right{margin-left:auto;display:flex;gap:6px;align-items:center}
        .ver{font-size:9px;color:var(--muted);font-family:var(--mono);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:6px}
        .hdr-btn{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.03);color:var(--muted);font-size:10px;cursor:pointer;font-family:var(--font);transition:all .2s}
        .hdr-btn:hover{border-color:var(--accent);color:var(--text);background:var(--accent-soft)}
        /* LAYOUT */
        .layout{display:flex;flex:1;min-height:0}
        .sidebar{width:230px;border-right:1px solid var(--border);padding:8px 0;overflow-y:auto;background:rgba(6,6,8,.5);flex-shrink:0}
        .sb-section{font-size:8px;color:var(--muted);padding:14px 14px 4px;text-transform:uppercase;letter-spacing:2.5px;font-weight:700}
        .sb-item{padding:7px 14px;font-size:11px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:7px;color:var(--muted)}
        .sb-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
        .sb-item.active{border-left-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600}
        .sb-count{margin-left:auto;font-size:8px;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:8px;font-family:var(--mono)}
        .main{flex:1;display:flex;flex-direction:column;min-width:0}
        /* SEARCH */
        .search-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px}
        .search-bar input{flex:1;padding:9px 14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border .2s}
        .search-bar input:focus{border-color:var(--accent)}
        /* CONTENT */
        .content{flex:1;overflow-y:auto;padding:16px 20px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;transition:all .25s;backdrop-filter:blur(10px)}
        .card:hover{border-color:rgba(250,30,78,.15);transform:translateY(-1px);box-shadow:0 8px 32px rgba(250,30,78,.06)}
        .card h2{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
        .card h3{font-size:11px;font-weight:700;color:var(--accent);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
        .card p,.card li{font-size:11px;color:var(--muted);line-height:1.7}
        .card ul{padding-left:16px;margin:4px 0}
        .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:8px;font-weight:700;font-family:var(--mono);margin:2px;transition:transform .15s}
        .tag:hover{transform:scale(1.05)}
        .tag.pro{background:rgba(0,255,136,.08);color:var(--green)}
        .tag.con{background:rgba(250,30,78,.08);color:var(--accent)}
        .tag.stack{background:rgba(59,130,246,.08);color:var(--blue)}
        .tag.cost{background:rgba(255,184,0,.08);color:var(--yellow)}
        .tag.new{background:rgba(168,85,247,.08);color:var(--purple)}
        .compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin:8px 0}
        .compare-cell{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;transition:all .2s}
        .compare-cell:hover{border-color:var(--border-h)}
        .compare-cell .cl{color:var(--muted);font-size:8px;text-transform:uppercase;letter-spacing:1px}
        .compare-cell .cv{font-size:13px;font-weight:800;color:var(--green);font-family:var(--mono);margin-top:3px}
        .prompt-box{font-family:var(--mono);font-size:10px;padding:12px;background:rgba(6,6,8,.8);border:1px solid var(--border);border-radius:10px;color:var(--green);white-space:pre-wrap;cursor:pointer;margin-top:8px;max-height:200px;overflow-y:auto;transition:all .2s;position:relative}
        .prompt-box:hover{border-color:var(--accent);background:rgba(250,30,78,.03)}
        .prompt-box::after{content:'📋';position:absolute;top:6px;right:8px;opacity:.3;transition:opacity .2s}
        .prompt-box:hover::after{opacity:1}
        /* CHAT */
        .chat-toggle{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;color:#fff;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(250,30,78,.3);transition:transform .2s}
        .chat-toggle:hover{transform:scale(1.1)}
        .chat-panel{position:fixed;bottom:80px;right:20px;width:340px;height:400px;background:var(--card);border:1px solid var(--border);border-radius:16px;z-index:200;display:none;flex-direction:column;backdrop-filter:var(--blur);box-shadow:var(--shadow);overflow:hidden}
        .chat-panel.open{display:flex}
        .chat-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px}
        .chat-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
        .chat-msg{max-width:85%;padding:8px 12px;border-radius:12px;font-size:11px;line-height:1.5;animation:msgIn .2s ease}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .chat-msg.bot{background:var(--card2);border:1px solid var(--border);align-self:flex-start}
        .chat-msg.user{background:linear-gradient(135deg,var(--accent),#c4174a);color:#fff;align-self:flex-end}
        .chat-input{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--border)}
        .chat-input input{flex:1;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:11px;outline:none}
        .btn{padding:6px 14px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent),#c4174a);color:#fff;font-family:var(--font);font-size:10px;font-weight:700;cursor:pointer;transition:transform .15s}
        .btn:hover{transform:scale(1.03)}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 24px;background:var(--green);color:#000;font-size:12px;font-weight:700;border-radius:12px;z-index:300;opacity:0;transition:all .3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        /* STATS BAR */
        .stats-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
        .stat-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:10px}
        .stat-num{font-size:16px;font-weight:900;font-family:var(--mono);background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        /* RESPONSIVE */
        @media(max-width:768px){.sidebar{display:none}.layout{flex-direction:column}}
    </style>
    <script src="../../shared/dkz-updater.js"></script>
</head>
<body data-dkz-module="playbook-archiv" data-dkz-appid="DKZ-MOD-PLA" data-dkz-version="v0.01" data-dkz-title="📖 Playbook Archiv v2 — Strategien & Methoden" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
    <div class="app">
        <div class="header">
            <a href="../../hub/index.html" class="back-btn">← Hub</a>
            <h1 id="hdr-title">📖 DkZ Playbook Archiv v2</h1>
            <div class="hdr-right">
                <button class="hdr-btn" onclick="exportAll('json')" id="btn-export-json" title="Export als JSON">📤 JSON</button>
                <button class="hdr-btn" onclick="exportAll('md')" id="btn-export-md" title="Export als Markdown">📤 MD</button>
                <button class="hdr-btn" onclick="copyAll()" id="btn-copy-all" title="Alle Sektionen kopieren">📋 Copy All</button>
                <span class="ver">v2.0 · MOD-051</span>
            </div>
        </div>
        <div class="layout">
            <div class="sidebar" id="sidebar"></div>
            <div class="main">
                <div class="search-bar" id="search-bar">
                    <input id="search" placeholder="🔍 Suche in allen Strategien, Methoden, Technologien..." oninput="filterContent()">
                </div>
                <div class="content" id="content"></div>
            </div>
        </div>
    </div>
    <button class="chat-toggle" onclick="toggleChat()" title="Playbook Chat">💬</button>
    <div class="chat-panel" id="chatPanel">
        <div class="chat-hdr">🤖 Playbook Assistent</div>
        <div class="chat-msgs" id="chatMsgs">
            <div class="chat-msg bot">📖 Willkommen! Frag mich nach Technologien, Stacks, Kosten, LLM-Strategien, Second Brain oder Use Cases.</div>
        </div>
        <div class="chat-input"><input id="chatIn" placeholder="Frage zum Playbook..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn" onclick="sendChat()">📤</button></div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="playbook-data.js"></script>
    <script>
    // DkZ XSS Protection
    function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}

    let currentSection='overview';

    // Build sidebar from KB
    function buildSidebar(){
        const sb=document.getElementById('sidebar');
        let html='';let lastGroup='';
        Object.entries(KB).forEach(([key,data])=>{
            if(data.group!==lastGroup){html+=`<div class="sb-section">${data.group}</div>`;lastGroup=data.group}
            html+=`<div class="sb-item${key==='overview'?' active':''}" onclick="showSection('${key}',this)" data-key="${key}"><span>${data.icon} ${data.label}</span></div>`;
        });
        sb.innerHTML=html;
    }

    function showSection(key,el){
        currentSection=key;
        document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
        if(el)el.classList.add('active');
        else{const found=document.querySelector(`.sb-item[data-key="${key}"]`);if(found)found.classList.add('active')}
        renderContent();
    }

    function renderContent(){
        const data=KB[currentSection];if(!data)return;
        const q=document.getElementById('search').value.toLowerCase();
        let html=`<h1 style="font-size:16px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px">${data.icon} ${data.title}</h1>${data.content}`;
        if(q){
            const escaped=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            try{const re=new RegExp(`(${escaped})`,'gi');
            html=html.replace(/>(.*?)</g,(m,t)=>`>${t.replace(re,'<mark style="background:var(--accent);color:#fff;padding:0 2px;border-radius:2px">$1</mark>')}<`)}catch(e){}
        }
        document.getElementById('content').innerHTML=html;
    }

    function filterContent(){
        const q=document.getElementById('search').value.toLowerCase();
        if(!q)return renderContent();
        let results='';
        Object.entries(KB).forEach(([key,data])=>{
            const text=(data.title+' '+data.content).toLowerCase();
            if(text.includes(q)){results+=`<div style="margin-bottom:6px"><button class="btn" onclick="showSection('${key}')" style="font-size:10px;padding:5px 10px">${data.icon} ${data.title}</button></div>`}
        });
        document.getElementById('content').innerHTML=`<h1 style="font-size:16px;font-weight:900;margin-bottom:14px">🔍 Suche: "${esc(document.getElementById('search').value)}"</h1>${results||'<p style="color:var(--muted)">Keine Treffer.</p>'}`;
    }

    // Chat
    function toggleChat(){document.getElementById('chatPanel').classList.toggle('open')}
    function sendChat(){
        const input=document.getElementById('chatIn');const msg=input.value.trim();if(!msg)return;input.value='';
        addMsg(msg,'user');const lower=msg.toLowerCase();
        let resp='🤔 Versuch: supabase, rust, go, java, node, python, react, vanilla, kosten, stack, llm, prompt, design, second brain, budget, missing, agents';
        for(const[k,v]of Object.entries(CHAT_KB)){if(lower.includes(k)){resp=v;break}}
        setTimeout(()=>addMsg(resp,'bot'),300);
    }
    function addMsg(t,type){const el=document.getElementById('chatMsgs');const div=document.createElement('div');div.className=`chat-msg ${type}`;div.textContent=t;el.appendChild(div);el.scrollTop=el.scrollHeight}

    function cp(el){navigator.clipboard.writeText(el.textContent);showToast('📋 Kopiert!')}
    function copyAll(){navigator.clipboard.writeText(JSON.stringify(KB,null,2));showToast('📋 Alles kopiert!')}
    function exportAll(fmt){
        let out='';
        if(fmt==='json')out=JSON.stringify(KB,null,2);
        else Object.values(KB).forEach(s=>{out+=`# ${s.title}\n${s.content.replace(/<[^>]*>/g,'')}\n\n`});
        const blob=new Blob([out],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download=`dkz-playbook-v2.${fmt}`;a.click();showToast(`📤 Playbook als .${fmt} exportiert!`);
    }
    function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

    buildSidebar();renderContent();

    // ═══ DkZ Guide Integration ═══
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof DkzGuide === 'undefined') return;

        // ℹ Info Icons auf wichtige Elemente
        DkzGuide.addInfo('hdr-title', {
            title: 'Playbook Archiv v2',
            text: 'Wissens-Wiki mit 18 Sektionen zu KI-Strategien, Stacks, Prompt-Engineering, Kosten und Use Cases. Durchsuchbar, exportierbar, mit Chat-Assistent.',
            steps: ['Sidebar-Sektion wählen', 'Suche nutzen (Ctrl+F)', 'Chat-Bot fragen (💬)', 'Export: JSON / MD / Copy All'],
            links: [
                { icon: '🧠', label: 'Second Brain', href: '../second-brain/index.html', hint: 'Wissen verknüpfen' },
                { icon: '💰', label: 'Cost Calculator', href: '../cost-calculator/index.html', hint: 'LLM-Kosten berechnen' }
            ]
        });

        DkzGuide.addInfo('search-bar', {
            title: 'Volltextsuche',
            text: 'Sucht live in allen 18 Sektionen — Titel + Inhalt. Ergebnisse werden sofort gefiltert und Treffer markiert.',
            steps: ['Suchbegriff eingeben', 'Ergebnis-Button klicken', 'Highlight scrollt automatisch']
        });

        DkzGuide.addInfo('btn-export-json', {
            title: 'JSON Export',
            text: 'Exportiert das komplette Playbook als strukturierte JSON-Datei mit allen 18 Sektionen, Tags und Inhalten.'
        });

        DkzGuide.addInfo('btn-copy-all', {
            title: 'Alles kopieren',
            text: 'Kopiert alle Playbook-Daten in die Zwischenablage als JSON. Ideal zum Weiterverarbeiten in anderen Tools.'
        });

        // 📖 Interactive Tour
        DkzGuide.registerTour('playbook-tour', [
            { target: '#hdr-title', title: '📖 Playbook Archiv v2', text: 'Willkommen! Das Playbook enthält 18 Wissens-Sektionen in 4 Gruppen: Grundlagen, Methoden, Infrastruktur und Praxis.' },
            { target: '#sidebar', title: '📂 Sidebar Navigation', text: 'Links findest du alle 18 Sektionen sortiert nach Gruppen. Klicke auf eine Sektion um den Inhalt zu sehen.' },
            { target: '#search', title: '🔍 Volltextsuche', text: 'Suche live in allen Sektionen. Treffer werden gelb markiert und du kannst direkt zur Sektion springen.' },
            { target: '.chat-toggle', title: '💬 Playbook Assistent', text: 'Der Chat-Bot kennt alle 25 Themen und beantwortet Fragen zu Technologien, Kosten, Stacks und Best Practices.' },
            { target: '.hdr-right', title: '📤 Export Werkzeuge', text: 'Exportiere als JSON, Markdown oder kopiere alles in die Zwischenablage. Ideal für Dokumentation und Sharing.' }
        ]);

        // ❓ Guide FAB Button (unten links)
        DkzGuide.injectGuideFAB({ defaultTour: 'playbook-tour' });

        // Visual Hints für Erstbesucher
        if (!DkzGuide.isTourCompleted('playbook-tour')) {
            DkzGuide.highlight('sidebar', 'glow');
        }
    });
    </script>
    <!-- DkZ Shared Scripts -->
    <script src="../../shared/dkz-auth.js"></script>
    <script src="../../shared/dkz-james.js"></script>
    <script src="../../shared/dkz-memory.js"></script>

    <script src="../../shared/dkz-iceberg.js"></script>
    <script src="../../shared/dkz-prompt-score.js"></script>
    <script src="../../shared/dkz-builder-bridge.js"></script>
    <script src="../../shared/dkz-debug.js"></script>
    <script src="../../shared/dkz-analyser.js"></script>
    <script src="../../shared/dkz-guide.js"></script>
    <script src="../../shared/dkz-copilot.js"></script>
    <script src="../../shared/dkz-shortcuts.js"></script>
    <script src="../../shared/dkz-export.js"></script>
    <script src="../../shared/dkz-crosslinks.js"></script>
    <script src="../../shared/dkz-a11y.js"></script>
    <script src="../../shared/dkz-test.js"></script>
    <script src="../../shared/dkz-puter.js"></script>
    <script>if("serviceWorker" in navigator)navigator.serviceWorker.register("../../shared/sw.js").catch(()=>{});</script>    <script src="../../shared/dkz-headbar.js"></script>
