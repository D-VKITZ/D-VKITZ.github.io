<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 MaxLaunchpad™ QR — DkZâ„¢™</title>
    <link rel="stylesheet" href="../../shared/dkz-theme.css">
    <link rel="manifest" href="../../shared/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- QR Code Library — lokal statt externe API -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #060608;
            --card: rgba(18, 18, 24, 0.85);
            --card2: #16161c;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(250, 30, 78, 0.3);
            --text: #e8e8ec;
            --muted: #8a8a9a;
            --green: #00ff88;
            --blue: #3b82f6;
            --yellow: #FFB800;
            --red: #ff3b5c;
            --accent: #fa1e4e;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --glass: rgba(14, 14, 22, .72);
            --blur: blur(24px);
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(250, 30, 78, 0.2); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(250, 30, 78, 0.4); }

        /* ═══ MESH BACKGROUND ═══ */
        .bg-mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-blob {
            position: absolute; border-radius: 50%;
            filter: blur(140px); opacity: .05;
            animation: meshFloat 25s ease-in-out infinite;
        }
        .bg-blob:nth-child(1) { width: 600px; height: 600px; background: var(--accent); top: -15%; left: 5%; }
        .bg-blob:nth-child(2) { width: 400px; height: 400px; background: var(--green); bottom: 5%; right: 10%; animation-delay: -10s; }
        .bg-blob:nth-child(3) { width: 300px; height: 300px; background: var(--blue); top: 40%; right: 30%; animation-delay: -18s; }

        @keyframes meshFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ═══ SCANLINE OVERLAY ═══ */
        .scanline {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
        }

        /* ═══ APP LAYOUT ═══ */
        .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

        /* ═══ HEADER ═══ */
        .header {
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(6, 6, 8, 0.85);
            backdrop-filter: var(--blur);
            display: flex; align-items: center; gap: 14px;
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            padding: 7px 14px; border: 1px solid var(--border);
            border-radius: 10px; background: rgba(255, 255, 255, .03);
            color: var(--muted); font-size: 11px; cursor: pointer;
            text-decoration: none; font-family: var(--font);
            transition: all .2s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--text); }

        .header-logo {
            display: flex; align-items: center; gap: 10px;
        }
        .header-logo img {
            width: 36px; height: 36px; border-radius: 8px;
            box-shadow: 0 0 20px rgba(250, 30, 78, 0.3);
        }
        .header h1 {
            font-size: 20px; font-weight: 900; letter-spacing: -0.5px;
        }
        .header h1 .max { 
            background: linear-gradient(135deg, var(--accent), #ff6b9d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header h1 .launch { color: var(--text); -webkit-text-fill-color: var(--text); }
        .header h1 .pad { 
            background: linear-gradient(135deg, var(--green), #00cc6a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header h1 .qr-tag {
            font-size: 9px; font-weight: 700;
            background: var(--accent); color: #fff;
            padding: 2px 8px; border-radius: 20px;
            vertical-align: middle; margin-left: 8px;
            -webkit-text-fill-color: #fff;
        }

        .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .ver { font-size: 9px; color: var(--muted); font-family: var(--mono); }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 8px var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ═══ CONTENT ═══ */
        .content { padding: 24px 28px; flex: 1; display: flex; gap: 24px; }

        .left { flex: 1; display: flex; flex-direction: column; gap: 16px; }
        .right {
            width: 360px; display: flex; flex-direction: column;
            gap: 16px; align-items: center;
        }

        /* ═══ GLASSMORPHISM CARDS ═══ */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            width: 100%;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            transition: border-color .3s, box-shadow .3s;
        }
        .card:hover { border-color: var(--border-hover); box-shadow: 0 8px 40px rgba(250, 30, 78, 0.08); }

        .card h3 {
            font-size: 12px; font-weight: 800; margin-bottom: 14px;
            text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
            display: flex; align-items: center; gap: 8px;
        }
        .card h3::before {
            content: ''; width: 3px; height: 14px;
            background: var(--accent); border-radius: 2px;
        }

        /* ═══ FIELDS ═══ */
        .field { margin-bottom: 14px; }
        .field label {
            font-size: 10px; color: var(--muted); text-transform: uppercase;
            letter-spacing: 1.2px; display: block; margin-bottom: 6px; font-weight: 600;
        }
        .field input, .field textarea, .field select {
            width: 100%; padding: 12px 14px;
            background: var(--card2); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-family: var(--font); font-size: 13px; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(250, 30, 78, 0.1);
        }
        .field textarea { min-height: 80px; resize: vertical; }

        /* ═══ PRESETS ═══ */
        .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
        .preset {
            padding: 8px 16px; border: 1px solid var(--border);
            border-radius: 24px; background: transparent;
            color: var(--muted); font-size: 11px; cursor: pointer;
            font-family: var(--font); font-weight: 600;
            transition: all .25s ease;
        }
        .preset:hover { border-color: var(--accent); color: var(--text); transform: translateY(-1px); }
        .preset.active {
            background: linear-gradient(135deg, var(--accent), #ff6b9d);
            color: #fff; border-color: transparent;
            box-shadow: 0 4px 16px rgba(250, 30, 78, 0.3);
        }

        /* ═══ QR PREVIEW ═══ */
        .qr-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            display: flex; align-items: center; justify-content: center;
            min-height: 300px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(250, 30, 78, 0.08);
        }
        .qr-box canvas, .qr-box img { max-width: 100%; }
        .qr-box .qr-placeholder {
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; color: #888;
        }
        .qr-box .qr-placeholder .icon { font-size: 48px; opacity: 0.3; }
        .qr-box .qr-placeholder .txt { font-size: 12px; }

        /* ═══ LOGO IN QR ═══ */
        .logo-upload-area {
            border: 2px dashed var(--border); border-radius: 12px;
            padding: 16px; text-align: center; cursor: pointer;
            transition: border-color .3s;
        }
        .logo-upload-area:hover { border-color: var(--accent); }
        .logo-upload-area .icon { font-size: 24px; }
        .logo-upload-area .txt { font-size: 10px; color: var(--muted); margin-top: 4px; }
        .logo-preview { max-width: 60px; border-radius: 8px; margin-top: 8px; }

        /* ═══ BUTTONS ═══ */
        .btn {
            padding: 12px 20px; border: none; border-radius: 12px;
            font-family: var(--font); font-size: 13px; font-weight: 700;
            cursor: pointer; width: 100%;
            transition: all .25s ease; position: relative; overflow: hidden;
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--accent), #d4163f);
            color: #fff;
            box-shadow: 0 4px 20px rgba(250, 30, 78, 0.3);
        }
        .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(250, 30, 78, 0.4); }
        .btn.secondary {
            background: transparent; border: 1px solid var(--border); color: var(--text);
        }
        .btn.secondary:hover { border-color: var(--accent); }
        .btn-row { display: flex; gap: 8px; width: 100%; }

        /* ═══ COLOR PICKER ═══ */
        .color-row { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
        .color-item { display: flex; align-items: center; gap: 8px; }
        .color-item label { font-size: 10px; color: var(--muted); font-weight: 600; }
        .color-item input[type=color] {
            width: 36px; height: 30px; border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; background: transparent;
        }

        /* ═══ SIZE SLIDER ═══ */
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: var(--card2); border-radius: 4px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px rgba(250, 30, 78, 0.4);
        }
        .size-value {
            font-size: 11px; color: var(--accent); font-family: var(--mono);
            font-weight: 700; margin-left: 8px;
        }

        /* ═══ STATS BAR ═══ */
        .stats-bar {
            display: flex; gap: 12px; width: 100%;
        }
        .stat {
            flex: 1; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px; text-align: center;
        }
        .stat .val { font-size: 16px; font-weight: 800; color: var(--accent); }
        .stat .lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* ═══ TOAST ═══ */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--green), #00cc6a);
            color: #000; font-size: 12px; font-weight: 700;
            border-radius: 12px; z-index: 300;
            opacity: 0; transform: translateY(20px);
            transition: all .3s ease; pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.2);
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 768px) {
            .content { flex-direction: column; padding: 16px; }
            .right { width: 100%; }
            .btn-row { flex-direction: column; }
        }
    </style>
    <script src="../../shared/dkz-updater.js"></script>
</head>

<body data-dkz-module="qr-generator" data-dkz-appid="DKZ-MOD-QR-" data-dkz-version="v0.01" data-dkz-title="🚀 MaxLaunchpad™ QR — ™" data-dkz-icon="📦" data-dkz-separable="true">
    <div class="bg-mesh">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="scanline"></div>

    <div class="app">
        <div class="header">
            <a href="../../hub/index.html" class="back-btn">← Hub</a>
            <div class="header-logo">
                <img src="maxlaunchpad-logo.png" alt="MaxLaunchpad™" onerror="this.style.display='none'">
            </div>
            <h1>
                <span class="max">MAX</span><span class="launch">LAUNCH</span><span class="pad">PAD</span>
                <span class="qr-tag">QR</span>
            </h1>
            <div class="hdr-right">
                <div class="status-dot"></div>
                <span class="ver">v2.00</span>
            </div>
        </div>

        <div class="content">
            <div class="left">
                <!-- Inhalt Card -->
                <div class="card">
                    <h3>Inhalt</h3>
                    <div class="presets">
                        <button class="preset active" onclick="setMode('text',this)">📝 Text</button>
                        <button class="preset" onclick="setMode('url',this)">🔗 URL</button>
                        <button class="preset" onclick="setMode('wifi',this)">📶 WiFi</button>
                        <button class="preset" onclick="setMode('email',this)">📧 E-Mail</button>
                        <button class="preset" onclick="setMode('tel',this)">📞 Telefon</button>
                        <button class="preset" onclick="setMode('vcard',this)">👤 vCard</button>
                    </div>
                    <div id="fields"></div>
                </div>

                <!-- Einstellungen Card -->
                <div class="card">
                    <h3>Einstellungen</h3>
                    <div class="field">
                        <label>Größe <span class="size-value" id="sizeVal">250px</span></label>
                        <input type="range" id="qrSize" min="120" max="500" value="250" oninput="updateSize()">
                    </div>
                    <div class="field">
                        <label>Fehlerkorrektur</label>
                        <select id="ecLevel" onchange="genQR()">
                            <option value="L">Low (7%) — Schnell</option>
                            <option value="M" selected>Medium (15%) — Standard</option>
                            <option value="Q">Quartile (25%) — Mit Logo</option>
                            <option value="H">High (30%) — Maximum</option>
                        </select>
                    </div>
                    <div class="color-row">
                        <div class="color-item">
                            <label>Vordergrund:</label>
                            <input type="color" id="fgColor" value="#000000" onchange="genQR()">
                        </div>
                        <div class="color-item">
                            <label>Hintergrund:</label>
                            <input type="color" id="bgColor" value="#ffffff" onchange="genQR()">
                        </div>
                    </div>
                </div>

                <!-- Logo Card -->
                <div class="card">
                    <h3>Logo Overlay</h3>
                    <div class="logo-upload-area" onclick="document.getElementById('logoInput').click()">
                        <div class="icon">🖼️</div>
                        <div class="txt">Klicken um Logo hochzuladen (PNG/JPG)</div>
                        <img id="logoPreview" class="logo-preview" style="display:none">
                    </div>
                    <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="handleLogo(this)">
                    <button class="btn secondary" style="margin-top:10px" onclick="clearLogo()">✕ Logo entfernen</button>
                </div>
            </div>

            <div class="right">
                <!-- QR Preview -->
                <div class="card">
                    <div class="qr-box" id="qrBox">
                        <div class="qr-placeholder">
                            <div class="icon">📱</div>
                            <div class="txt">QR Code wird generiert...</div>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-bar">
                    <div class="stat">
                        <div class="val" id="statChars">0</div>
                        <div class="lbl">Zeichen</div>
                    </div>
                    <div class="stat">
                        <div class="val" id="statSize">250</div>
                        <div class="lbl">Pixel</div>
                    </div>
                    <div class="stat">
                        <div class="val" id="statEC">M</div>
                        <div class="lbl">EC-Level</div>
                    </div>
                </div>

                <!-- Download Buttons -->
                <div class="btn-row">
                    <button class="btn primary" onclick="downloadQR('png')">📥 PNG</button>
                    <button class="btn primary" onclick="downloadQR('svg')">📥 SVG</button>
                </div>
                <button class="btn secondary" onclick="copyQR()">📋 In Zwischenablage</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ═══ DkZ™ XSS Protection ═══
    function esc(s) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }

    let mode = 'text';
    let logoImage = null;
    let qrGenCount = 0;

    // ═══ MODE FIELDS ═══
    const FIELDS = {
        text: '<div class="field"><label>Text</label><textarea id="qrData" oninput="genQR()" placeholder="Text eingeben...">MaxLaunchpad™ — devkitz.com</textarea></div>',
        url: '<div class="field"><label>URL</label><input id="qrData" oninput="genQR()" value="https://devkitz.com" placeholder="https://..."></div>',
        wifi: '<div class="field"><label>SSID (Netzwerkname)</label><input id="wifiSSID" oninput="genQR()" placeholder="MeinWiFi"></div><div class="field"><label>Passwort</label><input id="wifiPW" type="password" oninput="genQR()" placeholder="Passwort"></div><div class="field"><label>Verschlüsselung</label><select id="wifiEnc" onchange="genQR()"><option>WPA</option><option>WEP</option><option value="nopass">Offen</option></select></div>',
        email: '<div class="field"><label>E-Mail-Adresse</label><input id="emailAddr" oninput="genQR()" placeholder="name@example.com"></div><div class="field"><label>Betreff</label><input id="emailSubj" oninput="genQR()" placeholder="Betreff"></div><div class="field"><label>Nachricht</label><textarea id="emailBody" oninput="genQR()" placeholder="Nachricht..."></textarea></div>',
        tel: '<div class="field"><label>Telefonnummer</label><input id="telNum" oninput="genQR()" placeholder="+49 123 456789" value="+49"></div>',
        vcard: '<div class="field"><label>Vorname Nachname</label><input id="vcName" oninput="genQR()" value="Max Müller"></div><div class="field"><label>Telefon</label><input id="vcTel" oninput="genQR()" placeholder="+49..."></div><div class="field"><label>E-Mail</label><input id="vcEmail" oninput="genQR()" placeholder="email@..."></div><div class="field"><label>Firma</label><input id="vcOrg" oninput="genQR()" placeholder="Firma"></div><div class="field"><label>Website</label><input id="vcUrl" oninput="genQR()" placeholder="https://..."></div>'
    };

    function setMode(m, btn) {
        mode = m;
        document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('fields').innerHTML = FIELDS[m];
        genQR();
    }

    // ═══ SAFE VALUE GETTER ═══
    function gv(id) {
        const el = document.getElementById(id);
        return el ? el.value : '';
    }

    // ═══ DATA BUILDER ═══
    function getData() {
        switch (mode) {
            case 'text':
            case 'url':
                return gv('qrData');
            case 'wifi':
                return `WIFI:T:${gv('wifiEnc')};S:${gv('wifiSSID')};P:${gv('wifiPW')};;`;
            case 'email': {
                let mailto = `mailto:${gv('emailAddr')}`;
                const params = [];
                if (gv('emailSubj')) params.push(`subject=${encodeURIComponent(gv('emailSubj'))}`);
                if (gv('emailBody')) params.push(`body=${encodeURIComponent(gv('emailBody'))}`);
                if (params.length) mailto += '?' + params.join('&');
                return mailto;
            }
            case 'tel':
                return `tel:${gv('telNum')}`;
            case 'vcard': {
                const parts = gv('vcName').split(' ');
                const lastName = parts.length > 1 ? parts.pop() : '';
                const firstName = parts.join(' ');
                return [
                    'BEGIN:VCARD', 'VERSION:3.0',
                    `N:${lastName};${firstName};;;`,
                    `FN:${gv('vcName')}`,
                    gv('vcTel') ? `TEL:${gv('vcTel')}` : '',
                    gv('vcEmail') ? `EMAIL:${gv('vcEmail')}` : '',
                    gv('vcOrg') ? `ORG:${gv('vcOrg')}` : '',
                    gv('vcUrl') ? `URL:${gv('vcUrl')}` : '',
                    'END:VCARD'
                ].filter(Boolean).join('\n');
            }
            default:
                return '';
        }
    }

    // ═══ QR CODE GENERATOR (Lokal!) ═══
    function genQR() {
        const data = getData();
        if (!data || !data.trim()) {
            document.getElementById('qrBox').innerHTML = '<div class="qr-placeholder"><div class="icon">📱</div><div class="txt">Text eingeben...</div></div>';
            return;
        }

        const size = parseInt(document.getElementById('qrSize').value);
        const ecLevel = document.getElementById('ecLevel').value;
        const fg = document.getElementById('fgColor').value;
        const bg = document.getElementById('bgColor').value;

        try {
            // EC Level mapping: L=1, M=0, Q=3, H=2
            const ecMap = { L: 1, M: 0, Q: 3, H: 2 };
            const qr = qrcode(0, ecLevel);
            qr.addData(data);
            qr.make();

            const moduleCount = qr.getModuleCount();
            const cellSize = Math.floor(size / moduleCount);
            const totalSize = cellSize * moduleCount;

            // Canvas rendern
            const canvas = document.createElement('canvas');
            canvas.width = totalSize;
            canvas.height = totalSize;
            const ctx = canvas.getContext('2d');

            // Hintergrund
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, totalSize, totalSize);

            // QR Module zeichnen mit abgerundeten Ecken
            ctx.fillStyle = fg;
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (qr.isDark(row, col)) {
                        const x = col * cellSize;
                        const y = row * cellSize;
                        const r = cellSize * 0.15; // Leichte Abrundung
                        ctx.beginPath();
                        ctx.roundRect(x, y, cellSize - 0.5, cellSize - 0.5, r);
                        ctx.fill();
                    }
                }
            }

            // Logo Overlay
            if (logoImage) {
                const logoSize = totalSize * 0.2;
                const logoX = (totalSize - logoSize) / 2;
                const logoY = (totalSize - logoSize) / 2;

                // Weißer Hintergrund fürs Logo
                ctx.fillStyle = bg;
                const padding = logoSize * 0.15;
                ctx.beginPath();
                ctx.roundRect(logoX - padding, logoY - padding, logoSize + padding * 2, logoSize + padding * 2, 8);
                ctx.fill();

                ctx.drawImage(logoImage, logoX, logoY, logoSize, logoSize);
            }

            // In QR-Box einfügen
            const qrBox = document.getElementById('qrBox');
            qrBox.innerHTML = '';
            canvas.style.maxWidth = '100%';
            canvas.style.borderRadius = '8px';
            canvas.id = 'qrCanvas';
            qrBox.appendChild(canvas);

            // Stats aktualisieren
            qrGenCount++;
            document.getElementById('statChars').textContent = data.length;
            document.getElementById('statSize').textContent = totalSize;
            document.getElementById('statEC').textContent = ecLevel;

        } catch (e) {
            document.getElementById('qrBox').innerHTML = `<div class="qr-placeholder"><div class="icon">⚠️</div><div class="txt">Fehler: ${esc(e.message)}</div></div>`;
        }
    }

    // ═══ SIZE UPDATE ═══
    function updateSize() {
        const size = document.getElementById('qrSize').value;
        document.getElementById('sizeVal').textContent = size + 'px';
        genQR();
    }

    // ═══ LOGO HANDLING ═══
    function handleLogo(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                logoImage = img;
                const preview = document.getElementById('logoPreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                // Automatisch auf High EC setzen (Logo braucht das)
                document.getElementById('ecLevel').value = 'H';
                genQR();
                showToast('🖼️ Logo geladen — EC auf High gesetzt');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function clearLogo() {
        logoImage = null;
        document.getElementById('logoPreview').style.display = 'none';
        document.getElementById('logoInput').value = '';
        genQR();
        showToast('Logo entfernt');
    }

    // ═══ DOWNLOAD ═══
    function downloadQR(format) {
        const canvas = document.getElementById('qrCanvas');
        if (!canvas) { showToast('⚠️ Erst QR Code generieren!'); return; }

        if (format === 'png') {
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `maxlaunchpad-qr-${Date.now()}.png`;
            a.click();
            showToast('📥 PNG heruntergeladen!');
        } else if (format === 'svg') {
            // SVG Export
            const data = getData();
            const ecLevel = document.getElementById('ecLevel').value;
            const fg = document.getElementById('fgColor').value;
            const bg = document.getElementById('bgColor').value;
            const size = parseInt(document.getElementById('qrSize').value);

            const qr = qrcode(0, ecLevel);
            qr.addData(data);
            qr.make();

            const moduleCount = qr.getModuleCount();
            const cellSize = Math.floor(size / moduleCount);
            const totalSize = cellSize * moduleCount;

            let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}">`;
            svg += `<rect width="${totalSize}" height="${totalSize}" fill="${bg}"/>`;

            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (qr.isDark(row, col)) {
                        svg += `<rect x="${col * cellSize}" y="${row * cellSize}" width="${cellSize}" height="${cellSize}" fill="${fg}" rx="1"/>`;
                    }
                }
            }
            svg += '</svg>';

            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `maxlaunchpad-qr-${Date.now()}.svg`;
            a.click();
            showToast('📥 SVG heruntergeladen!');
        }
    }

    // ═══ COPY TO CLIPBOARD ═══
    async function copyQR() {
        const canvas = document.getElementById('qrCanvas');
        if (!canvas) { showToast('⚠️ Erst QR Code generieren!'); return; }

        try {
            canvas.toBlob(async (blob) => {
                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]);
                showToast('📋 QR Code in Zwischenablage kopiert!');
            });
        } catch (e) {
            showToast('⚠️ Kopieren fehlgeschlagen');
        }
    }

    // ═══ TOAST ═══
    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ═══ INIT ═══
    document.getElementById('fields').innerHTML = FIELDS.text;
    genQR();
    </script>
