<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 DkZ Knowledge Hub — Wiki · Kanban · Notizen</title>
    <meta name="description" content="DkZ Knowledge Hub — Notion-Alternative: Wiki, Kanban-Board, Schnellnotizen. EU-souverän, self-hosted.">
    <meta name="dkz-module" content="knowledge-hub">
    <meta name="dkz-version" content="v2.0.0">
    <link rel="stylesheet" href="../shared/dkz-theme.css">
    <link rel="manifest" href="../shared/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0e0e10;--bg2:#121215;--card:#16161a;--card2:#1e1e24;--glass:rgba(15,15,24,.65);--blur:blur(16px);--border:#1a1a2a;--border2:#2a2a3a;--text:#e8e8f0;--muted:#5e5e78;--accent:#fa1e4e;--purple:#a855f7;--green:#00ff88;--yellow:#ffb800;--blue:#55acee;--red:#ff4466;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--radius:16px}
        html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text)}
        body{display:flex;flex-direction:column;background:radial-gradient(ellipse at 20% 30%,rgba(168,85,247,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(250,30,78,.03) 0%,transparent 50%),var(--bg)}

        /* HEADER */
        .header{padding:14px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
        .header h1{font-size:17px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .header .sub{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px}
        .header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
        .btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
        .btn:hover{color:var(--text);border-color:var(--accent)}
        .btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

        /* TABS */
        .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 24px}
        .tab{padding:12px 20px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
        .tab:hover{color:var(--text)}
        .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
        .tab .badge{font-size:9px;font-family:var(--mono);background:rgba(250,30,78,.1);color:var(--accent);padding:2px 6px;border-radius:4px}

        /* MAIN LAYOUT */
        .main{flex:1;overflow:auto;display:flex}
        .sidebar{width:240px;border-right:1px solid var(--border);padding:16px;flex-shrink:0;overflow-y:auto}
        .sidebar-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
        .sidebar-title:first-child{margin-top:0}
        .sidebar-item{padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;color:var(--text)}
        .sidebar-item:hover{background:var(--card)}
        .sidebar-item.active{background:rgba(250,30,78,.08);color:var(--accent)}
        .sidebar-item .icon{font-size:14px;width:20px;text-align:center}
        .sidebar-item .count{margin-left:auto;font-size:9px;font-family:var(--mono);color:var(--muted)}
        .content{flex:1;padding:24px;overflow-y:auto}
        .view{display:none}
        .view.active{display:block}

        /* WIKI */
        .wiki-search{width:100%;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;margin-bottom:20px;transition:border-color .2s}
        .wiki-search:focus{border-color:var(--accent)}
        .wiki-search::placeholder{color:var(--muted)}
        .wiki-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
        .wiki-card{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
        .wiki-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .3s}
        .wiki-card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 6px 24px rgba(0,0,0,.3)}
        .wiki-card:hover::before{opacity:1}
        .wiki-card .wc-icon{font-size:28px;margin-bottom:10px}
        .wiki-card .wc-title{font-size:14px;font-weight:700;margin-bottom:4px}
        .wiki-card .wc-desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .wiki-card .wc-meta{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--muted)}
        .wiki-card .wc-tag{font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600}

        /* KANBAN */
        .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:20px;min-height:400px}
        .kanban-col{min-width:260px;max-width:300px;flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column}
        .kanban-col-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
        .kanban-col-head .dot{width:8px;height:8px;border-radius:50%}
        .kanban-col-head .count{margin-left:auto;font-size:9px;font-family:var(--mono);color:var(--muted);background:rgba(255,255,255,.05);padding:2px 6px;border-radius:4px}
        .kanban-cards{flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
        .kanban-card{padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:grab;transition:all .2s;font-size:12px}
        .kanban-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(0,0,0,.2)}
        .kanban-card .kc-title{font-weight:600;margin-bottom:4px}
        .kanban-card .kc-desc{color:var(--muted);font-size:10px;line-height:1.5}
        .kanban-card .kc-footer{display:flex;justify-content:space-between;margin-top:8px;font-size:9px;font-family:var(--mono);color:var(--muted)}
        .kc-priority{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700}

        /* NOTES */
        .notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
        .note-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;min-height:120px}
        .note-card:hover{border-color:var(--accent);transform:translateY(-2px)}
        .note-card .nc-title{font-size:13px;font-weight:700;margin-bottom:6px}
        .note-card .nc-text{font-size:11px;color:var(--muted);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
        .note-card .nc-date{font-size:9px;font-family:var(--mono);color:var(--muted);margin-top:10px}
        .note-new{border-style:dashed;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);font-size:24px}
        .note-new:hover{color:var(--accent);border-color:var(--accent)}
        .note-new span{font-size:10px;font-weight:600}

        /* INTERACTIVE NOTES */
        .notes-toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
        .notes-search{flex:1;min-width:200px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border-color .2s}
        .notes-search:focus{border-color:var(--accent)}
        .folder-tabs{display:flex;gap:4px;margin-bottom:14px}
        .folder-tab{padding:6px 14px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:5px}
        .folder-tab:hover{border-color:var(--accent);color:var(--text)}
        .folder-tab.active{background:rgba(250,30,78,.1);border-color:rgba(250,30,78,.3);color:var(--accent)}
        .folder-tab .ft-count{font-family:var(--mono);font-size:8px;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:3px}
        .note-prefix{font-size:8px;font-weight:900;padding:2px 6px;border-radius:3px;display:inline-block}
        .pf-P{background:rgba(99,102,241,.2);color:#6366f1}
        .pf-I{background:rgba(0,255,136,.15);color:var(--green)}
        .pf-R{background:rgba(255,184,0,.15);color:var(--yellow)}
        .note-card .nc-folder{font-size:8px;font-family:var(--mono);color:var(--muted);margin-top:4px}
        .note-card .nc-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
        .note-card .nc-tags span{font-size:7px;padding:1px 5px;border-radius:3px;background:rgba(168,85,247,.1);color:var(--purple);font-weight:600}
        .notes-stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
        .ns-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:10px}
        .ns-val{font-size:16px;font-weight:900;font-family:var(--mono)}

        /* NOTE MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:90%;max-width:640px;max-height:85vh;overflow-y:auto;padding:24px;position:relative}
        .modal-box.wide{max-width:700px}
        .modal-box .nm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .nm-title-input{width:100%;background:transparent;border:none;color:var(--text);font-size:18px;font-weight:800;font-family:var(--font);outline:none;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
        .nm-body{width:100%;min-height:200px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--font);line-height:1.8;outline:none;resize:vertical;padding:12px}
        .nm-meta{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
        .nm-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--font);font-size:10px;cursor:pointer;transition:all .2s}
        .nm-btn:hover{color:var(--text);border-color:var(--accent)}
        .nm-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
        .nm-btn.danger{border-color:var(--red);color:var(--red)}
        .nm-btn.danger:hover{background:var(--red);color:#fff}
        .nm-close{width:28px;height:28px;border:none;background:rgba(255,255,255,.05);border-radius:6px;color:var(--muted);cursor:pointer;font-size:14px;transition:all .2s}
        .nm-close:hover{background:rgba(250,30,78,.15);color:var(--accent)}

        /* TOAST */
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:10px 24px;border-radius:10px;font-size:12px;font-weight:600;z-index:2000;transition:transform .3s;pointer-events:none}
        .toast.show{transform:translateX(-50%) translateY(0)}

        @media(max-width:768px){.sidebar{display:none}.kanban{flex-direction:column}.kanban-col{min-width:100%;max-width:100%}}
    </style>
</head>

<body>
    <div class="bg-mesh"><div class="bg-blob"></div><div class="bg-blob"></div></div>

    <div class="header">
        <div>
            <h1>📝 Knowledge Hub</h1>
            <div class="sub">WIKI · KANBAN · NOTIZEN</div>
        </div>
        <div class="header-right">
            <a href="../nexuz/index.html" class="btn">⚡ NEXUZ²</a>
            <a href="../hub/index.html" class="btn">← Hub</a>
            <button class="btn" onclick="handleNewBtn()">+ Neu</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" data-view="wiki">📚 Wiki <span class="badge" id="wikiCount">0</span></div>
        <div class="tab" data-view="kanban">📋 Kanban <span class="badge" id="kanbanCount">0</span></div>
        <div class="tab" data-view="notes">🗒️ Notizen <span class="badge" id="notesCount">0</span></div>
    </div>

    <div class="main">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebarEl">
            <div class="sidebar-title">📂 Spaces</div>
            <div class="sidebar-item active"><span class="icon">🏠</span> Alles <span class="count" id="allCount">0</span></div>
            <div class="sidebar-item"><span class="icon">⚡</span> NEXUZ² <span class="count">8</span></div>
            <div class="sidebar-item"><span class="icon">🤖</span> Agents <span class="count">5</span></div>
            <div class="sidebar-item"><span class="icon">🔧</span> DevOps <span class="count">4</span></div>
            <div class="sidebar-item"><span class="icon">📈</span> Business <span class="count">3</span></div>
            <div class="sidebar-item"><span class="icon">🎓</span> Learning <span class="count">6</span></div>

            <div class="sidebar-title">🏷️ Tags</div>
            <div class="sidebar-item"><span class="icon">#</span> backend</div>
            <div class="sidebar-item"><span class="icon">#</span> frontend</div>
            <div class="sidebar-item"><span class="icon">#</span> architecture</div>
            <div class="sidebar-item"><span class="icon">#</span> deployment</div>

            <div class="sidebar-title">⭐ Pinned</div>
            <div class="sidebar-item"><span class="icon">📌</span> NEXUZ² Blueprint</div>
            <div class="sidebar-item"><span class="icon">📌</span> API Key Registry</div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <!-- WIKI VIEW -->
            <div class="view active" id="wikiView">
                <input type="text" class="wiki-search" placeholder="🔍 Suche in Wiki-Artikeln..." id="wikiSearch">
                <div class="wiki-grid" id="wikiGrid"></div>
            </div>

            <!-- KANBAN VIEW -->
            <div class="view" id="kanbanView">
                <div class="kanban" id="kanbanBoard"></div>
            </div>

            <!-- NOTES VIEW -->
            <div class="view" id="notesView">
                <div class="notes-stats" id="notesStats"></div>
                <div class="notes-toolbar">
                    <input type="text" class="notes-search" placeholder="🔍 Notizen durchsuchen..." id="notesSearch">
                    <button class="nm-btn primary" onclick="createNewNote()">+ Neue Notiz</button>
                    <button class="nm-btn" onclick="archiveOldNotes()">📦 30d Auto-Archiv</button>
                </div>
                <div class="folder-tabs" id="folderTabs"></div>
                <div class="notes-grid" id="notesGrid"></div>
            </div>
        </div>
    </div>

    <!-- NOTE EDIT MODAL -->
    <div class="modal-overlay" id="noteModal">
        <div class="modal-box">
            <div class="nm-head">
                <div style="font-size:14px;font-weight:800">📝 Notiz bearbeiten</div>
                <button class="nm-close" onclick="closeNoteModal()">&times;</button>
            </div>
            <input class="nm-title-input" id="nmTitle" placeholder="Titel...">
            <textarea class="nm-body" id="nmBody" placeholder="Inhalt schreiben..."></textarea>
            <div class="nm-meta">
                <select id="nmPrefix" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:10px;font-family:var(--font)">
                    <option value="P">P — Projekt</option>
                    <option value="I">I — Idee</option>
                    <option value="R">R — Referenz</option>
                </select>
                <select id="nmFolder" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:10px;font-family:var(--font)">
                    <option value="inbox">📥 Inbox</option>
                    <option value="aktiv">🔥 Aktiv</option>
                    <option value="archiv">📦 Archiv</option>
                    <option value="meeting">🎤 Meeting</option>
                </select>
                <button class="nm-btn primary" onclick="saveNoteModal()">💾 Speichern</button>
                <button class="nm-btn danger" onclick="deleteNoteModal()">🗑️ Löschen</button>
                <div style="flex:1"></div>
                <span id="nmInfo" style="font-size:9px;color:var(--muted);font-family:var(--mono)"></span>
            </div>
        </div>
    </div>

    <!-- WIKI DETAIL MODAL -->
    <div class="modal-overlay" id="wikiModal">
        <div class="modal-box wide">
            <div class="nm-head">
                <div id="wmTitle" style="font-size:18px;font-weight:900"></div>
                <button class="nm-close" onclick="closeWikiModal()">&times;</button>
            </div>
            <div id="wmSpace" style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:16px"></div>
            <div id="wmBody" style="font-size:13px;line-height:2;white-space:pre-wrap"></div>
            <div id="wmTags" style="display:flex;gap:4px;margin-top:16px;flex-wrap:wrap"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- SHARED DATA LAYER -->
    <script src="../shared/dkz-notes-shared.js"></script>

    <script>
    // DkZ XSS Protection
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }

    // ═══════════════════════════════════════
    // WIKI DATA (persistent in localStorage)
    // ═══════════════════════════════════════
    const DEFAULT_WIKI = [
        { title: "NEXUZ² Architektur-Overview", desc: "Multi-Backend/Frontend-System mit 6 Backends, 7 Frontends und MCP Browser-Integration. Das zentrale Nervensystem des DkZ-Ökosystems.", icon: "⚡", space: "NEXUZ²", tags: ["#architecture", "#nexuz"], updated: "2026-03-08", color: "#fa1e4e", body: "NEXUZ² ist das zentrale Nervensystem des DkZ-Ökosystems.\n\n## Architektur\n- 6 Backends: VPS, LLM Server, Google Apps Script, Apache, Cloudflare Worker, Nextcloud\n- 7 Frontends: Dashboard, Hub, Landing Pages, Mobile, Extension, Admin, Docs\n- MCP Browser-Integration für Chrome/Vivaldi\n\n## Kernprinzipien\n1. Dezentral: Kein Single Point of Failure\n2. EU-souverän: Alle Server in EU\n3. Self-hosted: Volle Kontrolle\n4. Offline-First: localStorage + Service Worker" },
        { title: "Backend Registry & Bridges", desc: "Wie der NEXUZ² Router die 6 Backends verbindet: VPS, LLM Server, Google Apps Script, Apache, Cloudflare Worker, Nextcloud.", icon: "🔌", space: "NEXUZ²", tags: ["#backend", "#router"], updated: "2026-03-08", color: "#fa1e4e", body: "Der NEXUZ² Router verbindet alle Backends über ein Bridge-System.\n\n## Backends\n1. KVM8 VPS — Primary API Gateway (Node.js/Fastify)\n2. LLM Server — Ollama/vLLM für lokale Inferenz\n3. Google Apps Script — Drive, Sheets, Docs Brücke\n4. Apache VPS — Legacy-Kompatibilität\n5. Cloudflare Worker — Edge Computing, CORS-Proxy\n6. Nextcloud — Agent-Dispatch, File Sync\n\n## Health-Monitoring\nJeder Backend hat einen /health Endpoint der alle 30s geprüft wird." },
        { title: "MCP Browser Extension", desc: "Chrome/Vivaldi Extension mit Sidepanel, Context Menu und Keyboard Shortcuts. Manifest V3, Service Worker, Content Script.", icon: "🔗", space: "NEXUZ²", tags: ["#mcp", "#extension"], updated: "2026-03-08", color: "#a855f7", body: "Die MCP Browser Extension verbindet den Browser direkt mit dem DkZ-Ökosystem.\n\n## Features\n- Sidepanel: Chat + Status Dashboard\n- Context Menu: Text markieren → AI verarbeiten\n- Keyboard Shortcuts: Ctrl+Shift+K → Quick Command\n- Background Service Worker: Message Routing\n\n## Technik\n- Manifest V3 (Chrome/Vivaldi)\n- Content Script für Page-Integration\n- Options Page für Backend-Config" },

    function renderWiki() {
        const grid = document.getElementById('wikiGrid');
        grid.innerHTML = WIKI_ARTICLES.map((a, idx) => `
        <div class="wiki-card" data-title="${esc(a.title.toLowerCase())}" onclick="openWikiArticle(${idx})">
            <div class="wc-icon">${a.icon}</div>
            <div class="wc-title">${esc(a.title)}</div>
            <div class="wc-desc">${esc(a.desc)}</div>
            <div class="wc-meta">
                <div>
                    ${a.tags.map(t => `<span class="wc-tag" style="background:${hexAlpha(a.color, .1)};color:${a.color}">${esc(t)}</span>`).join(' ')}
                </div>
                <div>${esc(a.space)} · ${a.updated}</div>
            </div>
        </div>
    `).join('');
        document.getElementById('wikiCount').textContent = WIKI_ARTICLES.length;
    }

    function openWikiArticle(idx) {
        const a = WIKI_ARTICLES[idx];
        if (!a) return;
        document.getElementById('wmTitle').innerHTML = `${a.icon} ${esc(a.title)}`;
        document.getElementById('wmSpace').textContent = `${a.space} · Aktualisiert: ${a.updated}`;
        document.getElementById('wmBody').textContent = a.body || a.desc;
        document.getElementById('wmTags').innerHTML = a.tags.map(t => `<span class="wc-tag" style="background:${hexAlpha(a.color, .1)};color:${a.color};padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600">${esc(t)}</span>`).join('');
        document.getElementById('wikiModal').classList.add('open');
    }

    function closeWikiModal() { document.getElementById('wikiModal').classList.remove('open'); }

    function renderKanban() {
        const board = document.getElementById('kanbanBoard');
        let totalCards = 0;
        board.innerHTML = KANBAN_COLUMNS.map(col => {
            totalCards += col.cards.length;
            return `
        <div class="kanban-col">
            <div class="kanban-col-head">
                <div class="dot" style="background:${col.color}"></div>
                ${esc(col.name)}
                <span class="count">${col.cards.length}</span>
            </div>
            <div class="kanban-cards">
                ${col.cards.map(c => {
                    const pColor = c.priority === 'kritisch' ? 'var(--red)' : c.priority === 'hoch' ? 'var(--yellow)' : c.priority === 'erledigt' ? 'var(--green)' : 'var(--blue)';
                    return `
                    <div class="kanban-card">
                        <div class="kc-title">${esc(c.title)}</div>
                        <div class="kc-desc">${esc(c.desc)}</div>
                        <div class="kc-footer">
                            <span class="kc-priority" style="background:${pColor}20;color:${pColor}">${esc(c.priority)}</span>
                            <span>${esc(c.tag)}</span>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
        }).join('');
        document.getElementById('kanbanCount').textContent = totalCards;
    }

        const folders = DkzNotes.load();
        const all = DkzNotes.allNotes(folders);
        let h = `<button class="folder-tab ${activeNoteFolder === 'all' ? 'active' : ''}" onclick="setNoteFolder('all')">🏠 Alle <span class="ft-count">${all.length}</span></button>`;
        folders.forEach(f => {
            h += `<button class="folder-tab ${activeNoteFolder === f.id ? 'active' : ''}" onclick="setNoteFolder('${f.id}')">${f.icon} ${esc(f.name)} <span class="ft-count">${(f.notes||[]).length}</span></button>`;
        });
        document.getElementById('folderTabs').innerHTML = h;
    }

    function renderNotes() {
        renderNotesStats();
        renderFolderTabs();
        const folders = DkzNotes.load();
        let notes;
        if (noteSearch) {
            notes = DkzNotes.searchNotes(noteSearch, folders);
            if (activeNoteFolder !== 'all') notes = notes.filter(n => n.folder === activeNoteFolder);
        } else if (activeNoteFolder === 'all') {
            notes = DkzNotes.allNotes(folders);
        } else {
            notes = DkzNotes.notesByFolder(activeNoteFolder, folders).map(n => {
                const f = folders.find(x => (x.notes||[]).includes(n));
                return { ...n, folder: activeNoteFolder, folderIcon: folders.find(x=>x.id===activeNoteFolder)?.icon || '' };
            });
        }

        const grid = document.getElementById('notesGrid');
        grid.innerHTML = notes.map(n => `
        <div class="note-card" onclick="openNoteEditor('${n.id}')" style="${n.folder === 'aktiv' ? 'border-left:3px solid var(--green)' : n.folder === 'meeting' ? 'border-left:3px solid var(--purple)' : ''}">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
                <span class="note-prefix pf-${n.prefix}">${n.prefix}</span>
                <div class="nc-title" style="margin:0">${esc(n.title)}</div>
            </div>
            <div class="nc-text">${esc(n.body || '')}</div>
            ${(n.tags && n.tags.length) ? `<div class="nc-tags">${n.tags.map(t => `<span>${esc(t)}</span>`).join('')}</div>` : ''}
            <div class="nc-date">${n.folderIcon || ''} ${n.modified || n.created || ''}</div>
        </div>`).join('');

        document.getElementById('notesCount').textContent = DkzNotes.allNotes(folders).length;
    }

    function setNoteFolder(id) { activeNoteFolder = id; renderNotes(); }

    // ═══════════════════════════════════════
    // NOTE EDITOR MODAL
    // ═══════════════════════════════════════
    function openNoteEditor(id) {
        const result = DkzNotes.findNote(id);
        if (!result) return;
        editingNoteId = id;
        document.getElementById('nmTitle').value = result.note.title;
        document.getElementById('nmBody').value = result.note.body || '';
        document.getElementById('nmPrefix').value = result.note.prefix || 'I';
        document.getElementById('nmFolder').value = result.folderId;
        document.getElementById('nmInfo').textContent = `Erstellt: ${result.note.created || '—'} · Geändert: ${result.note.modified || '—'} · ${(result.note.body||'').length} Zeichen`;
        document.getElementById('noteModal').classList.add('open');
        setTimeout(() => document.getElementById('nmTitle').focus(), 100);
    }

    function saveNoteModal() {
        if (!editingNoteId) return;
        const title = document.getElementById('nmTitle').value;
        const body = document.getElementById('nmBody').value;
        const prefix = document.getElementById('nmPrefix').value;
        const targetFolder = document.getElementById('nmFolder').value;

        const result = DkzNotes.findNote(editingNoteId);
        if (!result) return;

        DkzNotes.updateNote(editingNoteId, { title, body, prefix });
        if (result.folderId !== targetFolder) {
            DkzNotes.moveNote(editingNoteId, targetFolder);
        }
        renderNotes();
        toast('💾 Notiz gespeichert');
    }

    function deleteNoteModal() {
        if (!editingNoteId || !confirm('Notiz wirklich löschen?')) return;
        DkzNotes.deleteNote(editingNoteId);
        closeNoteModal();
        renderNotes();
        toast('🗑️ Notiz gelöscht');
    }

    function closeNoteModal() {
        document.getElementById('noteModal').classList.remove('open');
        editingNoteId = null;
    }

    function createNewNote() {
        const folder = activeNoteFolder === 'all' ? 'inbox' : activeNoteFolder;
        const folders = DkzNotes.addNote(folder, { title: 'Neue Notiz', prefix: 'I' });
        const all = DkzNotes.allNotes(folders);
        if (all.length > 0) openNoteEditor(all[0].id);
        renderNotes();
        toast('📝 Neue Notiz erstellt');
    }

    function archiveOldNotes() {
        const result = DkzNotes.archiveOld(30);
        renderNotes();
        toast(result.moved > 0 ? `📦 ${result.moved} Notizen archiviert` : '✅ Nichts zu archivieren');
    }

    // ═══════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════
    function hexAlpha(hex, alpha) {
        if (!hex || hex.startsWith('var(')) return `rgba(250,30,78,${alpha})`;
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function handleNewBtn() {
        if (activeView === 'notes') createNewNote();
        else if (activeView === 'wiki') toast('💡 Wiki-Artikel werden von James™ verwaltet');
        else toast('📋 Kanban-Karten werden automatisch synchronisiert');
    }

    // ═══════════════════════════════════════
    // TABS
    // ═══════════════════════════════════════
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            activeView = tab.dataset.view;
            document.getElementById(activeView + 'View').classList.add('active');
        });
    });

    // WIKI SEARCH
    document.getElementById('wikiSearch').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('.wiki-card').forEach(card => {
            card.style.display = card.dataset.title.includes(q) ? '' : 'none';
        });
    });

    // NOTES SEARCH
    document.getElementById('notesSearch').addEventListener('input', (e) => {
        noteSearch = e.target.value;
        renderNotes();
    });

    // SIDEBAR
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
        });
    });

    // KEYBOARD
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeNoteModal(); closeWikiModal(); }
    });

    // CLICK OUTSIDE MODAL
    document.getElementById('noteModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeNoteModal(); });
    document.getElementById('wikiModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeWikiModal(); });

    // ═══════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════
    DkzNotes.ensureData();
    document.getElementById('allCount').textContent = WIKI_ARTICLES.length + DkzNotes.allNotes().length;
    renderWiki();
    renderKanban();
    renderNotes();
    </script>
