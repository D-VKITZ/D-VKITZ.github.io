<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 SEO Command Center™ V2 – DNS & Social SEO</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --bg2: #1a1a1c;
            --card: #1a1a1c;
            --card2: #222226;
            --border: #1a1a1e;
            --border2: #333338;
            --text: #f6f6f7;
            --muted: #a1a1aa;
            --dim: #71717a;
            --green: #00ff88;
            --blue: #55ACEE;
            --cyan: #00FFD5;
            --purple: #a855f7;
            --pink: #ec4899;
            --yellow: #FFB800;
            --orange: #ff8844;
            --red: #fa1e4e;
            --accent: #fa1e4e;
            --accent-rgb: 250, 30, 78;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /* ─── TOPBAR ─── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--card), var(--card2));
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 100;
            flex-shrink: 0
        }

        .topbar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), var(--purple), var(--blue), transparent)
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--red), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap
        }

        .logo-sub {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase
        }

        /* ─── SECTION TOGGLE ─── */
        .section-toggle {
            display: flex;
            background: var(--bg);
            border-radius: 12px;
            padding: 3px;
            border: 1px solid var(--border);
            margin: 0 12px
        }

        .section-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-family: var(--font);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .section-btn:hover {
            color: var(--text)
        }

        .section-btn.active {
            background: linear-gradient(135deg, rgba(250, 30, 78, .15), rgba(168, 85, 247, .15));
            color: var(--text);
            box-shadow: 0 2px 12px rgba(250, 30, 78, .15)
        }

        .section-btn .count {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, .08);
            font-weight: 800
        }

        /* ─── SUB NAV ─── */
        .subnav {
            display: flex;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
            padding: 0 4px
        }

        .subnav::-webkit-scrollbar {
            height: 0
        }

        .nav-btn {
            padding: 7px 13px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px
        }

        .nav-btn:hover {
            color: var(--text);
            background: var(--card2);
            border-color: var(--border)
        }

        .nav-btn.active {
            color: var(--red);
            background: rgba(250, 30, 78, .06);
            border-color: rgba(250, 30, 78, .25);
            box-shadow: 0 0 15px rgba(250, 30, 78, .08)
        }

        .nav-btn .icon {
            font-size: 13px
        }

        /* ─── ACTION BUTTONS ─── */
        .top-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0
        }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card2);
            color: var(--muted);
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s;
            white-space: nowrap
        }

        .action-btn:hover {
            color: var(--yellow);
            border-color: var(--yellow);
            background: rgba(255, 184, 0, .06)
        }

        /* ─── MAIN ─── */
        .main {
            flex: 1;
            overflow: hidden;
            position: relative
        }

        .module-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            position: absolute;
            top: 0;
            left: 0
        }

        .module-frame.active {
            display: block
        }

        /* ─── STATUS BAR ─── */
        .statusbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 20px;
            background: var(--card);
            border-top: 1px solid var(--border);
            font-size: 9px;
            color: var(--muted);
            flex-shrink: 0
        }

        .statusbar .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        /* ─── RESPONSIVE ─── */
        @media(max-width:900px) {
            .topbar {
                flex-wrap: wrap
            }

            .subnav {
                order: 3;
                width: 100%
            }

            .section-toggle {
                order: 1
            }

            .top-actions {
                order: 2;
                margin-left: auto
            }

            .logo-sub {
                display: none
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div>
            <div class="logo">🔍 SEO Command Center™</div>
            <div class="logo-sub">DNS & Social SEO • V2.0</div>
        </div>
        <div class="section-toggle">
            <button class="section-btn active" onclick="switchSection('dns',this)"><span>🌐</span> DNS SEO <span
                    class="count">6</span></button>
            <button class="section-btn" onclick="switchSection('social',this)"><span>📱</span> Social SEO <span
                    class="count">17</span></button>
        </div>
        <nav class="subnav" id="subnav"></nav>
        <div class="top-actions">
            <button class="action-btn" onclick="exportAllData()">💾 Export</button>
            <button class="action-btn" onclick="location.href='../seo-dashboard/index.html'">← SEO V1</button>
        </div>
    </div>

    <div class="main" id="main"></div>

    <div class="statusbar">
        <div class="dot"></div>
        <span id="statusText">System bereit</span>
        <span style="margin-left:auto">SEO Command Center™ V2.0 • DEVKiTZ™ • <span id="clock"></span></span>
    </div>

    <script>
    // DkZ XSS Protection
    function esc(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
        const MODULES = {
            dns: [
                { id: 'dns-overview', icon: '📡', label: 'Übersicht', src: 'dns/dns-overview.html' },
                { id: 'dns-builder', icon: '⛓️', label: 'DNS Builder', src: 'dns/dns-builder.html' },
                { id: 'domain-analyzer', icon: '💎', label: 'Domain Analyzer', src: 'dns/domain-analyzer.html' },
                { id: 'ssl-checker', icon: '🔒', label: 'SSL Check', src: 'dns/ssl-checker.html' },
                { id: 'sitemap-robots', icon: '🗺️', label: 'Sitemap & Robots', src: 'dns/sitemap-robots.html' },
                { id: 'dns-propagation', icon: '🌍', label: 'Propagation', src: 'dns/dns-propagation.html' }
            ],
            social: [
                { id: 'social-hub', icon: '🏠', label: 'Hub', src: 'social/social-hub.html' },
                { id: 'youtube', icon: '▶️', label: 'YouTube', src: 'social/platforms/youtube.html' },
                { id: 'instagram', icon: '📸', label: 'Instagram', src: 'social/platforms/instagram.html' },
                { id: 'tiktok', icon: '🎵', label: 'TikTok', src: 'social/platforms/tiktok.html' },
                { id: 'twitch', icon: '🟣', label: 'Twitch', src: 'social/platforms/twitch.html' },
                { id: 'kick', icon: '🟢', label: 'Kick', src: 'social/platforms/kick.html' },
                { id: 'x-twitter', icon: '✖️', label: 'X / Twitter', src: 'social/platforms/x-twitter.html' },
                { id: 'facebook', icon: '📘', label: 'Facebook', src: 'social/platforms/facebook.html' },
                { id: 'reddit', icon: '🟠', label: 'Reddit', src: 'social/platforms/reddit.html' },
                { id: 'snapchat', icon: '👻', label: 'Snapchat', src: 'social/platforms/snapchat.html' },
                { id: 'vk', icon: '🔷', label: 'VK', src: 'social/platforms/vk.html' },
                { id: 'linkedin', icon: '💼', label: 'LinkedIn', src: 'social/platforms/linkedin.html' },
                { id: 'cross-platform', icon: '📊', label: 'Cross-Platform', src: 'social/cross-platform.html' },
                { id: 'profile-checker', icon: '✅', label: 'Profil-Check', src: 'social/profile-checker.html' },
                { id: 'content-analyzer', icon: '🎯', label: 'Content Analyzer', src: 'social/content-analyzer.html' },
                { id: 'follower-tracker', icon: '👥', label: 'Follower Tracker', src: 'social/follower-tracker.html' },
                { id: 'engagement-tracker', icon: '❤️', label: 'Engagement', src: 'social/engagement-tracker.html' },
                { id: 'metrics-engine', icon: '📐', label: 'Metrics Engine', src: 'social/metrics-engine.html' }
            ]
        };

        let activeSection = 'dns';
        let activeModule = null;
        const loadedFrames = {};

        function switchSection(section, btn) {
            activeSection = section;
            document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSubnav();
            // Load first module of section
            const firstMod = MODULES[section][0];
            loadModule(firstMod.id);
        }

        function renderSubnav() {
            const nav = document.getElementById('subnav');
            nav.innerHTML = MODULES[activeSection].map((m, i) =>
                `<button class="nav-btn ${i === 0 ? 'active' : ''}" data-mod="${m.id}" onclick="navClick(this,'${m.id}')"><span class="icon">${m.icon}</span>${m.label}</button>`
            ).join('');
        }

        function navClick(btn, modId) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadModule(modId);
        }

        function loadModule(modId) {
            activeModule = modId;
            // Find module config
            const mod = [...MODULES.dns, ...MODULES.social].find(m => m.id === modId);
            if (!mod) return;

            // Hide all frames
            document.querySelectorAll('.module-frame').forEach(f => f.classList.remove('active'));

            // Create or show frame
            let frame = document.getElementById('frame-' + modId);
            if (!frame) {
                frame = document.createElement('iframe');
                frame.id = 'frame-' + modId;
                frame.className = 'module-frame';
                frame.src = mod.src;
                document.getElementById('main').appendChild(frame);
                loadedFrames[modId] = true;
            }
            frame.classList.add('active');

            // Update status
            document.getElementById('statusText').textContent = `Modul: ${mod.label} • ${activeSection.toUpperCase()} SEO`;

            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mod === modId);
            });
        }

        function exportAllData() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('seo_') || key.startsWith('dns_') || key.startsWith('social_')) {
                    try { data[key] = JSON.parse(localStorage.getItem(key)); }
                    catch { data[key] = localStorage.getItem(key); }
                }
            }
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `seo-export-${Date.now()}.json`;
            a.click();
        }

        // Clock
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Init
        renderSubnav();
        loadModule(MODULES.dns[0].id);
    </script>
</body>

</html>
