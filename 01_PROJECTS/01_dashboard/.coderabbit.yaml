# CodeRabbit Configuration — DEVKiTZ Ökosystem
# Docs: https://docs.coderabbit.ai/configuration

language: "de"
tone_instructions: "Professionell, direkt, DkZ-Stil. Prüfe REGELWERK-Konformität."

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "modules/**"
      instructions: |
        Prüfe ob DkZ Design System eingehalten wird:
        - Accent: #fa1e4e
        - Fonts: Inter + JetBrains Mono
        - Glassmorphism vorhanden
        - XSS: esc() Funktion
        - Toast-System
        - ← Hub Button im Header
        - Version im Header (Regel 9: vX.XX.X_XX)

    - path: "shared/**"
      instructions: |
        Shared Components sind kritisches System-Core.
        - @DKZ:RULES Marker muss vorhanden sein
        - Keine Breaking Changes ohne Rücksprache
        - EventBus muss immer zuerst geladen werden

    - path: "*.json"
      instructions: |
        JSON-Dateien validieren:
        - features.json: MOD-XXX Format prüfen
        - REGISTRY.json: totalModules = tatsächliche Ordneranzahl

    - path: "**/*.md"
      instructions: |
        Dokumentation prüfen:
        - REGELWERK.md: Version + Regelanzahl korrekt?
        - BLAUPAUSE.md: Modulzahl stimmt?
        - ORDNER.ini referenziert?

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  jira:
    project_keys: []
  pull_requests:
    scope: "auto"
