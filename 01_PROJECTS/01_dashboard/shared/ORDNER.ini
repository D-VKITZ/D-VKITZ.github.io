[ORDNER]
name = shared
typ = shared-system
beschreibung = Geteilte JS-Komponenten für alle Module

[DATEIEN]
dkz-eventbus.js  = Cross-Module Kommunikation (pub/sub, module registry)
dkz-console.js   = Universelle Console (Ctrl+K, Prefix:Command Syntax)
dkz-health.js    = Self-Debug + Health Monitor (Ctrl+D, 30s Checks)
dkz-shortcuts.js = Einheitliche Keyboard Shortcuts

[LADEREIHENFOLGE]
; WICHTIG: In dieser Reihenfolge laden!
1 = dkz-eventbus.js
2 = dkz-console.js
3 = dkz-health.js
4 = dkz-shortcuts.js

[REGELN]
R1 = EventBus MUSS zuerst geladen werden
R2 = @DKZ:RULES Marker in jeder Datei
R3 = Alle Module binden shared/*.js ein

[VERWEISE]
regelwerk = ../../../REGELWERK.md
root_ini  = ../../../ORDNER.ini
