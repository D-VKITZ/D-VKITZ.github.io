<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DEVKiTZ™ — Command Center</title>
<script src="../../shared/dkz-info.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:#000;font-family:'Courier New',monospace;color:#c8c8c8;cursor:none;overflow-x:hidden;}

/* SCANLINES */
body::before{content:'';position:fixed;inset:0;z-index:200;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 4px);}

/* NOISE */
.noise{position:fixed;inset:0;z-index:199;pointer-events:none;opacity:.018;animation:nz .12s steps(2) infinite;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
@keyframes nz{0%{transform:translate(0,0)}50%{transform:translate(-1%,1%)}100%{transform:translate(1%,-1%)}}

.vignette{position:fixed;inset:0;z-index:198;pointer-events:none;background:radial-gradient(ellipse at 50% 40%,transparent 38%,rgba(0,0,0,.95) 100%);}

/* CURSOR */
.cursor{position:fixed;width:10px;height:10px;border:1px solid rgba(250,30,78,.7);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .1s,height .1s;mix-blend-mode:difference;}
.cursor.h{width:20px;height:20px;background:rgba(250,30,78,.06);}

/* CANVAS */
canvas{position:fixed;inset:0;z-index:0;}

/* PAGE */
.page{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:20px 24px 40px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(250,30,78,.08);margin-bottom:28px;}
.tb-left{display:flex;align-items:center;gap:20px;}
.logo{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:rgba(250,30,78,.7);}
.logo b{color:rgba(250,30,78,.95);}
.sys-badge{font-size:7px;letter-spacing:2px;padding:2px 8px;border:1px solid rgba(0,255,136,.15);color:rgba(0,255,136,.4);border-radius:1px;}
.tb-right{display:flex;align-items:center;gap:16px;}
.tb-item{font-size:8px;letter-spacing:2px;color:rgba(50,50,50,.6);}
.tb-item span{color:rgba(250,30,78,.4);}
#clock{font-size:9px;letter-spacing:3px;color:rgba(60,60,60,.5);}

/* SOUND VISUALIZER BAR */
.viz-bar{width:100%;height:36px;display:flex;align-items:flex-end;gap:2px;margin-bottom:28px;padding:0 4px;}
.vb{flex:1;min-width:2px;border-radius:1px 1px 0 0;background:rgba(250,30,78,.25);transition:height .06s ease;min-height:2px;}
.vb.green{background:rgba(0,255,136,.2);}
.vb.blue{background:rgba(85,172,238,.2);}

/* SOUND CONTROLS */
.sound-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.snd-btn{padding:6px 14px;font-size:8px;letter-spacing:3px;text-transform:uppercase;font-family:'Courier New',monospace;cursor:none;border:1px solid rgba(250,30,78,.2);background:transparent;color:rgba(80,80,80,.5);border-radius:2px;transition:all .2s;}
.snd-btn:hover{border-color:rgba(250,30,78,.5);color:rgba(250,30,78,.8);}
.snd-btn.on{border-color:rgba(250,30,78,.6);color:rgba(250,30,78,.9);background:rgba(250,30,78,.04);}
.snd-label{font-size:8px;letter-spacing:2px;color:rgba(50,50,50,.5);text-transform:uppercase;}
.vol-slider{width:100px;accent-color:rgba(250,30,78,.6);cursor:none;}

/* GRID */
.section-label{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:rgba(50,50,50,.4);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(250,30,78,.05);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:32px;}

/* MODULE CARDS */
.card{background:rgba(3,3,3,.96);border:1px solid rgba(250,30,78,.07);border-radius:2px;padding:18px;transition:border-color .3s,box-shadow .3s;position:relative;overflow:hidden;cursor:none;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent,rgba(250,30,78,.3)),transparent);opacity:0;transition:opacity .3s;}
.card:hover{border-color:var(--accent,rgba(250,30,78,.25));box-shadow:0 0 30px rgba(250,30,78,.04);}
.card:hover::before{opacity:1;}
.card.pulse{animation:cardPulse 2s ease-in-out infinite;}
@keyframes cardPulse{0%,100%{border-color:rgba(250,30,78,.07)}50%{border-color:rgba(250,30,78,.2)}}

.c-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.c-icon{font-size:22px;line-height:1;}
.c-status{font-size:7px;letter-spacing:2px;padding:2px 7px;border-radius:1px;border:1px solid;}
.status-on{border-color:rgba(0,255,136,.25);color:rgba(0,255,136,.5);}
.status-plan{border-color:rgba(255,180,0,.2);color:rgba(255,180,0,.4);}
.status-off{border-color:rgba(80,80,80,.2);color:rgba(60,60,60,.4);}
.c-name{font-size:13px;letter-spacing:2px;font-weight:bold;color:rgba(180,180,180,.8);margin-bottom:4px;}
.c-sub{font-size:8px;letter-spacing:1px;color:rgba(60,60,60,.5);text-transform:uppercase;margin-bottom:10px;}
.c-desc{font-size:10px;line-height:1.6;color:rgba(100,100,100,.5);}

/* SOUND BAR per card */
.c-wave{display:flex;gap:2px;align-items:flex-end;margin-top:12px;height:16px;}
.cw-bar{width:3px;border-radius:1px;background:var(--accent,rgba(250,30,78,.3));min-height:2px;transition:height .08s ease;}

/* MINI VIZ */
.c-vizmini{display:flex;gap:1px;align-items:flex-end;height:12px;margin-top:10px;}
.cvm{width:2px;border-radius:1px;background:var(--accent,rgba(250,30,78,.2));}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:32px;}
.stat{background:rgba(2,2,2,.98);border:1px solid rgba(250,30,78,.06);border-radius:2px;padding:14px;text-align:center;}
.stat-n{font-size:28px;font-weight:900;color:rgba(250,30,78,.6);letter-spacing:-1px;line-height:1;}
.stat-l{font-size:7px;letter-spacing:3px;color:rgba(50,50,50,.5);text-transform:uppercase;margin-top:4px;}

/* BOTTOM LOG */
.log{background:rgba(2,2,2,.98);border:1px solid rgba(250,30,78,.05);border-radius:2px;padding:14px;font-size:9px;line-height:1.8;color:rgba(60,60,60,.5);max-height:120px;overflow:hidden;}
.log-line{opacity:0;animation:logIn .3s ease forwards;}
.log-line.red{color:rgba(250,30,78,.4);}
.log-line.green{color:rgba(0,255,136,.35);}
@keyframes logIn{to{opacity:1;}}

/* ═══ ANALYSE SYSTEM ═══ */
.analyse-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.analyse-btn{
  padding:10px 28px;font-size:9px;letter-spacing:4px;text-transform:uppercase;
  font-family:'Courier New',monospace;cursor:none;
  border:1px solid rgba(250,30,78,.35);background:rgba(250,30,78,.04);
  color:rgba(250,30,78,.8);border-radius:2px;transition:all .3s;
  position:relative;overflow:hidden;
}
.analyse-btn:hover{border-color:rgba(250,30,78,.7);background:rgba(250,30,78,.08);color:#fa1e4e;box-shadow:0 0 30px rgba(250,30,78,.12);}
.analyse-btn.scanning{pointer-events:none;border-color:rgba(250,30,78,.6);}
.analyse-btn.scanning::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(250,30,78,.15),transparent);
  animation:btnSweep .8s ease infinite;
}
@keyframes btnSweep{to{left:100%;}}
.analyse-status{font-size:8px;letter-spacing:2px;color:rgba(80,80,80,.5);}

/* SCAN OVERLAY on cards */
.card.scanning{position:relative;}
.card.scanning::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent 20%,rgba(250,30,78,.8) 50%,transparent 80%);
  animation:scanLine 1.2s ease-in-out forwards;
  box-shadow:0 0 20px rgba(250,30,78,.4),0 4px 15px rgba(250,30,78,.15);
}
@keyframes scanLine{0%{top:0;opacity:1}100%{top:100%;opacity:0}}
.card.scan-ok{border-color:rgba(0,255,136,.3)!important;box-shadow:0 0 20px rgba(0,255,136,.06)!important;}
.card.scan-ok::before{opacity:1!important;background:linear-gradient(90deg,transparent,rgba(0,255,136,.3),transparent)!important;}
.card.scan-warn{border-color:rgba(255,180,0,.3)!important;box-shadow:0 0 20px rgba(255,180,0,.06)!important;}
.card.scan-warn::before{opacity:1!important;background:linear-gradient(90deg,transparent,rgba(255,180,0,.3),transparent)!important;}
.card.scan-err{border-color:rgba(250,30,78,.4)!important;box-shadow:0 0 20px rgba(250,30,78,.08)!important;}
.card.scan-err::before{opacity:1!important;background:linear-gradient(90deg,transparent,rgba(250,30,78,.4),transparent)!important;}

/* SCAN PROGRESS BAR */
.scan-progress{width:100%;height:3px;background:rgba(250,30,78,.06);border-radius:2px;margin-bottom:20px;overflow:hidden;opacity:0;transition:opacity .3s;}
.scan-progress.active{opacity:1;}
.scan-progress-fill{height:100%;width:0;background:linear-gradient(90deg,rgba(250,30,78,.6),rgba(0,255,136,.5));border-radius:2px;transition:width .3s ease;box-shadow:0 0 10px rgba(250,30,78,.3);}

/* CONFLICT PANEL */
.conflict-panel{background:rgba(2,2,2,.98);border:1px solid rgba(250,30,78,.1);border-radius:2px;padding:0;margin-bottom:24px;overflow:hidden;max-height:0;opacity:0;transition:max-height .5s ease,opacity .4s ease,padding .4s;}
.conflict-panel.open{max-height:600px;opacity:1;padding:16px;}
.conflict-header{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(250,30,78,.5);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.conflict-header .dot{width:6px;height:6px;border-radius:50%;background:#fa1e4e;animation:pulseDot 1.5s ease infinite;}
@keyframes pulseDot{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

.conflict-card{
  display:flex;align-items:center;gap:12px;
  background:rgba(10,10,10,.9);border:1px solid rgba(250,30,78,.08);
  border-radius:3px;padding:10px 14px;margin-bottom:6px;
  transition:all .3s;animation:conflictSlide .4s ease forwards;
  opacity:0;transform:translateX(-20px);
}
@keyframes conflictSlide{to{opacity:1;transform:translateX(0)}}
.conflict-card:hover{border-color:rgba(250,30,78,.25);background:rgba(15,15,15,.95);}
.conflict-sev{
  width:36px;height:36px;border-radius:4px;display:flex;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.conflict-sev.crit{background:rgba(250,30,78,.12);border:1px solid rgba(250,30,78,.3);}
.conflict-sev.warn{background:rgba(255,180,0,.1);border:1px solid rgba(255,180,0,.25);}
.conflict-sev.info{background:rgba(85,172,238,.1);border:1px solid rgba(85,172,238,.2);}
.conflict-body{flex:1;}
.conflict-title{font-size:10px;letter-spacing:1px;color:rgba(200,200,200,.7);font-weight:bold;}
.conflict-detail{font-size:8px;color:rgba(100,100,100,.5);margin-top:2px;letter-spacing:.5px;}
.conflict-tags{display:flex;gap:4px;margin-top:4px;}
.conflict-tag{
  font-size:6px;letter-spacing:1.5px;padding:1px 6px;border-radius:1px;text-transform:uppercase;
  border:1px solid rgba(250,30,78,.15);color:rgba(250,30,78,.4);
}
.conflict-tag.ok{border-color:rgba(0,255,136,.2);color:rgba(0,255,136,.4);}
.conflict-tag.w{border-color:rgba(255,180,0,.2);color:rgba(255,180,0,.4);}

/* ═══ CONSOLE BUBBLES ═══ */
.console-bubble{
  position:fixed;z-index:150;pointer-events:none;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  background:rgba(8,8,10,.92);backdrop-filter:blur(12px);
  border:1px solid rgba(250,30,78,.15);border-radius:20px;
  padding:6px 16px 6px 10px;font-family:'Courier New',monospace;
  font-size:9px;letter-spacing:1px;color:rgba(200,200,200,.6);
  box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 30px rgba(250,30,78,.04);
  animation:bubbleFloat linear forwards;
  will-change:transform;
}
.console-bubble .cb-icon{
  width:24px;height:24px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:11px;
  flex-shrink:0;
}
.console-bubble .cb-icon.ok{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.25);}
.console-bubble .cb-icon.err{background:rgba(250,30,78,.1);border:1px solid rgba(250,30,78,.25);}
.console-bubble .cb-icon.sys{background:rgba(85,172,238,.1);border:1px solid rgba(85,172,238,.2);}
.console-bubble .cb-icon.warn{background:rgba(255,180,0,.1);border:1px solid rgba(255,180,0,.2);}
.console-bubble .cb-text{opacity:.8;}
.console-bubble .cb-time{font-size:7px;color:rgba(100,100,100,.4);margin-left:6px;}
@keyframes bubbleFloat{
  0%{transform:translateX(-110%);opacity:0}
  8%{opacity:1}
  92%{opacity:1}
  100%{transform:translateX(110vw);opacity:0}
}
</style>
</head>

<script>
// ─── CURSOR ───
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });
document.addEventListener('mouseover', e => { if(e.target.closest('.card,.snd-btn,.vol-slider')) cur.classList.add('h'); });
document.addEventListener('mouseout', () => cur.classList.remove('h'));

// ─── CLOCK ───
setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE') + ' LOCAL'; }, 1000);

// ─── BG CANVAS ───
const cvs = document.getElementById('bg');
const ctx = cvs.getContext('2d');
cvs.width = window.innerWidth; cvs.height = window.innerHeight;
window.addEventListener('resize', () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; });

(function animBg() {
  requestAnimationFrame(animBg);
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  const t = Date.now() * 0.0004;
  const g = ctx.createRadialGradient(cvs.width/2, cvs.height*0.35, 0, cvs.width/2, cvs.height*0.35, cvs.width*0.5);
  g.addColorStop(0, `rgba(250,30,78,${0.008 + Math.sin(t)*0.004})`);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cvs.width, cvs.height);
})();

// ─── WEB AUDIO ───
let ac = null, masterGain = null, soundOn = false, droneOscs = [], droneMode = 'drone';

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ac.createGain();
  masterGain.gain.setValueAtTime(0, ac.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.18, ac.currentTime + 3);
  masterGain.connect(ac.destination);
  startDrones();
}

function startDrones() {
  stopDrones();
  const mode = droneMode;

  if (mode === 'drone') {
    [[55,.35],[55.4,.2],[110,.12],[82.4,.1]].forEach(([f,g]) => {
      const osc = ac.createOscillator(), gain = ac.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = f;
      const lfo = ac.createOscillator(), lfog = ac.createGain();
      lfo.frequency.value = 0.07 + Math.random()*0.05;
      lfog.gain.value = f * 0.003;
      lfo.connect(lfog); lfog.connect(osc.frequency); lfo.start();
      gain.gain.value = g;
      const filt = ac.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 500;
      osc.connect(filt); filt.connect(gain); gain.connect(masterGain);
      osc.start(); droneOscs.push(osc, lfo, gain, filt);
    });
  } else if (mode === 'pulse') {
    [40,80,160].forEach(f => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.value = 0; osc.connect(g); g.connect(masterGain); osc.start();
      let up = true;
      const iv = setInterval(() => {
        if (!soundOn) return;
        const t = ac.currentTime;
        g.gain.cancelScheduledValues(t);
        g.gain.setValueAtTime(g.gain.value, t);
        g.gain.linearRampToValueAtTime(up ? 0.25 : 0.02, t + 0.8);
        up = !up;
      }, 900 + Math.random()*400);
      droneOscs.push(osc, g, { stop: () => clearInterval(iv) });
    });
  } else if (mode === 'storm') {
    const bufSz = ac.sampleRate * 3;
    const buf = ac.createBuffer(1, bufSz, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<bufSz;i++) d[i] = Math.random()*2-1;
    const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
    const filt = ac.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 150; filt.Q.value = 0.3;
    const g = ac.createGain(); g.gain.value = 0.3;
    src.connect(filt); filt.connect(g); g.connect(masterGain); src.start();
    // Random thunder
    function thunder() {
      if (!soundOn) return;
      const t = ac.createOscillator(), tg = ac.createGain();
      t.frequency.value = 40 + Math.random()*20;
      tg.gain.setValueAtTime(0, ac.currentTime);
      tg.gain.linearRampToValueAtTime(0.3 + Math.random()*0.2, ac.currentTime + 0.05);
      tg.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.5 + Math.random()*2);
      t.connect(tg); tg.connect(masterGain); t.start(); t.stop(ac.currentTime + 2.5);
      setTimeout(thunder, 4000 + Math.random()*12000);
    }
    setTimeout(thunder, 2000);
    droneOscs.push(src, filt, g);
  }
}

function stopDrones() {
  droneOscs.forEach(n => { try { if (n.stop) n.stop(); } catch(e){} });

let isScanning = false;

function startAnalyse() {
  if (isScanning) return;
  isScanning = true;
  const btn = document.getElementById('analyseBtn');
  const status = document.getElementById('analyseStatus');
  const progress = document.getElementById('scanProgress');
  const fill = document.getElementById('scanFill');
  const panel = document.getElementById('conflictPanel');

  btn.classList.add('scanning');
  btn.textContent = '◎ SCANNING...';
  progress.classList.add('active');
  panel.classList.remove('open');
  panel.innerHTML = '';
  fill.style.width = '0%';

  // Clear previous scan states
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('scanning','scan-ok','scan-warn','scan-err');
  });

  const allCards = document.querySelectorAll('.card');
  const total = allCards.length;
  let scanned = 0;
  let errors = 0, warns = 0, oks = 0;

  // Sequentially scan each card
  function scanNext() {
    if (scanned >= total) {
      finishScan();
      return;
    }
    const card = allCards[scanned];
    const result = SCAN_RESULTS[scanned] || { status:'ok', msg:'OK', module:'Module' };
    card.classList.add('scanning');

    status.textContent = `Scanning ${result.module || 'Module ' + (scanned+1)}... (${scanned+1}/${total})`;
    fill.style.width = ((scanned+1)/total*100) + '%';

    // Spawn console bubble
    spawnBubble(result);

    setTimeout(() => {
      card.classList.remove('scanning');
      card.classList.add('scan-' + result.status);
      if(result.status==='ok') oks++;
      if(result.status==='warn') warns++;
      if(result.status==='err') errors++;
      scanned++;
      scanNext();
    }, 400 + Math.random()*300);
  }

  scanNext();

  function finishScan() {
    btn.classList.remove('scanning');
    btn.textContent = '⚡ ANALYSIERE ALLES';
    status.textContent = `✓ ${total} Module gescannt — ${oks} OK · ${warns} Warnung${warns!==1?'en':''} · ${errors} Fehler`;
    status.style.color = errors > 0 ? 'rgba(250,30,78,.6)' : warns > 0 ? 'rgba(255,180,0,.5)' : 'rgba(0,255,136,.4)';

    // Update error stat
    document.getElementById('s4').textContent = errors + warns;
    document.getElementById('s4').style.color = errors > 0 ? 'rgba(250,30,78,.8)' : 'rgba(255,180,0,.5)';

    // Show conflict panel
    if (CONFLICTS.length > 0) {
      setTimeout(() => showConflicts(), 500);
    }

    setTimeout(() => {
      progress.classList.remove('active');
      fill.style.width = '100%';
    }, 1500);

    setTimeout(() => { isScanning = false; }, 2000);
  }
}

function showConflicts() {
  const panel = document.getElementById('conflictPanel');
  let html = `<div class="conflict-header"><span class="dot"></span> KONFLIKTE ERKANNT — ${CONFLICTS.length} PROBLEME</div>`;

  CONFLICTS.forEach((c, i) => {
    const tags = c.tags.map(t => `<span class="conflict-tag ${t.c}">${t.t}</span>`).join('');
    html += `<div class="conflict-card" style="animation-delay:${i*0.12}s">
      <div class="conflict-sev ${c.sev}">${c.icon}</div>
      <div class="conflict-body">
        <div class="conflict-title">${c.title}</div>
        <div class="conflict-detail">${c.detail}</div>
        <div class="conflict-tags">${tags}</div>
      </div>
    </div>`;
  });

  panel.innerHTML = html;
  panel.classList.add('open');
}

// ═══ CONSOLE BUBBLES ═══
function spawnBubble(result) {
  const bubble = document.createElement('div');
  bubble.className = 'console-bubble';

  const iconClass = result.status === 'ok' ? 'ok' : result.status === 'err' ? 'err' : result.status === 'warn' ? 'warn' : 'sys';
  const iconEmoji = result.status === 'ok' ? '✓' : result.status === 'err' ? '✗' : result.status === 'warn' ? '!' : '◉';
  const time = new Date().toLocaleTimeString('de-DE');

  bubble.innerHTML = `
    <span class="cb-icon ${iconClass}">${iconEmoji}</span>
    <span class="cb-text">${result.module} — ${result.msg}</span>
    <span class="cb-time">${time}</span>
  `;

  // Random vertical position
  const yPos = 15 + Math.random() * 70; // 15-85% from top
  bubble.style.top = yPos + 'vh';
  bubble.style.left = '0';
  bubble.style.animationDuration = (6 + Math.random() * 4) + 's';

  document.body.appendChild(bubble);

  // Remove after animation
  bubble.addEventListener('animationend', () => bubble.remove());
  setTimeout(() => { if(bubble.parentNode) bubble.remove(); }, 12000);
}
