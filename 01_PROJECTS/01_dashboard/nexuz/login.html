<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexuzOS Login — DEVKiTZ™</title>
<meta name="description" content="NexuzOS Authentication — GitHub, Google oder Local Login">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --accent: #fa1e4e;
    --bg: #060608;
    --bg-card: rgba(18,18,24,.85);
    --text: #e8e8f0;
    --text-muted: #5e5e78;
    --border: rgba(26,26,42,.8);
    --green: #00ff88;
    --font-main: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* ─── Animated Background ─── */
.bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(250,30,78,.08), transparent),
        radial-gradient(circle at 30% 80%, rgba(168,85,247,.05), transparent),
        linear-gradient(rgba(26,26,42,.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,26,42,.15) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    animation: gridPulse 8s ease-in-out infinite alternate;
}
@keyframes gridPulse { 0% { opacity:.6 } 100% { opacity:1 } }

/* ─── Login Container ─── */
.login-container {
    position: relative; z-index: 1;
    width: 420px; max-width: 95vw;
}

.login-card {
    background: var(--bg-card);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 60px rgba(250,30,78,.04);
}

/* ─── Logo ─── */
.logo {
    text-align: center;
    margin-bottom: 32px;
}
.logo h1 {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #fa1e4e, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
}
.logo .sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 6px;
}

/* ─── Auth Buttons ─── */
.auth-section { margin-bottom: 20px; }

.auth-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(14,14,16,.6);
    color: var(--text);
    font-family: var(--font-main);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s;
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
}

.auth-btn:hover {
    border-color: rgba(250,30,78,.4);
    background: rgba(250,30,78,.06);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
}

.auth-btn .icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    border-radius: 8px;
    background: rgba(255,255,255,.05);
    flex-shrink: 0;
}

.auth-btn .info {
    display: flex;
    flex-direction: column;
    text-align: left;
    flex: 1;
}

.auth-btn .info .label {
    font-size: 14px;
    font-weight: 600;
}

.auth-btn .info .desc {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 400;
}

/* Empfohlen Badge */
.badge-recommended {
    font-size: 8px;
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--green);
    background: rgba(0,255,136,.1);
    padding: 2px 8px;
    border-radius: 6px;
    letter-spacing: 1px;
    flex-shrink: 0;
}

.auth-btn.recommended {
    border-color: rgba(0,255,136,.25);
    background: rgba(0,255,136,.03);
}
.auth-btn.recommended:hover {
    border-color: rgba(0,255,136,.5);
    background: rgba(0,255,136,.06);
}

/* ─── Divider ─── */
.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--text-muted);
    font-size: 10px;
    font-family: var(--font-mono);
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

/* ─── Local Login Form ─── */
.local-form { display: none; }
.local-form.show { display: block; }

.form-group {
    margin-bottom: 14px;
}
.form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: var(--font-mono);
}
.form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(14,14,16,.8);
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
}
.form-group input:focus {
    border-color: var(--accent);
}

.btn-login {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #fa1e4e, #c4153e);
    color: white;
    font-family: var(--font-main);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
}
.btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(250,30,78,.3);
}

/* ─── Footer ─── */
.login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    line-height: 1.8;
}

/* ─── Status Toast ─── */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(14,14,16,.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--green);
    backdrop-filter: blur(16px);
    transition: transform .3s;
    z-index: 9999;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { color: #ff3b5c; border-color: rgba(255,59,92,.3); }

/* ─── Scan Line ─── */
.scan-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(250,30,78,.4), transparent);
    animation: scanMove 3s linear infinite;
    pointer-events: none;
    border-radius: 20px 20px 0 0;
}
@keyframes scanMove {
    0%   { top: 0 }
    100% { top: 100% }
}
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="login-container">
    <div class="login-card">
        <div class="scan-line"></div>
        <div class="logo">
            <h1>⚡ NEXUZ²</h1>
            <div class="sub">AUTHENTICATION GATEWAY</div>
        </div>

        <div class="auth-section">
            <!-- GitHub — EMPFOHLEN -->
            <button class="auth-btn recommended" onclick="loginGitHub()" id="btnGitHub">
                <span class="icon">🐙</span>
                <span class="info">
                    <span class="label">Mit GitHub anmelden</span>
                    <span class="desc">OAuth2 — Repos, Gists, Profile</span>
                </span>
                <span class="badge-recommended">EMPFOHLEN</span>
            </button>

            <!-- Google -->
            <button class="auth-btn" onclick="loginGoogle()" id="btnGoogle">
                <span class="icon">🔵</span>
                <span class="info">
                    <span class="label">Mit Google anmelden</span>
                    <span class="desc">OAuth2 — Drive, Calendar, Contacts</span>
                </span>
            </button>
        </div>

        <div class="divider">ODER LOKAL</div>

        <!-- KeePass / Local Toggle -->
        <button class="auth-btn" onclick="toggleLocalForm()" id="btnLocal">
            <span class="icon">🔐</span>
            <span class="info">
                <span class="label">Lokaler Login / KeePass</span>
                <span class="desc">Offline — Daten nur lokal gespeichert</span>
            </span>
        </button>

        <div class="local-form" id="localForm">
            <div class="form-group">
                <label>BENUTZERNAME</label>
                <input type="text" id="localName" placeholder="z.B. 777" autocomplete="username">
            </div>
            <div class="form-group">
                <label>PASSPHRASE (OPTIONAL)</label>
                <input type="password" id="localPass" placeholder="KeePass Master oder leer lassen">
            </div>
            <button class="btn-login" onclick="doLocalLogin()">🔐 Lokal einloggen</button>
        </div>

        <div class="login-footer">
            NexuzOS v2.01 · DEVKiTZ™ 2026<br>
            Daten werden verschluesselt in localStorage gespeichert
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared/auth.js"></script>
<script>
// ─── GitHub OAuth ────────────────────────────────
const GITHUB_CLIENT_ID = ''; // Set in ONTHERUN .env
const GITHUB_REDIRECT = window.location.origin + window.location.pathname;

function loginGitHub() {
    if (!GITHUB_CLIENT_ID) {
        // Demo-Modus: Direkt lokalen GitHub-User simulieren
        showToast('GitHub OAuth wird konfiguriert — Demo-Login aktiv');
        NxzAuth.loginLocal('GitHub User', '');
        setTimeout(() => window.location.href = 'index.html', 1200);
        return;
    }
    const scope = 'read:user user:email repo';
    const url = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${encodeURIComponent(GITHUB_REDIRECT)}&scope=${encodeURIComponent(scope)}`;
    window.location.href = url;
}

// ─── Google OAuth ────────────────────────────────
function loginGoogle() {
    showToast('Google OAuth wird konfiguriert — Demo-Login aktiv');
    NxzAuth.loginLocal('Google User', '');
    setTimeout(() => window.location.href = 'index.html', 1200);
}

// ─── Local / KeePass ─────────────────────────────
function toggleLocalForm() {
    document.getElementById('localForm').classList.toggle('show');
    document.getElementById('localName').focus();
}

function doLocalLogin() {
    const name = document.getElementById('localName').value.trim();
    if (!name) {
        showToast('Bitte Benutzernamen eingeben', true);
        return;
    }
    NxzAuth.loginLocal(name, '');
    showToast('Willkommen, ' + name + '!');
    setTimeout(() => window.location.href = 'index.html', 1000);
}

// ─── Toast ───────────────────────────────────────
function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
}

// ─── Handle OAuth Callback ───────────────────────
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
if (code) {
    showToast('GitHub-Login wird verarbeitet...');
    NxzAuth.loginGitHub(code)
        .then(user => {
            showToast('Willkommen, ' + user.name + '!');
            setTimeout(() => window.location.href = 'index.html', 1000);
        })
        .catch(() => showToast('Login fehlgeschlagen — bitte erneut versuchen', true));
}

// ─── Already logged in? Redirect ─────────────────
if (NxzAuth.isLoggedIn()) {
    window.location.href = 'index.html';
}

// ─── Enter key for local form ────────────────────
document.getElementById('localPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLocalLogin();
});
document.getElementById('localName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('localPass').focus();
});
</script>
</body>
</html>
