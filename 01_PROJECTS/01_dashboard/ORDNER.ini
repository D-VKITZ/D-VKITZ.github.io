[ORDNER]
name = 01_dashboard
typ = hauptprojekt
beschreibung = DkZ Dashboard — 56 Module, 14 Dashboards, Shared System

[PFLICHT-LESEN]
1 = BLAUPAUSE.md
2 = REGISTRY.json
3 = LLM_CONTEXT.md
4 = IMPLEMENTIERUNGSPLAN.md

[UNTERORDNER]
modules     = 56 Module (je mit index.html + features.json)
hub         = Dashboard Hub (Startseite, Auto-Discovery)
shared      = Shared System (EventBus, Console, Health, Shortcuts)
settings    = Einstellungen
server      = Node.js Backend

[REGELN]
R1 = Neue Module: modules/name/ mit index.html + features.json
R2 = REGISTRY.json + BLAUPAUSE.md bei Änderungen aktualisieren
R3 = DkZ Design System verwenden (#fa1e4e, Inter, Glassmorphism)
R4 = Modul-Version startet bei v0.01 (Regel 9)
R5 = Git Commit nach jeder Änderung (Regel 2)
R6 = Shared Scripts laden: dkz-eventbus.js, dkz-console.js, dkz-health.js, dkz-shortcuts.js

[VERWEISE]
regelwerk = ../../REGELWERK.md
root_ini  = ../../ORDNER.ini
